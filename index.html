    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#F0F8FF;}

    button{cursor:pointer;}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:230px;background:white;border-right:1px solid #E3F2FD;display:flex;flex-direction:column;z-index:50;overflow-y:auto;}

    .nav-btn.active{background:#EBF5FB;border:1px solid #BBDEFB;color:#003865;font-weight:700;}
    .nav-btn:hover:not(.active){background:#F7FBFF;}
    .act-card{background:white;border-radius:12px;box-shadow:0 1px 6px rgba(0,56,101,0.06);margin-bottom:10px;overflow:hidden;transition:box-shadow 0.2s;position:relative;z-index:6;}
    .act-card:hover{box-shadow:0 4px 16px rgba(0,56,101,0.1);}
    .act-hdr{padding:16px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;}
    .act-body{padding:0 20px 16px;border-top:1px solid #E3F2FD;}
    .pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;}
    .modal-ov{position:fixed;inset:0;background:rgba(0,56,101,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(3px);}
    .modal-box{background:white;border-radius:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,56,101,0.15);}
    .mobile-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:2px solid #E3F2FD;display:none;justify-content:flex-start;align-items:stretch;z-index:100;padding:6px 0 calc(6px + env(safe-area-inset-bottom));overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}.mobile-nav::-webkit-scrollbar{display:none;}
    .mob-btn{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;background:transparent;border:none;color:#6B7280;font-size:10px;font-weight:600;cursor:pointer;padding:8px 4px;font-family:'Inter',sans-serif;}
    .mob-btn.active{color:#007AC2;}
    .mob-btn .mob-icon{font-size:20px;line-height:1.2;}
    @media(max-width:768px){
      .sidebar{display:none !important;}
      .main-content{margin-left:0 !important;width:100% !important;padding-bottom:72px;}
      .mobile-nav{display:flex !important;}
    }
    @keyframes toastSlide{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes spin{to{transform:rotate(360deg);}}

   UTILITY — all defined before anything else

function parseGDate(s) {
  if (!s) return null;
  try {
    if (typeof s === "string" && s.indexOf("Date(") === 0) {
      var p = s.replace("Date(","").replace(")","").split(",");
      return new Date(parseInt(p[0]), parseInt(p[1]), parseInt(p[2]||1));
    }
    if (typeof s === "string" && /^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
      var q = s.split("/");
      return new Date(parseInt(q[2]), parseInt(q[1])-1, parseInt(q[0]));
    }
    var d = new Date(s);
    return isNaN(d.getTime()) ? null : d;
  } catch(e) { return null; }
}

function daysUntil(s) {
  if (!s) return null;
  var d = parseGDate(s);
  if (!d) return null;
  var t = new Date(); t.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
}

function fmtDate(s) {
  if (!s) return "—";
  if (typeof s === "string" && /^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
    var p = s.split("/");
    var mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return p[0]+" "+mo[parseInt(p[1])-1]+" "+p[2];
  }
  var d = parseGDate(s);
  if (!d) return String(s);
  return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
}

function todayLong() {
  return new Date().toLocaleDateString("en-IN",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
}
function todayShort() {
  return new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
}
function getGreeting(){var h=new Date().getHours();if(h<12)return "Morning";if(h<17)return "Afternoon";return "Evening";}
function getTimeAgo(d){if(!d)return "";var n=new Date();var s=Math.floor((n-d)/1000);if(s<60)return "Just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return Math.floor(s/86400)+"d ago";}
function fmtPhone(p){if(!p)return "";var c=String(p).replace(/\D/g,"");if(c.length===12&&c.slice(0,2)==="91")c=c.slice(2);if(c.length===11&&c[0]==="0")c=c.slice(1);return "+91 "+c;}
function toInputDate(s){if(!s)return "";if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){var p=s.split("/");return p[2]+"-"+p[1]+"-"+p[0];}if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;var d=parseGDate(s);if(!d)return "";return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

  // Auto-detect overdue: if Pending and scheduled date has passed
  var computedStatus = rawStatus;
  if (rawStatus === "Pending" && scheduled) {
    var dd = parseGDate(scheduled);
    if (dd) {
      var today = new Date(); today.setHours(0,0,0,0);
      if (dd < today) computedStatus = "Overdue";
    }
  }
  return {
    "_docId": id, "S.No": id,
    "Activity Type": d.activityType || "",
    "Activity Name": d.activityName || "",
    "Description": d.description || "",
    "Frequency": d.frequency || "",
    "Scheduled Date": scheduled,
    "Assigned To": d.assignedTo || "",
    "Status": computedStatus,
    "_rawStatus": rawStatus,
  };
}
function unmapAMC(row) {
  return {
    equipmentName: row["Equipment Name"] || "",
    serialNo: row["Serial No"] || "",
    vendorName: row["Vendor Name"] || "",
    approvedVendorName: row["Approved Vendor Name"] || "",
    vendorContactPerson: row["Vendor Contact Person"] || "",
    vendorContactNo: row["Vendor Contact No"] || "",
    amcPeriod: row["AMC Period"] || "",
    frequency: row["Frequency"] || "",
    nextServiceDueDate: row["Next Service Due Date"] || "",
    status: row["Status"] || "",
    remarks: row["Remarks"] || "",
    plannedDate: row["Planned Date"] || "",
    plannedBy: row["Planned By"] || "",
    submittedBy: row["Submitted By"] || "",
    submittedOn: row["Submitted On"] || "",
    validatedBy: row["Validated By"] || "",
    validatedOn: row["Validated On"] || "",
    evidenceFile: row["Evidence File"] || "",
  };
}
function unmapLicence(row) {
  return {
    licenceName: row["License / Agreement Name"] || "",
    company: row["Company"] || "",
    licenceNo: row["License No / Key"] || "",
    contactPerson: row["Contact Person"] || "",
    contactNo: row["Contact No"] || "",
    issueYear: row["Issue Year"] || "",
    expiryDate: row["Expiry Date"] || "",
    renewalDueDate: row["Renewal Due Date"] || "",
    status: row["Status"] || "",
    competentPerson: row["Competent Person"] || "",
    remarks: row["Remarks"] || "",
  };
}
function unmapQuality(row) {
  // If status is computed "Overdue", save as "Pending" in Firestore (overdue is derived at read)
  var saveStatus = String(row["Status"] || "Pending");
  if (saveStatus === "Overdue") saveStatus = "Pending";
  return {
    activityType: row["Activity Type"] || "",
    activityName: row["Activity Name"] || "",
    description: row["Description"] || "",
    frequency: row["Frequency"] || "",
    scheduledDate: row["Scheduled Date"] || "",
    assignedTo: row["Assigned To"] || "",
    status: saveStatus,
  };
}

/* ═══════════════════════════════════════════
   FIRESTORE — FETCH & UPDATE
═══════════════════════════════════════════ */
async function fetchFromFirestore(collectionName, locationId) {
  try {
    var ref = db.collection(collectionName);
    var query = locationId ? ref.where("locationId","==",locationId) : ref;
    var snap = await query.get();
    return snap.docs
      .filter(function(doc){ return !doc.data().archived; })
      .map(function(doc) {
        var d = doc.data();
        if (collectionName === "amc")      return mapAMC(doc.id, d);
        if (collectionName === "licences") return mapLicence(doc.id, d);
        if (collectionName === "quality")  return mapQuality(doc.id, d);
        return Object.assign({ "_docId": doc.id }, d);
      });
  } catch(e) { console.error("Firestore fetch error:", e); return []; }
}

async function updateFirestore(sheet, row) {
  try {
    var collName = sheet === "AMC" ? "amc" : sheet === "Licenses" ? "licences" : "quality";
    var docId = row["_docId"];
    if (!docId) { console.error("No _docId on row"); return false; }
    var data = sheet === "AMC" ? unmapAMC(row) : sheet === "Licenses" ? unmapLicence(row) : unmapQuality(row);
    Object.keys(data).forEach(function(k) { if (data[k] === "") delete data[k]; });
    await db.collection(collName).doc(docId).update(data);
    return true;
  } catch(e) { console.error("Firestore update error:", e); return false; }
}

  var amcT=amc.length,amcG=amc.filter(function(t){var s=String(t["Status"]);if(["Completed","Validated","Submitted","Planned"].indexOf(s)>-1)return true;if(s==="Pending"){var d=daysUntil(t["Next Service Due Date"]);return d!==null&&d>0;}return false;}).length;

        <div style={{position:"absolute",bottom:-20,right:60,width:80,height:80,borderRadius:"50%",background:"rgba(255,255,255,0.04)"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.65)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Good {getGreeting()}</div>
            <div style={{fontSize:20,fontWeight:800,color:"white",marginBottom:2}}>{user.name.split(" ")[0]}</div>

            <div style={{fontSize:38,fontWeight:900,color:overallColor,lineHeight:1}} title={overallBreakdown}>{overallScore}%</div>
            <div style={{fontSize:11,fontWeight:700,color:overallColor,marginTop:4,background:"rgba(255,255,255,0.15)",padding:"2px 12px",borderRadius:20,display:"inline-block"}}>{overallLabel}</div>

      <div style={{background:"white",borderRadius:16,padding:"14px 18px",marginBottom:14,boxShadow:"0 1px 8px rgba(0,56,101,0.07)",borderTop:"3px solid #007AC2"}}>

            breakdown={[

              {label:"Lifetime",value:lic.filter(function(t){return String(t["Expiry Date"])==="Lifetime";}).length,color:"#6B7280"},
              {label:"Total",value:licT,color:"#003865"},
            ]}/>
          <CircleProgress value={qualScore} color={rc(qualScore)} label="Quality" sub={qualG+"/"+qualT+" complete"}/>
        </div>
      </div>

      {pendingApproval.length>0&&(
        <div style={{borderRadius:12,padding:"12px 18px",marginBottom:10,background:"#F3E8FF",border:"1px solid #C4B5FD",borderLeft:"4px solid #7C3AED",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={function(){onTabChange("amc");}}>
          <span style={{fontSize:12,fontWeight:800,color:"#7C3AED",background:"#EDE9FE",padding:"3px 8px",borderRadius:6}}>REVIEW</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:"#4C1D95"}}>{pendingApproval.length} record{pendingApproval.length>1?"s":""} awaiting approval</div>
            <div style={{fontSize:11,color:"#6D28D9",marginTop:1}}>Tap to review in AMC tab →</div>
          </div>
          <span style={{fontSize:18,color:"#7C3AED"}}>›</span>
        </div>
      )}
      {(overdueAMC.length>0||expiredLic.length>0||overdueQual.length>0)&&(
        <div style={{borderRadius:12,padding:"12px 18px",marginBottom:10,background:"#FFF5F5",border:"1px solid #FCA5A5",borderLeft:"4px solid #EF4444"}}>
          <div style={{fontSize:11,fontWeight:800,color:"#991B1B",marginBottom:8,letterSpacing:"0.08em",textTransform:"uppercase"}}>Needs Immediate Attention</div>
          {overdueAMC.slice(0,2).map(function(t,i){return(
            <div key={"od"+i} style={{fontSize:12,color:"#7F1D1D",padding:"5px 0",borderBottom:"1px solid #FEE2E2",display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#EF4444",flexShrink:0,display:"inline-block"}}/>
              <span style={{fontSize:9,fontWeight:700,color:"#EF4444",background:"#FEE2E2",padding:"1px 6px",borderRadius:4,flexShrink:0}}>AMC</span>
              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t["Equipment Name"]}</span>
              <span style={{fontSize:11,fontWeight:700,color:"#EF4444",flexShrink:0}}>{Math.abs(daysUntil(t["Next Service Due Date"]))}d overdue</span>
            </div>
          );})}
          {expiredLic.slice(0,2).map(function(t,i){return(
            <div key={"el"+i} style={{fontSize:12,color:"#7F1D1D",padding:"5px 0",borderBottom:"1px solid #FEE2E2",display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#EF4444",flexShrink:0,display:"inline-block"}}/>
              <span style={{fontSize:9,fontWeight:700,color:"#EF4444",background:"#FEE2E2",padding:"1px 6px",borderRadius:4,flexShrink:0}}>LIC</span>
              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t["License / Agreement Name"]}</span>
              <span style={{fontSize:11,fontWeight:700,color:"#EF4444",flexShrink:0}}>EXPIRED</span>
            </div>
          );})}
          {overdueQual.slice(0,2).map(function(t,i){return(
            <div key={"oq"+i} style={{fontSize:12,color:"#7F1D1D",padding:"5px 0",borderBottom:i<Math.min(overdueQual.length,2)-1?"1px solid #FEE2E2":"none",display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#EF4444",flexShrink:0,display:"inline-block"}}/>
              <span style={{fontSize:9,fontWeight:700,color:"#6D28D9",background:"#EDE9FE",padding:"1px 6px",borderRadius:4,flexShrink:0}}>QUAL</span>
              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t["Activity Name"]}</span>
              <span style={{fontSize:11,fontWeight:700,color:"#EF4444",flexShrink:0}}>{Math.abs(daysUntil(t["Scheduled Date"]))}d overdue</span>
            </div>
          );})}
          {(overdueAMC.length+expiredLic.length+overdueQual.length)>6&&<div style={{fontSize:11,color:"#991B1B",marginTop:6,fontWeight:600}}>+{(overdueAMC.length+expiredLic.length+overdueQual.length)-6} more · view Alerts tab</div>}
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:14}}>
        {[
          {label:"Overdue AMC",value:overdueAMC.length,accent:"#EF4444",tab:"amc"},
          {label:"Overdue Quality",value:overdueQual.length,accent:"#7C3AED",tab:"quality"},
          {label:"Expiring Soon",value:expiringSoon.length,accent:"#F59E0B",tab:"licenses"},

          <div style={{fontSize:11,fontWeight:700,color:"#6B7280",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>Due This Week</div>
          {dueThisWeek.map(function(item,i){
            var isT=item._days===0,isTm=item._days===1;
            var urgentBg=isT?"#FEE2E2":item._days<=3?"#FEF3C7":"#EBF5FB";
            var urgentColor=isT?"#C62828":item._days<=3?"#92400E":"#1E3A5F";
            return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<dueThisWeek.length-1?"1px solid #F0F8FF":"none"}}>

                  <div style={{fontSize:9,fontWeight:900,color:urgentColor,textAlign:"center",lineHeight:1.2}}>{isT?"TODAY":isTm?"TMRW":item._days+"d"}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#003865",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item._name}</div>
                  <div style={{fontSize:11,color:"#6B7280"}}>{item._type} · {fmtDate(item._date)}</div>
                </div>
                <Badge status={item.Status}/>
              </div>
            );
          })}
        </div>
      )}

      <CalendarView amc={amc} lic={lic} qual={qual} month={calMonth}
        onPrev={function(){setCalMonth(function(m){return new Date(m.getFullYear(),m.getMonth()-1,1);});}}
        onNext={function(){setCalMonth(function(m){return new Date(m.getFullYear(),m.getMonth()+1,1);});}}
      />
    </div>
  );
}

/* ── CalendarView ── */
function CalendarView(props){
  var amc=props.amc,lic=props.lic,qual=props.qual||[],month=props.month;
  var DARK="#003865",GRAY="#6B7280",BLUE="#007AC2",NAVY="#003865";
  var y=month.getFullYear(),m=month.getMonth();
  var mNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var firstDay=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  var events={};
  amc.forEach(function(t){var d=parseGDate(t["Next Service Due Date"]);if(d&&d.getMonth()===m&&d.getFullYear()===y){var k=d.getDate();if(!events[k])events[k]=[];events[k].push({name:t["Equipment Name"],status:t["Status"],type:"AMC"});}});
  lic.forEach(function(t){if(String(t["Expiry Date"])==="Lifetime")return;var d=parseGDate(t["Expiry Date"]);if(d&&d.getMonth()===m&&d.getFullYear()===y){var k=d.getDate();if(!events[k])events[k]=[];events[k].push({name:t["License / Agreement Name"],status:t["Status"],type:"Lic"});}});
  qual.forEach(function(t){if(!t["Scheduled Date"])return;var d=parseGDate(t["Scheduled Date"]);if(d&&d.getMonth()===m&&d.getFullYear()===y){var k=d.getDate();if(!events[k])events[k]=[];events[k].push({name:t["Activity Name"],status:t["Status"],type:"Quality"});}});
  var today=new Date();
  var cells=[];
  for(var i=0;i<firstDay;i++)cells.push(null);
  for(var d2=1;d2<=dim;d2++)cells.push(d2);
  return(
    <div style={{background:"white",borderRadius:16,padding:"20px",boxShadow:"0 1px 8px rgba(0,56,101,0.07)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <button onClick={props.onPrev} style={{background:"#F0F8FF",border:"none",borderRadius:8,padding:"8px 16px",fontSize:18,cursor:"pointer",color:NAVY}}>‹</button>
        <div style={{fontSize:16,fontWeight:800,color:DARK}}>{mNames[m]} {y}</div>
        <button onClick={props.onNext} style={{background:"#F0F8FF",border:"none",borderRadius:8,padding:"8px 16px",fontSize:18,cursor:"pointer",color:NAVY}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(function(d3){return(<div key={d3} style={{textAlign:"center",fontSize:10,fontWeight:700,color:GRAY,padding:"5px 0",textTransform:"uppercase"}}>{d3}</div>);})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map(function(day,idx){
          if(!day)return <div key={"e"+idx}/>;
          var isT=today.getDate()===day&&today.getMonth()===m&&today.getFullYear()===y;
          var evs=events[day]||[];
          return(
            <div key={day} style={{minHeight:58,padding:3,borderRadius:7,background:isT?"#EBF5FB":evs.length>0?"#F8FAFB":"transparent",border:isT?"2px solid "+BLUE:evs.length>0?"1px solid #D0E8F5":"1px solid #F0F0F0"}}>
              <div style={{fontSize:11,fontWeight:isT?800:500,color:isT?BLUE:DARK,marginBottom:2}}>{day}</div>
              {evs.slice(0,2).map(function(e,ei){return(<div key={ei} style={{fontSize:8,fontWeight:600,padding:"1px 3px",borderRadius:3,marginBottom:1,background:(e.status==="Overdue"||e.status==="Expired")?"#FEE2E2":e.type==="AMC"?"#EBF5FB":e.type==="Quality"?"#EDE9FE":"#E8F5E9",color:(e.status==="Overdue"||e.status==="Expired")?"#991B1B":e.type==="AMC"?NAVY:e.type==="Quality"?"#6D28D9":"#065F46",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.name}</div>);})}
              {evs.length>2&&<div style={{fontSize:8,color:GRAY}}>+{evs.length-2}</div>}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:14,marginTop:14,flexWrap:"wrap"}}>
        {[{bg:"#EBF5FB",tc:NAVY,lbl:"AMC Due"},{bg:"#E8F5E9",tc:"#065F46",lbl:"Licence Expiry"},{bg:"#EDE9FE",tc:"#6D28D9",lbl:"Quality"},{bg:"#FEE2E2",tc:"#991B1B",lbl:"Overdue/Expired"}].map(function(l,i){return(<div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:GRAY}}><div style={{width:12,height:12,borderRadius:3,background:l.bg,flexShrink:0}}/><span>{l.lbl}</span></div>);})}
      </div>
    </div>
  );
}

/* ── VendorDirectory ── */
function VendorDirectory(props){
  var amc=props.amc,lic=props.lic,sq=props.searchQuery||"";
  var DARK="#003865",GRAY="#6B7280",BLUE="#007AC2",NAVY="#003865";
  var vmap={};
  amc.forEach(function(t){
    var vn=String(t["Vendor Name"]||"").trim();
    if(!vn)return;
    if(!vmap[vn])vmap[vn]={name:vn,contact:t["Vendor Contact Person"]||"",phone:t["Vendor Contact No"]||"",items:[],type:"AMC Vendor"};
    var eq=String(t["Equipment Name"]||"");
    if(eq&&vmap[vn].items.indexOf(eq)===-1)vmap[vn].items.push(eq);
  });
  lic.forEach(function(t){
    var cp=String(t["Contact Person"]||"").trim();
    if(!cp)return;
    var key="L_"+cp;
    if(!vmap[key])vmap[key]={name:cp,contact:cp,phone:t["Contact No"]||"",items:[],type:"Licence Contact"};
    var ln=String(t["License / Agreement Name"]||"");
    if(ln&&vmap[key].items.indexOf(ln)===-1)vmap[key].items.push(ln);
  });
  var vendors=Object.values(vmap);
  if(sq){var q=sq.toLowerCase();vendors=vendors.filter(function(v){return v.name.toLowerCase().includes(q)||v.phone.includes(q)||v.items.some(function(i){return i.toLowerCase().includes(q);});});}
  if(vendors.length===0)return <div style={{textAlign:"center",padding:"40px",color:GRAY,fontSize:14}}>No vendors found{sq?" matching your search":""}.</div>;
  return(
    <div>
      {vendors.map(function(v,i){return(
        <div key={i} style={{background:"white",borderRadius:12,padding:"16px 20px",marginBottom:10,boxShadow:"0 1px 6px rgba(0,56,101,0.06)",borderLeft:"4px solid "+(v.type==="AMC Vendor"?BLUE:"#10B981")}}>
          <div style={{fontSize:14,fontWeight:800,color:DARK,marginBottom:6}}>{v.name}</div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:8,alignItems:"center"}}>
            {v.contact&&v.contact!==v.name&&<span style={{fontSize:12,color:GRAY}}> {v.contact}</span>}
            {v.phone&&<span style={{fontSize:13,fontWeight:700,color:BLUE}}> {fmtPhone(v.phone)}</span>}
            <span style={{fontSize:10,padding:"2px 10px",borderRadius:10,background:v.type==="AMC Vendor"?"#EBF5FB":"#E8F5E9",color:v.type==="AMC Vendor"?NAVY:"#065F46",fontWeight:700}}>{v.type}</span>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {v.items.map(function(it,ii){return(<span key={ii} style={{fontSize:11,padding:"3px 10px",background:"#F0F8FF",borderRadius:8,color:GRAY,fontWeight:500}}>{it}</span>);})}
          </div>
        </div>
      );})}
    </div>
  );
}

            {props.saving?"Assigning…":"Assign Task"}

      </div>
    </div>
  );
}

      var snap = await db.collection("users").where("username","==",user.trim()).get();
      if (snap.empty) { setErr("User not found. Check username."); return; }
      var u = snap.docs[0].data();

/* ═══════════════════════════════════════════

function App() {
  var [authUser,setAuthUser]   = useState(null);
  var [authReady,setAuthReady] = useState(false);
  var [tab,setTab]           = useState("home");
  var [isMobile,setIsMobile] = useState(window.innerWidth<=768);
  React.useEffect(function(){
    function onResize(){setIsMobile(window.innerWidth<=768);}
    window.addEventListener('resize',onResize);
    return function(){window.removeEventListener('resize',onResize);};
  },[]);

  useEffect(function(){
    var timer = setTimeout(function(){ setAuthReady(true); }, 4000);
    var unsub = auth.onAuthStateChanged(function(firebaseUser){
      clearTimeout(timer);
      if (firebaseUser) {
        var fbUsername = firebaseUser.email.split("@")[0].toUpperCase();
        db.collection("users").where("username","==",fbUsername).limit(1).get()
          .then(function(snap){
            if (!snap.empty) {
              var u = snap.docs[0].data();
              setAuthUser({
                name: String(u.fullName||fbUsername),
                role: String(u.role||"Staff"),
                email: String(u.email||""),
                username: String(u.username||fbUsername),
                locationId: String(u.locationId||""),
                locationName: String(u.locationName||u.location||"Indore Hub")
              });
            } else {
              setAuthUser({name:fbUsername,role:"Staff",email:"",username:fbUsername,locationId:"",locationName:"Indore Hub"});
            }
            setAuthReady(true);
          })
          .catch(function(e){
            console.error("[onAuthStateChanged] Firestore profile fetch failed:", e);
            setAuthUser({name:fbUsername,role:"Staff",email:"",username:fbUsername,locationId:"",locationName:"Indore Hub"});
            setAuthReady(true);
          });
      } else {
        setAuthUser(null);
        setAuthReady(true);
      }
    });
    return function(){ unsub(); clearTimeout(timer); };
  },[]);
  var [amc,setAmc]           = useState([]);
  var [lic,setLic]           = useState([]);

  async function handleAction() {
    if(!modal) return; setSaving(true);
    try {
    var task=modal.task; var key=modal.key; var sheet=modal.sheet;
    var upd=Object.assign({},task); var now=todayShort();
    if(key==="plan")     {upd["Status"]="Planned";upd["Planned Date"]=planDate;upd["Planned By"]=authUser.name;}
    if(key==="schedule") {upd["Status"]="Pending";upd["Next Service Due Date"]=planDate;upd["Planned Date"]="";upd["Planned By"]="";upd["Submitted By"]="";upd["Submitted On"]="";upd["Validated By"]="";upd["Validated On"]="";upd["Remarks"]="Next service scheduled by "+authUser.name+" on "+now;}
    if(key==="submit"){
      var upd2=Object.assign({},task,{Status:"Submitted","Submitted By":authUser.name,"Submitted On":now,"Remarks":comment||""});
      if(evidenceFile){
        addToast("📤 Uploading file…","info");
        var url=await uploadEvidence(evidenceFile,task["_docId"]);
        if(url) upd2["Evidence File"]=url;
      }
      await updateFirestore(sheet,upd2);
      await logActivity("submit",sheet,task["Equipment Name"]||"","Submitted by "+authUser.name,authUser.name,authUser.role,authUser.locationId||"");
      await new Promise(function(r){setTimeout(r,800);});
      await loadData(); setSaving(false);
      addToast("✅ Evidence submitted"+(upd2["Evidence File"]?" with file":""),"success");
      setModal(null); setComment(""); setEvidenceFile(null); setPlanDate(""); return;
    }
    if(key==="validate") {upd["Status"]="Validated";upd["Validated By"]=authUser.name;upd["Validated On"]=now;upd["Remarks"]=comment;}
    if(key==="sendback") {upd["Status"]="Pending";upd["Remarks"]="Sent back: "+comment;}
    if(key==="signoff")  {upd["Status"]="Completed";upd["Remarks"]=comment;}
    if(key==="renew")    {upd["Status"]="Active";if(planDate){upd["Expiry Date"]=planDate;upd["Renewal Due Date"]=planDate;}upd["Remarks"]="Renewed "+now+" by "+authUser.name+(planDate?" — new expiry: "+planDate:"")+". "+comment;}
    await updateFirestore(sheet,upd);
    await logActivity(key,sheet,upd["Equipment Name"]||upd["License / Agreement Name"]||"",key+" by "+authUser.name,authUser.name,authUser.role,authUser.locationId||"");
    await new Promise(function(r){setTimeout(r,1200);});
    await loadData(); setSaving(false);
    var toastMsg={plan:"✅ Service planned",schedule:"📆 Next service scheduled",validate:"✅ Validated & closed",sendback:"↩️ Sent back for revision",signoff:"🔏 RDM signed off",renew:"🔄 Licence renewed"};
    addToast(toastMsg[key]||"✅ Done","success");
    setModal(null); setComment(""); setFileName(""); setPlanDate("");
    } catch(e){ console.error("handleAction error:",e); addToast("Action failed — try again","error"); setSaving(false); }
  }

  async function bulkAction(newStatus) {
    if(selectedIds.length===0) return;
    if(!window.confirm(selectedIds.length+" record(s) will be marked as "+newStatus+". Continue?")) return;
    console.log("[bulkAction] start — newStatus:", newStatus, "count:", selectedIds.length);
    setSaving(true);
    try {
      var selected=amc.filter(function(t){return selectedIds.includes(t["_docId"]);});
      var now=todayShort();
      for(var i=0;i<selected.length;i++){
        var upd=Object.assign({},selected[i],{Status:newStatus,"Remarks":"Bulk updated to "+newStatus+" by "+authUser.name+" on "+now});
        await updateFirestore("AMC",upd);
      }
      await loadData();
      addToast("✅ "+selected.length+" records → "+newStatus,"success");
      setSelectedIds([]);
    } catch(e) {
      console.error("[bulkAction] catch — code:", e.code, "message:", e.message);
      addToast("Bulk update failed — try again","error");
    } finally {
      console.log("[bulkAction] finally — resetting saving");
      setSaving(false);
    }
  }

  async function uploadEvidence(file, docId) {
    if(!storage||!file) return null;
    try{
      var path="evidence/"+(authUser.locationId||"")+"/"+docId+"/"+Date.now()+"_"+file.name;
      var ref=storage.ref(path);
      await ref.put(file);
      return await ref.getDownloadURL();
    }catch(e){console.error("Storage upload failed:",e);addToast("⚠️ File upload failed: "+e.message,"error");return null;}
  }

      var data=addSheet==="AMC"?unmapAMC(form):addSheet==="Licenses"?unmapLicence(form):unmapQuality(form);

        Validated:[209,250,229],Completed:[209,250,229],Active:[209,250,229]

  var dispAmc = amc.filter(function(t){return filter==="All"||String(t["Status"])===filter;})
    .filter(function(t){if(!searchQuery)return true;var q=searchQuery.toLowerCase();return (t["Equipment Name"]||"").toLowerCase().includes(q)||(t["Vendor Name"]||"").toLowerCase().includes(q)||(t["Status"]||"").toLowerCase().includes(q);})
    .filter(function(t){
      var d=t["Next Service Due Date"]; if(!dateFrom&&!dateTo) return true; if(!d) return true;
      var dt=new Date(d);
      if(dateFrom&&dt<new Date(dateFrom)) return false;
      if(dateTo&&dt>new Date(dateTo)) return false;
      return true;
    });
  var dispLic = lic.filter(function(t){return filter==="All"||String(t["Status"])===filter;})
    .filter(function(t){if(!searchQuery)return true;var q=searchQuery.toLowerCase();return (t["License / Agreement Name"]||"").toLowerCase().includes(q)||(t["Company"]||"").toLowerCase().includes(q)||(t["Status"]||"").toLowerCase().includes(q);})
    .filter(function(t){
      var d=t["Expiry Date"]; if(!dateFrom&&!dateTo) return true; if(!d||d==="Lifetime") return true;
      var dt=new Date(d);
      if(dateFrom&&dt<new Date(dateFrom)) return false;
      if(dateTo&&dt>new Date(dateTo)) return false;
      return true;
    });

  var kpis = [
    {label:"AMC Total",       value:amc.length,                                                             bg:"#1E3A5F"},
    {label:"AMC Overdue",     value:amc.filter(function(t){return String(t["Status"])==="Overdue";}).length, bg:"#991B1B"},
    {label:"Pending Review",  value:amc.filter(function(t){return String(t["Status"])==="Submitted";}).length,bg:"#0369A1"},
    {label:"Licences Total",  value:lic.length,                                                              bg:"#1D4E89"},
    {label:"Expiring/Expired",value:lic.filter(function(t){var d=daysUntil(t["Expiry Date"]);return String(t["Status"])==="Expired"||(d!==null&&d>=0&&d<=30&&String(t["Expiry Date"])!=="Lifetime");}).length,bg:"#7C2D12"},
  ];

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#F0F8FF"}}>

      {/* ── MODAL ── */}
      {modal&&(
        <div className="modal-ov">
          <div className="modal-box">
            <div style={{padding:"24px 24px 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>

                  <div style={{fontSize:10,fontWeight:700,color:PINK,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>{modal.sheet} · Action</div>
                  <div style={{fontSize:18,fontWeight:800,color:DARK}}>{modal.task["Equipment Name"]||modal.task["License / Agreement Name"]||modal.task["Activity Name"]}</div>
                </div>
                <button onClick={function(){setModal(null);}} style={{background:"#F0F8FF",border:"none",width:32,height:32,borderRadius:8,fontSize:16,color:GRAY}}>✕</button>
              </div>
              <div style={{background:"#F0F8FF",borderRadius:12,padding:"14px 16px",marginBottom:18,fontSize:13}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px"}}>
                  {modal.task["Vendor Name"]&&<div><span style={{color:GRAY}}>Vendor: </span><strong>{modal.task["Vendor Name"]}</strong></div>}
                  {modal.task["Next Service Due Date"]&&<div><span style={{color:GRAY}}>Due: </span><strong style={{color:PINK}}>{fmtDate(modal.task["Next Service Due Date"])}</strong></div>}
                  {modal.task["Expiry Date"]&&<div><span style={{color:GRAY}}>Expires: </span><strong style={{color:PINK}}>{fmtDate(modal.task["Expiry Date"])}</strong></div>}
                  {modal.task["Frequency"]&&<div><span style={{color:GRAY}}>Frequency: </span>{modal.task["Frequency"]}</div>}
                  {modal.task["Vendor Contact Person"]&&<div><span style={{color:GRAY}}>Contact: </span>{modal.task["Vendor Contact Person"]}</div>}
                  {modal.task["Vendor Contact No"]&&<div><span style={{color:GRAY}}>Phone: </span><strong style={{color:PINK}}>{fmtPhone(modal.task["Vendor Contact No"])}</strong></div>}
                  <div style={{gridColumn:"1/-1"}}><span style={{color:GRAY}}>Status: </span><Badge status={String(modal.task["Status"])}/></div>
                </div>
              </div>
              {modal.task["Evidence File"]&&<a href={modal.task["Evidence File"]} target="_blank" rel="noopener noreferrer" style={{marginBottom:14,padding:"10px 14px",background:"#EBF5FB",borderRadius:10,fontSize:13,color:"#003865",fontWeight:600,display:"block",textDecoration:"none"}}>📎 Open Evidence File</a>}
              {modal.task["Remarks"]&&<div style={{marginBottom:14,fontSize:13,color:GRAY,fontStyle:"italic",padding:"10px 14px",background:"#F0F8FF",borderRadius:10}}>{modal.task["Remarks"]}</div>}
              {modal.key==="plan"&&<div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,color:DARK,display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>Planned Vendor Visit Date</label><input type="date" value={planDate} onChange={function(e){setPlanDate(e.target.value);}} style={{width:"100%",padding:"12px 16px",border:"2px solid #E3F2FD",borderRadius:10,fontSize:14,color:DARK}}/></div>}
              {modal.key==="renew"&&<div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,color:"#2E7D32",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>New Expiry Date <span style={{color:"#EF4444"}}>*</span></label><input type="date" value={planDate} onChange={function(e){setPlanDate(e.target.value);}} style={{width:"100%",padding:"12px 16px",border:"2px solid #C8E6C9",borderRadius:10,fontSize:14,color:DARK}}/><div style={{fontSize:11,color:"#6B7280",marginTop:5}}>This will update the expiry date and mark licence as Active.</div></div>}
              {modal.key==="schedule"&&<div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,color:"#7C3AED",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>Next Service Due Date</label><input type="date" value={planDate} onChange={function(e){setPlanDate(e.target.value);}} style={{width:"100%",padding:"12px 16px",border:"2px solid #DDD6FE",borderRadius:10,fontSize:14,color:DARK}}/></div>}
              {modal.key==="submit"&&(
                <div style={{marginBottom:14}}>

                    <label style={{fontSize:11,fontWeight:700,color:DARK,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.07em"}}>Remarks (optional)</label>
                    <textarea value={comment} onChange={function(e){setComment(e.target.value);}} placeholder="Service notes, observations…" rows={2} style={{width:"100%",resize:"vertical",padding:"10px 14px",border:"2px solid #E3F2FD",borderRadius:10,fontSize:13,color:DARK,fontFamily:"Inter,sans-serif",boxSizing:"border-box"}}/>
                  </div>
                  {!storage&&<div style={{marginTop:8,fontSize:11,color:"#92400E",background:"#FEF3C7",padding:"8px 12px",borderRadius:8}}>⚠️ Firebase Storage not enabled. Enable it in Firebase Console → Storage to use file upload.</div>}
                </div>
              )}
              {(modal.key==="validate"||modal.key==="sendback"||modal.key==="signoff"||modal.key==="renew")&&(
                <div style={{marginBottom:16}}>
                  <label style={{fontSize:11,fontWeight:700,color:DARK,display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>{modal.key==="validate"?"Validation Remarks":modal.key==="sendback"?"Reason for Sending Back":modal.key==="signoff"?"RDM Review Notes":"Renewal Remarks"}</label>
                  <textarea value={comment} onChange={function(e){setComment(e.target.value);}} placeholder="Add your remarks…" rows={3} style={{width:"100%",resize:"vertical",padding:"12px 16px",border:"2px solid #E3F2FD",borderRadius:10,fontSize:14,color:DARK,fontFamily:"Inter,sans-serif"}}/>
                </div>
              )}
            </div>
            <div style={{padding:"14px 24px 24px",display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={function(){setModal(null);}} style={{padding:"12px 20px",fontSize:14,borderRadius:10,border:"1px solid #E0D4EC",background:"white",color:GRAY,fontWeight:500}}>Cancel</button>
              {modal.key==="plan"    &&<button onClick={handleAction} disabled={saving} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#1565C0,#1E88E5)",color:"white",border:"none",borderRadius:10,fontWeight:700}}>{saving?"Saving…":"Confirm Plan"}</button>}
              {modal.key==="submit"  &&<button onClick={handleAction} disabled={saving} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#003865,#007AC2)",color:"white",border:"none",borderRadius:10,fontWeight:700,opacity:saving?0.5:1}}>{saving?"Uploading…":"Submit Evidence"}</button>}
              {modal.key==="validate"&&<button onClick={handleAction} disabled={saving} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#2E7D32,#43A047)",color:"white",border:"none",borderRadius:10,fontWeight:700}}>{saving?"Saving…":"Validate & Close"}</button>}
              {modal.key==="sendback"&&<button onClick={handleAction} disabled={saving||!comment} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#C62828,#E53935)",color:"white",border:"none",borderRadius:10,fontWeight:700,opacity:(!comment||saving)?0.5:1}}>{saving?"Saving…":"Send Back"}</button>}
              {modal.key==="signoff" &&<button onClick={handleAction} disabled={saving} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#0277BD,#0288D1)",color:"white",border:"none",borderRadius:10,fontWeight:700}}>{saving?"Saving…":"RDM Sign Off"}</button>}
              {modal.key==="renew"   &&<button onClick={handleAction} disabled={saving||!planDate} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#2E7D32,#43A047)",color:"white",border:"none",borderRadius:10,fontWeight:700,opacity:(!planDate||saving)?0.5:1}}>{saving?"Saving…":"Confirm Renewal"}</button>}
              {modal.key==="schedule" &&<button onClick={handleAction} disabled={saving||!planDate} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#7C3AED,#8B5CF6)",color:"white",border:"none",borderRadius:10,fontWeight:700,opacity:(!planDate||saving)?0.5:1}}>{saving?"Saving…":"Schedule Service"}</button>}
            </div>
          </div>
        </div>
      )}

      {editRecord&&<EditModal record={editRecord.record} sheet={editRecord.sheet} onClose={function(){setEditRecord(null);}} onSave={handleSaveEdit} saving={saving}/>}

      {/* ── Global Search Overlay ── */}
      {gSearchOpen&&(
        <div style={{position:"fixed",inset:0,zIndex:500,background:"rgba(0,30,60,0.5)"}} onClick={function(){setGSearchOpen(false);}}>

            <input autoFocus value={gSearch} onChange={function(e){setGSearch(e.target.value);}}
              placeholder="Search AMC, Licences, Quality…"
              style={{width:"100%",padding:"14px 18px",border:"2px solid #007AC2",borderRadius:12,fontSize:15,color:"#003865",fontFamily:"Inter,sans-serif",boxSizing:"border-box",outline:"none"}}/>

            {gResults&&(
              <div style={{maxHeight:400,overflowY:"auto",marginTop:10}}>
                {gTotal===0&&<div style={{textAlign:"center",padding:"28px",fontSize:13,color:"#6B7280"}}>No results for "<strong>{gSearch}</strong>"</div>}

                  <div key={t["_docId"]} onClick={function(){setTab("amc");setSearchQuery(String(t["Equipment Name"]||""));setGSearchOpen(false);}} style={{padding:"10px 14px",borderRadius:10,background:"#F7FBFF",marginBottom:5,cursor:"pointer",border:"1px solid #E3F2FD",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>

                {gResults.lic.map(function(t){return(
                  <div key={t["_docId"]} onClick={function(){setTab("licenses");setSearchQuery(String(t["License / Agreement Name"]||""));setGSearchOpen(false);}} style={{padding:"10px 14px",borderRadius:10,background:"#F7FBFF",marginBottom:5,cursor:"pointer",border:"1px solid #E3F2FD",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#003865",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t["License / Agreement Name"]}</div>
                      <div style={{fontSize:11,color:"#6B7280"}}>{t["Company"]||""}{t["Expiry Date"]?" · "+t["Expiry Date"]:""}</div>
                    </div>
                    <Badge status={String(t["Status"])}/>
                  </div>
                );})}

                {gResults.qual.map(function(t){return(

                    <div style={{minWidth:0}}>

              </div>

          <button onClick={function(){setSelectedIds([]);}} style={{padding:"8px 12px",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:10,color:"white",fontSize:12,fontWeight:600,cursor:"pointer"}}>✕ Clear</button>

      {deleteRecord&&<DeleteConfirm record={deleteRecord.record} sheet={deleteRecord.sheet} onClose={function(){setDeleteRecord(null);}} onConfirm={handleConfirmDelete} saving={saving}/>}

                          </div>
                        </div>
                        <span style={{fontSize:16,color:GRAY,transform:isCatOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▾</span>
                      </div>
                      {isCatOpen&&(
                        <div style={{paddingBottom:12}}>
                          {entries.map(function(e,si){
                            var item=e.item; var idx=e.idx;
                            var s=String(item["Status"]); var days=daysUntil(item["Expiry Date"]);
                            var isExp2=s==="Expired"; var isUrg=days!==null&&days>=0&&days<=30&&String(item["Expiry Date"])!=="Lifetime";
                            var isRowOpen=expanded["lrow_"+idx]; var acts=getActions(item,"Licenses");
                            var rlc=isExp2?"#EF4444":isUrg?"#FBC02D":"#10B981";
                            var rowLabel=item["Company"]?(String(item["License / Agreement Name"])+" — "+item["Company"]):String(item["License / Agreement Name"]);
                            return(
                              <div key={si} style={{margin:"0 16px 8px",borderRadius:10,border:"1px solid #EBF5FB",borderLeft:"3px solid "+rlc,background:"#F7FBFF",overflow:"hidden"}}>
                                <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={function(){toggleExp("lrow_"+idx);}}>
                                  <div style={{flex:1}}>
                                    <div style={{fontSize:13,fontWeight:700,color:NAVY,marginBottom:3}}>{rowLabel}</div>
                                    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                                      <Badge status={s}/>
                                      {isExp2&&<span style={{fontSize:11,color:"#C62828",fontWeight:700}}>⚠ EXPIRED</span>}
                                      {isUrg&&!isExp2&&<span style={{fontSize:11,color:"#E65100",fontWeight:700}}>Expiring in {days}d</span>}
                                    </div>
                                  </div>
                                  <div style={{textAlign:"right",marginRight:8,flexShrink:0}}>
                                    <div style={{fontSize:10,color:GRAY,marginBottom:2}}>Expiry</div>
                                    <div style={{fontSize:13,fontWeight:700,color:isExp2?"#C62828":isUrg?"#E65100":NAVY}}>{fmtDate(item["Expiry Date"])}</div>
                                    {item["Expiry Date"]&&String(item["Expiry Date"])!=="Lifetime"&&(function(){var cd=daysUntil(item["Expiry Date"]);return cd!==null?<div style={{fontSize:10,fontWeight:700,color:cd<0?"#C62828":cd<=30?"#E65100":"#10B981",marginTop:1}}>{cd<0?Math.abs(cd)+"d overdue":cd===0?"Today!":cd+"d left"}</div>:null;})()}
                                  </div>
                                  <span style={{fontSize:14,color:GRAY,transform:isRowOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s",flexShrink:0}}>▾</span>
                                </div>
                                {isRowOpen&&(
                                  <div style={{padding:"0 16px 14px",borderTop:"1px solid #EBF5FB"}}>
                                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"8px 16px",padding:"10px 0",marginBottom:10}}>
                                      {item["License No / Key"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>License No</div><div style={{fontSize:13,fontWeight:600,color:NAVY}}>{item["License No / Key"]}</div></div>}
                                      {item["Location"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Location</div><div style={{fontSize:13,fontWeight:600,color:NAVY}}>{item["Location"]}</div></div>}
                                      {item["Renewal Due Date"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Renewal Due</div><div style={{fontSize:13,fontWeight:700,color:"#E65100"}}>{fmtDate(item["Renewal Due Date"])}</div></div>}
                                      {item["Contact Person"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Contact Person</div><div style={{fontSize:13,fontWeight:600,color:NAVY}}>{item["Contact Person"]}</div></div>}
                                      {item["Contact No"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Contact No</div><div style={{fontSize:13,fontWeight:700,color:BLUE}}>{fmtPhone(item["Contact No"])}</div></div>}
                                      {item["Competent Person"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Competent Person</div><div style={{fontSize:13,fontWeight:600,color:NAVY}}>{item["Competent Person"]}</div></div>}
                                    </div>
                                    {item["Remarks"]&&<div style={{marginBottom:10,fontSize:12,color:GRAY,fontStyle:"italic",padding:"8px 12px",background:"#F0F8FF",borderRadius:8}}>{item["Remarks"]}</div>}
                                    <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                                      {!isViewer&&acts.map(function(a){return <button key={a.key} onClick={function(){setModal({task:item,key:a.key,sheet:"Licenses"});}} style={{padding:"8px 14px",background:a.bg,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>{a.label}</button>;})}
                                      {(canEdit||canValidate)&&<button onClick={function(){setAssignModal({task:item,sheet:"Licenses"});}} style={{padding:"8px 14px",background:"#F3E8FF",color:"#6D28D9",border:"1px solid #DDD6FE",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>👤 Assign</button>}
                                      {canEdit&&<button onClick={function(){setEditRecord({record:item,sheet:"Licenses"});}} style={{padding:"8px 14px",background:"#EBF5FB",color:NAVY,border:"1px solid #BBDEFB",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>Edit</button>}
                                      {canDelete&&<button onClick={function(){setDeleteRecord({record:item,sheet:"Licenses"});}} style={{padding:"8px 14px",background:"#FFF0F0",color:"#C62828",border:"1px solid #FFCDD2",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>🗑</button>}
                                    </div>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                });
              })()}
            </div>
          )}

                    {/* Quality */}
          {tab==="quality"&&!loading&&!loadErr&&(
            <div>
              {/* Search + Add */}
              <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
                <div style={{flex:1}}><SearchBar value={searchQuery} onChange={setSearchQuery} placeholder="Search activities, type, status…"/></div>
                {canAdd&&<button onClick={function(){setAddSheet("Quality");setSearchQuery("");}} style={{padding:"10px 18px",background:"linear-gradient(135deg,#10B981,#059669)",color:"white",border:"none",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>+ Add Activity</button>}
              </div>

              {/* Filter chips */}
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
                {["All","Pending","Planned","Overdue","Completed","Validated"].map(function(f){return(
                  <button key={f} onClick={function(){setFilter(f);}} style={{padding:"6px 16px",fontSize:12,borderRadius:20,border:filter===f?"none":"1px solid #E0D4EC",background:filter===f?"linear-gradient(135deg,#1565C0,#007AC2)":"white",color:filter===f?"white":GRAY,fontWeight:filter===f?700:400,boxShadow:filter===f?"0 2px 8px rgba(21,101,192,0.25)":"none"}}>{f}</button>
                );})}
              </div>

              {(function(){
                var filteredQual=qual.filter(function(t){
                  var q=searchQuery.toLowerCase();
                  var matchSearch=!searchQuery||(t["Activity Name"]||"").toLowerCase().includes(q)||(t["Activity Type"]||"").toLowerCase().includes(q)||(t["Status"]||"").toLowerCase().includes(q)||(t["Assigned To"]||"").toLowerCase().includes(q);
                  var matchFilter=filter==="All"||String(t["Status"])===filter;
                  return matchSearch&&matchFilter;
                });
                if(filteredQual.length===0) return <div style={{textAlign:"center",padding:"40px",color:GRAY,fontSize:14}}>No activities match.</div>;

                return ["Training","Daily Housekeeping","Fortnightly Housekeeping"].map(function(section){
                  var items=filteredQual.filter(function(t){return String(t["Activity Type"])===section;});
                  if(items.length===0) return null;
                  var sc2=section==="Training"?"#1565C0":section==="Daily Housekeeping"?"#2E7D32":"#003865";
                  var sb2=section==="Training"?"#E3F2FD":section==="Daily Housekeeping"?"#E8F5E9":"#EDE7F6";
                  var doneCount=items.filter(function(t){return["Completed","Validated"].indexOf(String(t["Status"]))>-1;}).length;
                  var overdueCount=items.filter(function(t){return String(t["Status"])==="Overdue";}).length;
                  var SP={Overdue:0,Pending:1,Planned:2,Submitted:3,Validated:4,Completed:5};
                  var worst=items.reduce(function(w,t){var s=String(t["Status"]);return(SP[s]!==undefined?SP[s]:99)<(SP[w]!==undefined?SP[w]:99)?s:w;},"Completed");
                  var glc=worst==="Overdue"?"#EF4444":worst==="Pending"?"#FBC02D":(worst==="Validated"||worst==="Completed")?"#10B981":"#3B82F6";
                  var isSectionOpen=expanded["qsec_"+section];

                  return(
                    <div key={section} className="act-card" style={{borderLeft:"4px solid "+glc}} onClick={function(e){e.stopPropagation();}}>
                      {/* Section header row — clickable to expand */}
                      <div className="act-hdr" onClick={function(){toggleExp("qsec_"+section);}}>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                            <span style={{padding:"3px 12px",background:sb2,borderRadius:20,fontSize:12,fontWeight:700,color:sc2}}>{section}</span>
                            <Badge status={worst}/>
                          </div>
                          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                            <span style={{fontSize:12,color:GRAY}}>{doneCount}/{items.length} done</span>
                            {overdueCount>0&&<span style={{fontSize:11,fontWeight:700,color:"#C62828",background:"#FEE2E2",padding:"2px 8px",borderRadius:8}}>{overdueCount} overdue</span>}
                          </div>
                        </div>
                        <span style={{fontSize:16,color:GRAY,transform:isSectionOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▾</span>
                      </div>

                      {/* Expanded items list */}
                      {isSectionOpen&&(
                        <div style={{paddingBottom:6}}>
                          {items.map(function(task,idx){
                            var s2=String(task["Status"]||"Pending");
                            var isRowOpen=expanded["qrow_"+section+"_"+idx];
                            var isDone=s2==="Completed"||s2==="Validated";
                            var isOverdue=s2==="Overdue";
                            var d=daysUntil(task["Scheduled Date"]);
                            var rlc=isOverdue?"#EF4444":s2==="Pending"&&d!==null&&d<=3?"#FBC02D":(isDone)?"#10B981":s2==="Planned"?"#3B82F6":"#90CAF9";
                            return(
                              <div key={idx} style={{margin:"0 12px 6px",borderRadius:8,border:"1px solid #EBF5FB",borderLeft:"3px solid "+rlc,background:"#FAFCFF",overflow:"hidden"}}>
                                {/* Row header */}
                                <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={function(){toggleExp("qrow_"+section+"_"+idx);}}>
                                  <div style={{flex:1}}>
                                    <div style={{fontSize:13,fontWeight:700,color:isOverdue?"#991B1B":DARK,marginBottom:2,textDecoration:isDone?"line-through":"none",opacity:isDone?0.7:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{String(task["Activity Name"]||"")}</div>
                                    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                                      <Badge status={s2}/>
                                      {task["Frequency"]&&<span style={{fontSize:10,color:GRAY,background:"#F0F8FF",padding:"1px 8px",borderRadius:8}}>{task["Frequency"]}</span>}
                                      {d!==null&&<span style={{fontSize:11,fontWeight:700,color:d<0?"#C62828":d<=3?"#E65100":d<=7?"#92400E":"#6B7280"}}>{d<0?Math.abs(d)+"d overdue":d===0?"Today":d===1?"Tomorrow":"In "+d+"d"}</span>}
                                      {task["Assigned To"]&&<span style={{fontSize:11,color:GRAY}}>→ {task["Assigned To"]}</span>}
                                    </div>
                                  </div>
                                  <div style={{textAlign:"right",marginRight:6,flexShrink:0}}>
                                    {task["Scheduled Date"]&&<div style={{fontSize:9,color:GRAY,marginBottom:1}}>Scheduled</div>}
                                    {task["Scheduled Date"]&&<div style={{fontSize:12,fontWeight:700,color:isOverdue?"#C62828":NAVY}}>{fmtDate(task["Scheduled Date"])}</div>}
                                  </div>
                                  <span style={{fontSize:14,color:GRAY,transform:isRowOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▾</span>
                                </div>

                                {/* Expanded detail */}
                                {isRowOpen&&(
                                  <div style={{padding:"12px 16px",borderTop:"1px solid #EBF5FB",background:"white"}}>
                                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:12}}>
                                      {task["Activity Type"]&&<div><div style={{fontSize:9,color:"#374151",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:1,fontWeight:700}}>Type</div><div style={{fontSize:12,fontWeight:600,color:NAVY}}>{task["Activity Type"]}</div></div>}
                                      {task["Frequency"]&&<div><div style={{fontSize:9,color:"#374151",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:1,fontWeight:700}}>Frequency</div><div style={{fontSize:12,fontWeight:600,color:NAVY}}>{task["Frequency"]}</div></div>}
                                      {task["Scheduled Date"]&&<div><div style={{fontSize:9,color:"#374151",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:1,fontWeight:700}}>Scheduled</div><div style={{fontSize:12,fontWeight:600,color:isOverdue?"#C62828":NAVY}}>{fmtDate(task["Scheduled Date"])}</div></div>}
                                      {task["Assigned To"]&&<div><div style={{fontSize:9,color:"#374151",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:1,fontWeight:700}}>Assigned To</div><div style={{fontSize:12,fontWeight:600,color:NAVY}}>{task["Assigned To"]}</div></div>}
                                    </div>
                                    {task["Description"]&&<div style={{fontSize:12,color:GRAY,lineHeight:1.6,marginBottom:12,padding:"8px 12px",background:"#F8FAFC",borderRadius:8}}>{task["Description"]}</div>}
                                    <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",paddingTop:4,borderTop:"1px solid #E3F2FD"}}>
                                      {!isViewer&&canValidate&&!isDone&&(
                                        <button onClick={function(){
                                          var upd=Object.assign({},task,{Status:"Completed"});
                                          updateFirestore("Quality",upd).then(function(){
                                            logActivity("validate","Quality",task["Activity Name"]||"","Marked complete by "+authUser.name,authUser.name,authUser.role,authUser.locationId||"");
                                            loadData();
                                            addToast("Activity marked complete","success");
                                          });
                                        }} style={{padding:"8px 14px",background:"linear-gradient(135deg,#2E7D32,#43A047)",color:"white",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>Mark Complete</button>
                                      )}
                                      {!isViewer&&canValidate&&isDone&&(
                                        <button onClick={function(){
                                          var upd=Object.assign({},task,{Status:"Pending"});
                                          updateFirestore("Quality",upd).then(function(){
                                            logActivity("edit","Quality",task["Activity Name"]||"","Reset to Pending by "+authUser.name,authUser.name,authUser.role,authUser.locationId||"");
                                            loadData();
                                            addToast("Activity reset to Pending","info");
                                          });
                                        }} style={{padding:"8px 14px",background:"#F0F8FF",color:"#1565C0",border:"1px solid #BBDEFB",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>Reset to Pending</button>
                                      )}
                                      {(canEdit||canValidate)&&<button onClick={function(){setAssignModal({task:task,sheet:"Quality"});}} style={{padding:"8px 14px",background:"#F3E8FF",color:"#6D28D9",border:"1px solid #DDD6FE",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>Assign</button>}
                                      {canEdit&&<button onClick={function(){setEditRecord({record:task,sheet:"Quality"});}} style={{padding:"8px 14px",background:"#EBF5FB",color:NAVY,border:"1px solid #BBDEFB",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>Edit</button>}
                                      {canDelete&&<button onClick={function(){setDeleteRecord({record:task,sheet:"Quality"});}} style={{padding:"8px 14px",background:"#FFF0F0",color:"#C62828",border:"1px solid #FFCDD2",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>Archive</button>}
                                    </div>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                });
              })()}
            </div>
          )}

          {/* Activity Log Tab */}
          {tab==="activity"&&!loading&&(
            <div>
              {activityLog.length===0
                ?<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:48,marginBottom:16}}>📭</div><div style={{fontSize:18,fontWeight:700,color:DARK,marginBottom:8}}>No Activity Yet</div><div style={{fontSize:14,color:GRAY}}>Actions taken in the system will appear here.</div></div>
                :<div>
                  <div style={{fontSize:13,fontWeight:700,color:DARK,marginBottom:14}}>Recent Activity ({activityLog.length} records)</div>
                  {activityLog.map(function(log,i){
                    var icons={edit:"✏️",add:"➕",delete:"🗑️",validate:"✅",plan:"📅",submit:"📤",signoff:"🔏",renew:"🔄",schedule:"📆"};
                    var roleStyle=RC[log.role]||RC.Staff;
                    return(
                      <div key={log.id||i} style={{background:"white",borderRadius:12,padding:"14px 18px",marginBottom:8,boxShadow:"0 1px 6px rgba(0,56,101,0.06)",display:"flex",gap:12,alignItems:"flex-start"}}>
                        <span style={{fontSize:18,flexShrink:0,marginTop:2}}>{icons[log.action]||"📝"}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:DARK,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{log.recordName||"Record"}</div>
                          <div style={{fontSize:11,color:GRAY,marginTop:3}}>
                            <span style={{padding:"1px 8px",borderRadius:8,background:roleStyle.bg,color:roleStyle.color,fontWeight:700,fontSize:10,marginRight:8}}>{log.role}</span>
                            {log.user} · {log.details}
                          </div>
                          <div style={{fontSize:11,color:GRAY,marginTop:2}}>{log.sheet} · {getTimeAgo(log.timestamp)}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              }
            </div>
          )}

          {/* Alerts */}
          {tab==="alerts"&&(
            <div>
              {notifs.length===0
                ?<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:48,marginBottom:16}}>✅</div><div style={{fontSize:18,fontWeight:700,color:DARK,marginBottom:8}}>All Clear</div><div style={{fontSize:14,color:GRAY}}>No active alerts. All activities are on track.</div></div>
                :notifs.map(function(n){
                  var s=NS[n.level]; var icon=n.level==="danger"?"●":n.level==="warning"?"●":"●";
                  var acts=n.task?getActions(n.task,n.sheet):[];
                  var tagBg=n.level==="danger"?"#FCA5A5":n.level==="warning"?"#FCD34D":"#93C5FD";
                  var tagColor=n.level==="danger"?"#7F1D1D":n.level==="warning"?"#78350F":"#1E3A5F";
                  return(
                    <div key={n.id} style={{background:s.bg,border:"1px solid "+s.border,borderRadius:12,padding:"14px 18px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
                      <span style={{fontSize:18}}>{icon}</span>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                          {n.tag&&<span style={{fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:8,background:tagBg,color:tagColor}}>{n.tag}</span>}
                          <div style={{fontSize:14,color:s.color,fontWeight:700}}>{n.text}</div>
                        </div>
                        {n.task&&<div style={{fontSize:12,color:s.color,opacity:0.75}}>{(n.task["Vendor Name"]||"")+" · "+fmtDate(n.task["Next Service Due Date"]||n.task["Expiry Date"])}</div>}
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        {acts.slice(0,1).map(function(a){return <button key={a.key} onClick={function(){setModal({task:n.task,key:a.key,sheet:n.sheet,_rowIndex_UNUSED:Number(n.task["S.No"])+1});}} style={{padding:"8px 16px",background:a.bg,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700}}>{a.label}</button>;})}
                        <button onClick={function(){dismissAlert(n.id);}} style={{padding:"8px 14px",background:"white",border:"1px solid #E0D4EC",borderRadius:8,fontSize:12,color:GRAY}}>Dismiss</button>
                      </div>
                    </div>
                  );
                })
              }
            </div>
          )}

        </div>

        <div style={{padding:"14px 28px",borderTop:"1px solid #E3F2FD",background:"white",display:"flex",justifyContent:"space-between",fontSize:11,color:GRAY}}>
          <span>Posh Enterprises · Compliance Tracker</span>
          <span>{todayLong()}</span>
        </div>
      </div>

      {/* ── MOBILE BOTTOM NAV ── */}
      <div className="mobile-nav">
        {[
          {id:"home",     label:"Home",     icon:"H"},
          {id:"amc",      label:"AMC",      icon:"⚙"},
          {id:"licenses", label:"Licences", icon:"📋"},
          {id:"quality",  label:"Quality",  icon:"✓"},
          {id:"alerts",   label:"Alerts",   icon:"🔔", badge:notifCount>0, cnt:notifCount},
          {id:"activity", label:"Activity", icon:"🕐"},
          {id:"vendors",  label:"Vendors",  icon:"🏢"},
        ].map(function(item){
          var active=tab===item.id;
          return(
            <button key={item.id} onClick={function(){setTab(item.id);setFilter("All");setSearchQuery("");setSelectedIds([]);setDateFrom("");setDateTo("");}}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:64,flexShrink:0,background:"transparent",border:"none",color:active?"#007AC2":"#9CA3AF",fontSize:10,fontWeight:active?700:500,cursor:"pointer",padding:"8px 6px",fontFamily:"Inter,sans-serif",position:"relative",borderTop:active?"2px solid #007AC2":"2px solid transparent",marginTop:-2}}>
              <span style={{fontSize:21,lineHeight:1.2}}>{item.icon}</span>
              <span>{item.label}</span>
              {item.badge&&<span style={{position:"absolute",top:4,right:"50%",transform:"translateX(14px)",width:16,height:16,borderRadius:"50%",background:"#E53935",fontSize:9,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{item.cnt>9?"9+":item.cnt}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
