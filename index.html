        <strong>Licence Breakup.</strong> Director list and Competent Person per licence — keep the director list current and verify the competent person for each licence.
      </div>
      <div style={{marginBottom:14}}><SearchBar value={q} onChange={setQ} placeholder="Search licence, company, competent person…"/></div>
      {rows.length===0?(
        <div style={{textAlign:"center",padding:"50px 20px",color:GRAY,fontSize:14}}>
          <div style={{width:54,height:54,borderRadius:14,background:"#EEF4FA",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12}}><i className="ti ti-certificate" aria-hidden="true" style={{fontSize:28,color:"#5B7A99"}}/></div>
          <div style={{fontWeight:700,color:DARK,marginBottom:6}}>No licences tracked here yet</div>
          <div style={{fontSize:12,maxWidth:360,margin:"0 auto"}}>Open any licence → Edit → turn on <strong>"Track CP &amp; Director"</strong> to include it in this view. Only licences that need CP/Director management appear here.</div>
        </div>
      ):rows.map(function(l){
        var editing=editId===l._docId;var dirs=l["Directors"]||[];var verified=l["Competent Verified"];
        return(
          <div key={l._docId} style={{background:"white",borderRadius:12,padding:"16px 18px",marginBottom:10,boxShadow:"0 1px 6px rgba(0,56,101,0.06)",borderLeft:"4px solid "+(verified?"#10B981":"#FBC02D")}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap",marginBottom:10}}>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontSize:14,fontWeight:800,color:DARK}}>{l["License / Agreement Name"]}</div>
                {l["Company"]&&<div style={{fontSize:12,color:GRAY,marginTop:2}}>{l["Company"]}</div>}
              </div>
              {canEdit&&!editing&&<button onClick={function(){startEdit(l);}} style={{padding:"7px 13px",background:"#EBF5FB",color:NAVY,border:"1px solid #BBDEFB",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>Edit Breakup</button>}
            </div>
            {!editing?(
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:14}}>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:5}}>Competent Person</div>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,fontWeight:700,color:NAVY}}>{l["Competent Person"]||"— not set —"}</span>
                    {verified?<span style={{fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:8,background:"#E8F5E9",color:"#1B5E20"}}>Verified{l["Competent Verified By"]?" · "+l["Competent Verified By"]:""}</span>:<span style={{fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:8,background:"#FEF3C7",color:"#92400E"}}>Not verified</span>}
                    {canEdit&&!verified&&l["Competent Person"]&&<button onClick={function(){verify(l);}} style={{padding:"4px 10px",background:"#10B981",color:"white",border:"none",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer"}}>Verify</button>}
                  </div>
                </div>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:5}}>Directors ({dirs.length})</div>
                  {dirs.length?<div style={{display:"flex",flexWrap:"wrap",gap:6}}>{dirs.map(function(dn,i){return <span key={i} style={{fontSize:12,padding:"3px 10px",background:"#F0F8FF",borderRadius:8,color:NAVY,fontWeight:600}}>{dn}</span>;})}</div>:<span style={{fontSize:12,color:GRAY}}>— none listed —</span>}
                </div>
              </div>
            ):(
              <div>
                <div style={{marginBottom:12}}>
                  <label style={{fontSize:10,fontWeight:700,color:NAVY,display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.07em"}}>Competent Person</label>
                  <input value={draft.competent} onChange={function(e){setDraft(function(d){return Object.assign({},d,{competent:e.target.value});});}} style={inp}/>
                </div>
                <label style={{fontSize:10,fontWeight:700,color:NAVY,display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.07em"}}>Directors</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                  {draft.directors.map(function(dn,i){return <span key={i} style={{fontSize:12,padding:"3px 6px 3px 10px",background:"#F0F8FF",borderRadius:8,color:NAVY,fontWeight:600,display:"inline-flex",alignItems:"center",gap:6}}>{dn}<button onClick={function(){rmDir(i);}} style={{border:"none",background:"#E3F2FD",borderRadius:6,width:18,height:18,cursor:"pointer",color:"#C62828",fontWeight:800,lineHeight:1}}>×</button></span>;})}
                  {draft.directors.length===0&&<span style={{fontSize:12,color:GRAY}}>No directors yet.</span>}
                </div>
                <div style={{display:"flex",gap:8,marginBottom:14}}>
                  <input value={draft.newDir} onChange={function(e){setDraft(function(d){return Object.assign({},d,{newDir:e.target.value});});}} onKeyDown={function(e){if(e.key==="Enter")addDir();}} placeholder="Add director name…" style={Object.assign({},inp,{flex:1})}/>
                  <button onClick={addDir} style={{padding:"8px 14px",background:"#EBF5FB",color:NAVY,border:"1px solid #BBDEFB",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>+ Add</button>
                </div>
                <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                  <button onClick={function(){setEditId(null);}} style={{padding:"9px 18px",fontSize:13,borderRadius:10,border:"1px solid #E0D4EC",background:"white",color:GRAY,cursor:"pointer"}}>Cancel</button>
                  <button onClick={function(){saveEdit(l);}} disabled={saving} style={{padding:"9px 20px",fontSize:13,background:"linear-gradient(135deg,#003865,#007AC2)",color:"white",border:"none",borderRadius:10,fontWeight:700,opacity:saving?0.6:1,cursor:"pointer"}}>{saving?"Saving…":"Save Breakup"}</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════
   NETWORK HEALTH CONTROL ROOM  (Head all-locations landing)
   Network health hero + network-wide priority actions + per-warehouse
   health cards (ring + module breakdown). Click a card → drill into that
   hub; click a priority row → jump to that hub + module. Read-only;
   reuses global helpers (daysUntil). onSelect(id, tab).
══════════════════════════════════════════ */
function HealthRing(props){
  var v=Math.max(0,Math.min(100,props.value||0)),r=22,c=2*Math.PI*r,off=c*(1-v/100),sz=props.size||52;
  return(
    <svg width={sz} height={sz} viewBox="0 0 52 52" style={{flexShrink:0}}>
      <circle cx="26" cy="26" r={r} fill="none" stroke="#E8EEF4" strokeWidth="5"/>
      <circle cx="26" cy="26" r={r} fill="none" stroke={props.color} strokeWidth="5" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} transform="rotate(-90 26 26)"/>
      <text x="26" y="30" textAnchor="middle" fontSize="13" fontWeight="800" fill={NAVY}>{v}%</text>
    </svg>
  );
}
function MiniBar(props){
  var empty=(props.n===0);
  var v=Math.max(0,Math.min(100,props.value||0)),col=v>=80?"#10B981":v>=55?"#F59E0B":"#EF4444";
  return(
    <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12}}>
      <span style={{width:60,color:GRAY,flexShrink:0}}>{props.label}</span>
      <span style={{flex:1,height:5,background:"#EEF2F6",borderRadius:3,overflow:"hidden"}}>{!empty&&<span style={{display:"block",width:v+"%",height:5,background:col,borderRadius:3}}/>}</span>
      <span style={{width:32,textAlign:"right",color:empty?"#B6C2CE":GRAY,flexShrink:0}}>{empty?"—":v+"%"}</span>
    </div>
  );
}
function LocationsOverview(props){
  var locations=props.locations||[],amc=props.amc||[],lic=props.lic||[],qual=props.qual||[],legal=props.legalCases||[],assets=props.assets||[];
  var onSelect=props.onSelect||function(){};
  // onRemind (RDM only): logs a follow-up/reminder for a priority action without
  // leaving the control room. Absent for view-only roles (Head / Company View).
  var onRemind=props.onRemind||null;
  var heroLabel=props.title||"All Hubs & CFAs · Network Health";
  var [remindedKeys,setRemindedKeys]=useState({});
  function doRemind(a,key,e){if(e)e.stopPropagation();if(!onRemind||remindedKeys[key])return;onRemind(a);var n=Object.assign({},remindedKeys);n[key]=true;setRemindedKeys(n);}
  function atLoc(arr,ids){return arr.filter(function(r){return r&&ids.indexOf(r.Location||r.locationId||"")>-1;});}
  function amcGood(t){var s=String(t["Status"]);return["Completed","Validated","Submitted","Planned"].indexOf(s)>-1||(s==="Pending"&&daysUntil(t["Next Service Due Date"])>0);}
  function licGood(t){return String(t["Status"])==="Active";}
  function qualGood(t){var s=String(t["Status"]);return["Completed","Validated","Planned","Submitted"].indexOf(s)>-1||(s==="Pending"&&daysUntil(t["Scheduled Date"])>=0);}
  function pct(g,tot){return tot>0?Math.round(g/tot*100):100;}
  function rag(p){return p>=80?"#10B981":p>=55?"#F59E0B":"#EF4444";}
  function hubStats(ids){
    var a=atLoc(amc,ids),l=atLoc(lic,ids),q=atLoc(qual,ids),lg=atLoc(legal,ids),as=atLoc(assets,ids);
    var aG=a.filter(amcGood).length,lG=l.filter(licGood).length,qG=q.filter(qualGood).length;
    var tot=a.length+l.length+q.length,good=aG+lG+qG;
    var overdue=a.filter(function(t){return String(t["Status"])==="Overdue";}).length+l.filter(function(t){return String(t["Status"])==="Expired";}).length+q.filter(function(t){return String(t["Status"])==="Overdue";}).length;
    var next=null;
    a.forEach(function(t){var d=daysUntil(t["Next Service Due Date"]);if(d!==null&&d>=0&&["Completed","Validated"].indexOf(String(t["Status"]))<0&&(!next||d<next.d))next={d:d,name:t["Equipment Name"]||"AMC service"};});
    l.forEach(function(t){if(String(t["Expiry Date"])==="Lifetime")return;var d=daysUntil(t["Expiry Date"]);if(d!==null&&d>=0&&String(t["Status"])==="Active"&&(!next||d<next.d))next={d:d,name:t["License / Agreement Name"]||"Licence"};});
    var openLegal=lg.filter(function(c){return["Settled","Closed","Dismissed"].indexOf(String(c.status))<0;}).length;
    return{records:tot,score:pct(good,tot),amc:pct(aG,a.length),lic:pct(lG,l.length),qual:pct(qG,q.length),amcN:a.length,licN:l.length,qualN:q.length,overdue:overdue,next:next,assets:as.length,openLegal:openLegal,hasData:(tot>0||as.length>0||lg.length>0)};
  }
  var hubs=locations.map(function(L){var ids=L.ids||[L.id];return{id:L.id,ids:ids,name:L.name,type:(/cfa/i.test(L.name)?"CFA":"Hub"),s:hubStats(ids)};});
  hubs.sort(function(a,b){if(a.s.hasData!==b.s.hasData)return a.s.hasData?-1:1;return a.s.score-b.s.score;});
  // network roll-up
  var allG=amc.filter(amcGood).length+lic.filter(licGood).length+qual.filter(qualGood).length;
  var allTot=amc.length+lic.length+qual.length;
  var netScore=pct(allG,allTot);
  var netOverdue=amc.filter(function(t){return String(t["Status"])==="Overdue";}).length+lic.filter(function(t){return String(t["Status"])==="Expired";}).length+qual.filter(function(t){return String(t["Status"])==="Overdue";}).length;
  var onTrack=0,watch=0,critical=0;
  hubs.forEach(function(h){if(!h.s.hasData)return;if(h.s.score>=80)onTrack++;else if(h.s.score>=55)watch++;else critical++;});
  var netColor=rag(netScore),netLabel=netScore>=80?"Good standing":netScore>=55?"Needs attention":"Critical";
  // network-wide priority actions — overdue/expired + expiring within 30d
  var actions=[];
  hubs.forEach(function(h){
    atLoc(amc,h.ids).forEach(function(t){if(String(t["Status"])==="Overdue"){var d=daysUntil(t["Next Service Due Date"]);actions.push({id:h.id,hub:h.name,tab:"amc",tag:"AMC",label:t["Equipment Name"]||"AMC service",note:(d!==null?Math.abs(d)+"d overdue":"overdue"),order:(d!==null?d:-1),overdue:true,who:String(t["Assigned To"]||"")});}});
    atLoc(lic,h.ids).forEach(function(t){if(String(t["Status"])==="Expired"){actions.push({id:h.id,hub:h.name,tab:"licenses",tag:"LIC",label:t["License / Agreement Name"]||"Licence",note:"expired",order:-1000,overdue:true,who:String(t["Assigned To"]||"")});}else if(String(t["Expiry Date"])!=="Lifetime"&&String(t["Status"])==="Active"){var d=daysUntil(t["Expiry Date"]);if(d!==null&&d>=0&&d<=30)actions.push({id:h.id,hub:h.name,tab:"licenses",tag:"LIC",label:t["License / Agreement Name"]||"Licence",note:"expires in "+d+"d",order:d,overdue:false,who:String(t["Assigned To"]||"")});}});
    atLoc(qual,h.ids).forEach(function(t){if(String(t["Status"])==="Overdue"){var d=daysUntil(t["Scheduled Date"]);actions.push({id:h.id,hub:h.name,tab:"quality",tag:"QUAL",label:t["Activity Name"]||"Quality activity",note:(d!==null?Math.abs(d)+"d overdue":"overdue"),order:(d!==null?d:-1),overdue:true,who:String(t["Assigned To"]||"")});}});
  });
  actions.sort(function(a,b){return a.order-b.order;});
  var overdueActions=actions.filter(function(a){return a.overdue;});
  var expiringActions=actions.filter(function(a){return !a.overdue;});
  // RDM-mode extras: accountability by person + audit readiness
  var rdmMode=!!onRemind;
  var byPerson={};
  if(rdmMode){
    overdueActions.forEach(function(a){var k=a.who||"Unassigned";if(!byPerson[k])byPerson[k]={name:k,open:0,items:[],worst:0};byPerson[k].open++;byPerson[k].items.push(a.tag+" · "+a.label);var age=parseInt(a.note)||0;if(age>byPerson[k].worst)byPerson[k].worst=age;});
  }
  var people=Object.keys(byPerson).map(function(k){return byPerson[k];}).sort(function(a,b){return b.open-a.open||b.worst-a.worst;});
  var eligAmc=amc.filter(function(t){return["Submitted","Validated","Completed"].indexOf(String(t["Status"]))>-1;});
  var withEv=eligAmc.filter(function(t){return !!t["Evidence File"];});
  var auditPct=eligAmc.length>0?Math.round(withEv.length/eligAmc.length*100):100;
  var [showMoreOverdue,setShowMoreOverdue]=useState(false);
  var [showMoreExpiring,setShowMoreExpiring]=useState(false);
  var [showMorePeople,setShowMorePeople]=useState(false);
  var LIMIT=8;
  var visOverdue=showMoreOverdue?overdueActions:overdueActions.slice(0,LIMIT);
  var visExpiring=showMoreExpiring?expiringActions:expiringActions.slice(0,LIMIT);
  var visPeople=showMorePeople?people:people.slice(0,6);
  var chip=function(n,col,bg,lbl){return(<div style={{textAlign:"center",background:"rgba(255,255,255,0.12)",borderRadius:10,padding:"8px 14px"}}><div style={{fontSize:20,fontWeight:900,color:col,lineHeight:1}}>{n}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.7)",marginTop:3}}>{lbl}</div></div>);};
  function ActionRow(p){var a=p.a,i=p.i,od=a.overdue;var rkey=a.id+"|"+a.tag+"|"+a.label;var rdone=!!remindedKeys[rkey];return(
    <div onClick={function(){onSelect(a.id,a.tab);}} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderTop:i>0?"1px solid #F0F6FB":"none",cursor:"pointer"}}>
      <span style={{fontSize:9,fontWeight:800,color:od?"#991B1B":"#92400E",background:od?"#FEE2E2":"#FEF3C7",padding:"2px 7px",borderRadius:5,flexShrink:0}}>{a.tag}</span>
      <span style={{fontSize:11,color:"#1E3A5F",fontWeight:700,flexShrink:0,minWidth:80}}>{a.hub}</span>
      <span style={{flex:1,minWidth:0,fontSize:13,color:DARK,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.label}</span>
      {a.who&&<span style={{fontSize:11,color:GRAY,flexShrink:0,maxWidth:110,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.who}</span>}
      <span style={{fontSize:12,fontWeight:700,color:od?"#C62828":"#92400E",flexShrink:0,minWidth:60,textAlign:"right"}}>{a.note}</span>
      {onRemind&&<button onClick={function(e){doRemind(a,rkey,e);}} style={{fontSize:11,fontWeight:700,padding:"4px 11px",borderRadius:8,border:rdone?"1px solid #BBE7CB":"1px solid #BBDEFB",background:rdone?"#EAF7EF":"white",color:rdone?"#15803D":"#005A9E",cursor:rdone?"default":"pointer",flexShrink:0,fontFamily:"Inter,sans-serif",display:"inline-flex",alignItems:"center",gap:4}}>{rdone&&<i className="ti ti-check" aria-hidden="true" style={{fontSize:12}}/>}{rdone?"Reminded":"Remind"}</button>}
      <span style={{fontSize:14,color:"#CBD5E1",flexShrink:0}}>›</span>
    </div>
  );}
  return(
    <div style={{maxWidth:1040,margin:"0 auto"}}>
      {/* ── Compact network stats bar ── */}
      <div style={{background:"white",borderRadius:14,padding:"14px 20px",marginBottom:14,boxShadow:"0 1px 8px rgba(0,56,101,0.07)",border:"1px solid #E3EEF7",borderLeft:"4px solid "+netColor,display:"flex",alignItems:"center",flexWrap:"wrap",gap:20}}>
        <div style={{minWidth:160}}>
          <div style={{fontSize:9,fontWeight:700,color:GRAY,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:3}}>{heroLabel}</div>
          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
            <span style={{fontSize:28,fontWeight:900,color:netColor,lineHeight:1}}>{netScore}%</span>
            <span style={{fontSize:11,fontWeight:700,color:netColor,background:netColor+"18",padding:"2px 10px",borderRadius:20}}>{netLabel}</span>
          </div>
        </div>

function App(){

  useEffect(function(){
    var timer=setTimeout(function(){setAuthReady(true);},4000);
    var unsub=auth.onAuthStateChanged(function(firebaseUser){
      clearTimeout(timer);
      if(firebaseUser){
        // Secure login mints a token whose uid IS the user's document id.
        db.collection("users").doc(firebaseUser.uid).get().then(function(doc){
          if(doc.exists){
            var u=doc.data();
            var role=String(u.role||"Staff");
            setAuthUser({name:String(u.fullName||u.username||"User"),role:role,email:String(u.email||""),username:String(u.username||""),locationId:String(u.locationId||""),locationIds:(Array.isArray(u.locationIds)?u.locationIds.map(String):[]),locationName:(String(u.locationId||"")==="all")?"All Hubs & CFAs":String(u.locationName||u.location||"Indore Hub")});
            // Default landing: Dashboard for everyone (per user request).
            setAuthReady(true);
          }else{
            // No profile for this id — sign out rather than guess a role.
            console.error("[onAuthStateChanged] no user profile for uid",firebaseUser.uid);
            auth.signOut();setAuthUser(null);setAuthReady(true);
          }
        }).catch(function(e){console.error("[onAuthStateChanged] profile fetch failed:",e);auth.signOut();setAuthUser(null);setAuthReady(true);});
      }else{setAuthUser(null);setAuthReady(true);}
    });
    return function(){unsub();clearTimeout(timer);};
  },[]);

  function addToast(msg,type){var id=Date.now()+Math.random();setToasts(function(t){return t.concat([{id:id,msg:msg,type:type||"success"}]);});setTimeout(function(){setToasts(function(t){return t.filter(function(x){return x.id!==id;});});},3000);}

  async function loadData(){
    setLoading(true);setLoadErr("");
    try{
      var locId=authUser?authUser.locationId:"";
      var aRole=authUser?authUser.role:"";if(aRole==="Operator")aRole="Staff";
      // Scope the one-shot refresh the SAME way the realtime listeners do, otherwise a
      // Head (locationId "all") or multi-hub overseer would fetch where("locationId","==","all"),
      // match zero records, and wipe the lists. null/[] = no filter = all hubs.
      var ids=null;
      if(focusLoc){ids=[focusLoc];}
      else if(aRole==="Head"||locId==="all"){ids=null;}
      else if((aRole==="RDM"||aRole==="Company View")&&Array.isArray(authUser.locationIds)&&authUser.locationIds.length){ids=authUser.locationIds.slice();}
      else if(aRole==="Company View"){ids=null;}
      else{ids=locId?[locId]:null;}
      async function fetchScoped(coll){
        if(!ids)return await fetchFromFirestore(coll,"");
        var out=[];for(var i=0;i<ids.length;i++){out=out.concat(await fetchFromFirestore(coll,ids[i]));}return out;
      }
      var ra=await fetchScoped("amc");
      var rl=await fetchScoped("licences");
      var rq=await fetchScoped("quality");
      setAmc(ra.map(function(t){var d=daysUntil(t["Next Service Due Date"]);if(d!==null&&d<0&&String(t["Status"])==="Pending")return Object.assign({},t,{Status:"Overdue"});return t;}));
      setLic(rl.map(function(t){if(t["Expiry Date"]&&String(t["Expiry Date"])!=="Lifetime"){var d=daysUntil(t["Expiry Date"]);if(d!==null&&d<0&&String(t["Status"])==="Active")return Object.assign({},t,{Status:"Expired"});}return t;}));
      setQual(rq.filter(function(t){return t["Activity Name"];}));
      var ral=await fetchActivityLog((ids&&ids.length===1)?ids[0]:"",50);setActivityLog(ral);
      if(ra.length===0&&rl.length===0)setLoadErr("Data not loaded. Click Refresh.");
    }catch(e){console.error("[loadData] catch:",e.code,e.message);setLoadErr("Error loading. Click Refresh.");}
    finally{setLoading(false);}
  }

  async function loadKpiLogs(){
    setKpiLoading(true);
    try{var locId=authUser?authUser.locationId:"";var logs=await fetchActivityLog(locId,100);setKpiLogs(logs);addToast("Loaded "+logs.length+" activity records","success");}
    catch(e){console.error("loadKpiLogs error",e);addToast("Failed to load KPI data","error");}

    catch(e){console.error("loadMoreActivity error",e);addToast("Failed to load more","error");}

  async function deleteActivity(log){
    if(!log||!log.id){addToast("Cannot delete this entry","error");return;}
    if(!window.confirm("Delete this activity log entry? This cannot be undone."))return;
    try{
      await db.collection("activityLog").doc(log.id).delete();
      setActivityLog(function(prev){return prev.filter(function(x){return x.id!==log.id;});});
      addToast("Activity entry deleted","info");
    }catch(e){console.error("deleteActivity error",e);addToast("Delete failed: "+((e&&e.message)||e),"error");}
  }
  async function saveEditLog(){
    if(!editLog||!editLog.id){setEditLog(null);return;}
    try{
      var patch={recordName:editLog.recordName||"",details:editLog.details||"",sheet:editLog.sheet||""};
      await db.collection("activityLog").doc(editLog.id).update(patch);
      setActivityLog(function(prev){return prev.map(function(x){return x.id===editLog.id?Object.assign({},x,patch):x;});});
      addToast("Activity entry updated","success");
      setEditLog(null);
    }catch(e){console.error("saveEditLog error",e);addToast("Update failed: "+((e&&e.message)||e),"error");}
  }
  function exportActivityLog(){
    try{
      var jspdf=window.jspdf;if(!jspdf){alert("PDF library not loaded.");return;}
      var rows=activityLog.slice();
      if(activityFilter!=="All")rows=rows.filter(function(l){return l.sheet===activityFilter;});
      var q=activitySearch.trim().toLowerCase();
      if(q)rows=rows.filter(function(l){return (String(l.recordName||"")+" "+String(l.user||"")+" "+String(l.details||"")+" "+String(l.action||"")).toLowerCase().includes(q);});
      var doc=new jspdf.jsPDF({orientation:"landscape"});var pageW=297;
      doc.setFillColor(0,56,101);doc.rect(0,0,pageW,18,"F");doc.setFontSize(11);doc.setTextColor(255,255,255);
      doc.text("Posh Compliance — Audit / Activity Log",14,11);

      var cols=[["#","Date / Time","User","Role","Module","Action","Record","Details"]];
      var body=rows.map(function(l,i){return[String(i+1),l.timestamp?new Date(l.timestamp).toLocaleString("en-IN"):"—",l.user||"—",l.role||"—",l.sheet||"—",l.action||"—",l.recordName||"—",l.details||"—"];});
      doc.autoTable({head:cols,body:body,startY:28,styles:{fontSize:7,cellPadding:2,overflow:"linebreak"},headStyles:{fillColor:[0,56,101],textColor:[255,255,255],fontStyle:"bold",fontSize:7.5},alternateRowStyles:{fillColor:[245,250,255]},columnStyles:{0:{cellWidth:8}},margin:{left:14,right:14},foot:[[{content:"Total: "+body.length+" entries  ·  Exported "+new Date().toLocaleDateString("en-IN"),colSpan:8,styles:{halign:"right",fontSize:7,textColor:[150,150,150]}}]],footStyles:{fillColor:[248,250,252]}});
      doc.save("PCT_AuditLog_"+new Date().toISOString().split("T")[0]+".pdf");
    }catch(e){alert("PDF error: "+e.message);}

  async function fetchUsers(){

  async function seedDemoData(){
    if(!window.confirm("Load demo training data?\n\nBuilds a training record for every active staff member across all Quality SOPs (plus Pest Control, Facility Maintenance, Material Control) with a realistic mix of statuses.\n\nExisting records are skipped — safe to run more than once."))return;

      var emps=(usersList&&usersList.length)?usersList.map(function(u){return u.name;}):[authUser.name];
      var existing={};training.forEach(function(t){existing[(t["Employee Name"]||"")+"||"+(t["SOP Name"]||"")]=true;});
      function ds(off){var d=new Date();d.setDate(d.getDate()+off);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
      var depts=["Warehouse","Quality Assurance","Cold Chain","Dispatch","Stores"];
      var created=0,skipped=0;
      for(var ei=0;ei<emps.length;ei++){
        for(var si=0;si<sops.length;si++){
          var key=emps[ei]+"||"+sops[si];
          if(existing[key]){skipped++;continue;}
          var roll=(ei*3+si*7)%10;
          var rec={employeeName:emps[ei],department:depts[ei%depts.length],sopName:sops[si],mandatory:(si%4!==0),frequency:"Annual",trainerName:"Demo Trainer",locationId:locId,assignedDate:ds(-120)};
          if(roll<=4){rec.completionDate=ds(-(30+roll*20));rec.nextDueDate=calcNextDate("Annual",rec.completionDate);rec.remarks="Training completed and verified.";}
          else if(roll===5||roll===6){rec.completionDate=ds(-400);rec.nextDueDate=ds(-(5+roll*4));rec.remarks="Annual validity lapsed — retraining required.";}
          else if(roll===7||roll===8){rec.completionDate="";rec.nextDueDate="";rec.remarks="Assigned — awaiting completion.";}
          else{skipped++;continue;}
          await db.collection("training").add(rec);existing[key]=true;created++;
        }
      }
      await logActivity("add","Training","Demo seed","Seeded "+created+" demo training records by "+authUser.name,authUser.name,authUser.role,locId);
      addToast("Demo data loaded: "+created+" records added"+(skipped?" ("+skipped+" skipped/gaps)":""),"success");
    }catch(e){console.error("[seedDemoData] error:",e);addToast("Seeding failed — "+(e.message||"try again"),"error");}
    finally{setSaving(false);}
  }

    setEditUser(null);addToast("User updated","success");fetchAllUsers();
  }
  // Head-only: (re)assign the set of hubs an RDM oversees. locationIds are sent

  async function handleResetUserPassword(docId,newPw){try{var ru=resetPwUser||{};var uname=ru.username||"";await fns.httpsCallable("setPassword")({targetUsername:uname,newPassword:newPw});setResetPwUser(null);addToast("Password reset successfully","success");setCredModal({password:newPw,loginUrl:window.location.origin,users:[{username:uname,fullName:ru.name||"",role:ru.role||"",locationName:ru.locationName||""}]});}catch(e){console.error("[handleResetUserPassword] error:",e);addToast(authErrMsg(e),"error");}}
  async function handleChangePassword(currentPw,newPw){

  async function handleConfirmDelete(){

    catch(e){console.error("handleConfirmDelete error:",e);addToast("Archive failed — try again","error");setSaving(false);}
  }
  async function handleHardDelete(){
    setSaving(true);
    try{var collName=deleteRecord.sheet==="AMC"?"amc":deleteRecord.sheet==="Licenses"?"licences":"quality";var docId=deleteRecord.record["_docId"];var recName=deleteRecord.record["Equipment Name"]||deleteRecord.record["License / Agreement Name"]||deleteRecord.record["Activity Name"]||"Record";if(docId){await db.collection(collName).doc(docId).delete();}await logActivity("delete",deleteRecord.sheet,recName,"Permanently deleted by "+authUser.name,authUser.name,authUser.role,authUser.locationId||"");setSaving(false);addToast("Record permanently deleted","info");setDeleteRecord(null);}

  function exportPDF(){
    try{
      var jspdf=window.jspdf;if(!jspdf){alert("PDF library not loaded.");return;}
      var isLandscape=(tab==="amc"||tab==="quality");var doc=new jspdf.jsPDF({orientation:isLandscape?"landscape":"portrait"});var pageW=isLandscape?297:210;
      doc.setFillColor(0,56,101);doc.rect(0,0,pageW,18,"F");doc.setFontSize(11);doc.setTextColor(255,255,255);
      var tabLabel=tab==="amc"?"AMC Equipment":tab==="licenses"?"Licences & Agreements":tab==="quality"?"Quality Activities":"Report";
      doc.text("Posh Compliance Report — "+tabLabel,14,11);doc.setFontSize(8);doc.setTextColor(180,210,240);doc.text("Posh Enterprises · Compliance Tracker",14,16);
      doc.setFontSize(8);doc.setTextColor(107,114,128);doc.text("Generated: "+new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})+"   |   By: "+authUser.name+"   |   Role: "+authUser.role,14,24);
      var rows=[],cols=[];
      var exportAmc=amc.filter(function(t){return filter==="All"||String(t["Status"])===filter;}).filter(function(t){if(!searchQuery)return true;var q=searchQuery.toLowerCase();return(t["Equipment Name"]||"").toLowerCase().includes(q)||(t["Vendor Name"]||"").toLowerCase().includes(q);});
      var exportLic=lic.filter(function(t){return filter==="All"||String(t["Status"])===filter;}).filter(function(t){if(!searchQuery)return true;var q=searchQuery.toLowerCase();return(t["License / Agreement Name"]||"").toLowerCase().includes(q)||(t["Company"]||"").toLowerCase().includes(q);});
      if(tab==="amc"){cols=[["#","Equipment Name","Serial No","Vendor","Contact No","AMC Period","Frequency","Due Date","Assigned","Status"]];rows=exportAmc.map(function(t,i){return[String(i+1),t["Equipment Name"]||"",t["Serial No"]||"—",t["Vendor Name"]||"",t["Vendor Contact No"]?fmtPhone(t["Vendor Contact No"]):"—",t["AMC Period"]||"—",t["Frequency"]||"",fmtDate(t["Next Service Due Date"]),t["Assigned To"]||"—",t["Status"]||""];});}
      else if(tab==="licenses"){cols=[["#","Licence / Agreement Name","Company","Licence No","Contact Person","Issue Year","Expiry Date","Renewal Due","Status"]];rows=exportLic.map(function(t,i){return[String(i+1),t["License / Agreement Name"]||"",t["Company"]||"",t["License No / Key"]||"—",t["Contact Person"]||"—",t["Issue Year"]||"—",fmtDate(t["Expiry Date"]),t["Renewal Due Date"]?fmtDate(t["Renewal Due Date"]):"—",t["Status"]||""];});}
      else if(tab==="quality"){cols=[["#","Activity Name","Type","Frequency","Scheduled Date","Assigned To","Status"]];var allQual=qual.filter(function(t){if(!searchQuery)return true;var q=searchQuery.toLowerCase();return(t["Activity Name"]||"").toLowerCase().includes(q)||(t["Activity Type"]||"").toLowerCase().includes(q);});rows=allQual.map(function(t,i){return[String(i+1),t["Activity Name"]||"",t["Activity Type"]||"",t["Frequency"]||"",t["Scheduled Date"]?fmtDate(t["Scheduled Date"]):"—",t["Assigned To"]||"—",t["Status"]||""];});}
      var statusColours={Overdue:[254,226,226],Expired:[254,226,226],Pending:[254,243,199],Planned:[219,234,254],Submitted:[235,245,251],Validated:[209,250,229],Completed:[209,250,229],Active:[209,250,229]};
      doc.autoTable({head:cols,body:rows,startY:28,styles:{fontSize:7.5,cellPadding:2.5,overflow:"linebreak"},headStyles:{fillColor:[0,56,101],textColor:[255,255,255],fontStyle:"bold",fontSize:8},alternateRowStyles:{fillColor:[245,250,255]},didParseCell:function(data){if(data.section==="body"){var statusVal=String(rows[data.row.index]?.[rows[data.row.index].length-1]||"");var clr=statusColours[statusVal];if(clr)data.cell.styles.fillColor=clr;}},columnStyles:{0:{cellWidth:8}},margin:{left:14,right:14},foot:[[{content:"Total: "+rows.length+" records  ·  Exported "+new Date().toLocaleDateString("en-IN"),colSpan:cols[0].length,styles:{halign:"right",fontSize:7,textColor:[150,150,150]}}]],footStyles:{fillColor:[248,250,252]}});
      var filename="PCT_"+(tab==="amc"?"AMC":tab==="licenses"?"Licences":"Quality")+"_"+new Date().toISOString().split("T")[0]+".pdf";doc.save(filename);
    }catch(e){alert("PDF error: "+e.message);}
  }

  var dispAmc=amc.filter(function(t){return filter==="All"||String(t["Status"])===filter;}).filter(function(t){if(!searchQuery)return true;var q=searchQuery.toLowerCase();return(t["Equipment Name"]||"").toLowerCase().includes(q)||(t["Vendor Name"]||"").toLowerCase().includes(q)||(t["Status"]||"").toLowerCase().includes(q)||(t["Assigned To"]||"").toLowerCase().includes(q);}).filter(function(t){var d=t["Next Service Due Date"];if(!dateFrom&&!dateTo)return true;if(!d)return true;var dt=new Date(d);if(dateFrom&&dt<new Date(dateFrom))return false;if(dateTo&&dt>new Date(dateTo))return false;return true;});
  var dispLic=lic.filter(function(t){return filter==="All"||String(t["Status"])===filter;}).filter(function(t){if(!searchQuery)return true;var q=searchQuery.toLowerCase();return(t["License / Agreement Name"]||"").toLowerCase().includes(q)||(t["Company"]||"").toLowerCase().includes(q)||(t["Status"]||"").toLowerCase().includes(q);}).filter(function(t){var d=t["Expiry Date"];if(!dateFrom&&!dateTo)return true;if(!d||d==="Lifetime")return true;var dt=new Date(d);if(dateFrom&&dt<new Date(dateFrom))return false;if(dateTo&&dt>new Date(dateTo))return false;return true;});

  /* derived: SOP validation for action modal submit button */
  var submitOK=modal&&modal.key==="submit"?(!!evidenceFile||comment.trim().length>=5):true;
  var validateOK=modal&&modal.key==="validate"?comment.trim().length>=10:true;

  var qreopenOK=modal&&modal.key==="qreopen"?!!planDate:true;

  return(
    <div style={{display:"flex",minHeight:"100vh",background:"#F0F8FF"}}>

      {/* ── ACTION MODAL (SOP-enforced + auto-schedule) ── */}

        <div className="modal-ov">
          <div className="modal-box">
            <div style={{padding:"24px 24px 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>

                  <div style={{fontSize:10,fontWeight:700,color:BLUE,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>{modal.sheet} · Action</div>
                  <div style={{fontSize:18,fontWeight:800,color:DARK}}>{modal.task["Equipment Name"]||modal.task["License / Agreement Name"]||modal.task["Activity Name"]}</div>

              </div>
              <div style={{background:"#F0F8FF",borderRadius:12,padding:"14px 16px",marginBottom:18,fontSize:13}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px"}}>
                  {modal.task["Vendor Name"]&&<div><span style={{color:GRAY}}>Vendor: </span><strong>{modal.task["Vendor Name"]}</strong></div>}
                  {modal.task["Next Service Due Date"]&&<div><span style={{color:GRAY}}>Due: </span><strong style={{color:BLUE}}>{fmtDate(modal.task["Next Service Due Date"])}</strong></div>}
                  {modal.task["Expiry Date"]&&<div><span style={{color:GRAY}}>Expires: </span><strong style={{color:BLUE}}>{fmtDate(modal.task["Expiry Date"])}</strong></div>}
                  {modal.task["Frequency"]&&<div><span style={{color:GRAY}}>Frequency: </span>{modal.task["Frequency"]}</div>}
                  {modal.task["Assigned To"]&&<div><span style={{color:GRAY}}>Assigned: </span><strong style={{color:"#6D28D9"}}>{modal.task["Assigned To"]}</strong></div>}
                  <div style={{gridColumn:"1/-1"}}><span style={{color:GRAY}}>Status: </span><Badge status={String(modal.task["Status"])}/></div>
                </div>
              </div>
              {modal.task["Evidence File"]&&<a href={modal.task["Evidence File"]} target="_blank" rel="noopener noreferrer" style={{marginBottom:14,padding:"10px 14px",background:"#EBF5FB",borderRadius:10,fontSize:13,color:"#003865",fontWeight:600,display:"block",textDecoration:"none"}}>Open Evidence File</a>}
              {Array.isArray(modal.task["Evidence History"])&&modal.task["Evidence History"].length>0&&(
                <div style={{marginBottom:14,padding:"10px 14px",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:GRAY,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Past evidence ({modal.task["Evidence History"].length})</div>
                  {modal.task["Evidence History"].slice().reverse().map(function(h,hi){return(
                    <div key={hi} style={{fontSize:12,color:DARK,padding:"3px 0",display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{color:GRAY,flexShrink:0}}>{h.cycleDueDate?fmtDate(h.cycleDueDate):(h.submittedOn?fmtDate(h.submittedOn):"cycle")}</span>
                      {h.evidenceFile?<a href={h.evidenceFile} target="_blank" rel="noopener noreferrer" style={{color:BLUE,fontWeight:600}}>file</a>:<span style={{color:"#9CA3AF"}}>no file</span>}
                      {h.submittedBy&&<span style={{color:GRAY}}>· {h.submittedBy}</span>}
                    </div>
                  );})}
                </div>
              )}
              {modal.task["Remarks"]&&<div style={{marginBottom:14,fontSize:13,color:GRAY,fontStyle:"italic",padding:"10px 14px",background:"#F0F8FF",borderRadius:10}}>{modal.task["Remarks"]}</div>}

              {modal.key==="plan"&&<div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,color:DARK,display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>Planned Vendor Visit Date</label><input type="date" value={planDate} onChange={function(e){setPlanDate(e.target.value);}} style={{width:"100%",padding:"12px 16px",border:"2px solid #E3F2FD",borderRadius:10,fontSize:14,color:DARK}}/></div>}
              {modal.key==="renew"&&<div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,color:"#2E7D32",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>New Expiry Date <span style={{color:"#EF4444"}}>*</span></label><input type="date" value={planDate} onChange={function(e){setPlanDate(e.target.value);}} style={{width:"100%",padding:"12px 16px",border:"2px solid #C8E6C9",borderRadius:10,fontSize:14,color:DARK}}/><div className="help-text">This updates the expiry date and marks the licence Active. System auto-alerts 30 days before this date.</div></div>}
              {modal.key==="renew"&&(
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,fontWeight:700,color:DARK,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.07em"}}>Attach Renewed Licence Document <span style={{fontWeight:400,color:"#9CA3AF",textTransform:"none",letterSpacing:0}}>(recommended)</span></label>
                  <input type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx" onChange={function(e){setEvidenceFile(e.target.files[0]||null);}} style={{width:"100%",padding:"10px 14px",border:"2px solid #C8E6C9",borderRadius:10,fontSize:13,color:DARK,background:"white",boxSizing:"border-box"}}/>
                  {evidenceFile?<div className="sop-ok" style={{marginTop:8}}><i className="ti ti-circle-check" aria-hidden="true" style={{marginRight:5,verticalAlign:"-1px"}}/>Document ready: {evidenceFile.name} ({(evidenceFile.size/1024).toFixed(1)} KB)</div>:<div className="help-text">Upload the renewed licence / certificate (PDF or photo) as audit proof. It will be saved against this record.</div>}
                  {!storage&&<div className="sop-warn" style={{marginTop:8}}><i className="ti ti-alert-triangle" aria-hidden="true" style={{marginRight:5,verticalAlign:"-1px"}}/>Firebase Storage not enabled — file upload unavailable. Expiry date will still be saved.</div>}

              {modal.key==="schedule"&&<div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,color:"#7C3AED",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>Next Service Due Date</label><input type="date" value={planDate} onChange={function(e){setPlanDate(e.target.value);}} style={{width:"100%",padding:"12px 16px",border:"2px solid #DDD6FE",borderRadius:10,fontSize:14,color:DARK}}/></div>}
              {modal.key==="qreopen"&&<div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,color:"#7C3AED",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>Next Scheduled Date <span style={{color:"#EF4444"}}>*</span></label><input type="date" value={planDate} onChange={function(e){setPlanDate(e.target.value);}} style={{width:"100%",padding:"12px 16px",border:"2px solid #DDD6FE",borderRadius:10,fontSize:14,color:DARK}}/><div className="help-text">Re-opens this activity for the next cycle (status → Pending) so it can be actioned again.</div></div>}

              {modal.key==="sendback"&&<button onClick={handleAction} disabled={saving||!sendbackOK} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#C62828,#E53935)",color:"white",border:"none",borderRadius:10,fontWeight:700,opacity:(!sendbackOK||saving)?0.5:1}}>{saving?"Saving…":"Send Back"}</button>}
              {modal.key==="qcomplete"&&<button onClick={handleAction} disabled={saving} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#2E7D32,#43A047)",color:"white",border:"none",borderRadius:10,fontWeight:700,opacity:saving?0.5:1}}>{saving?"Saving…":"Mark Complete"}</button>}

              {modal.key==="qreopen"&&<button onClick={handleAction} disabled={saving||!qreopenOK} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#7C3AED,#8B5CF6)",color:"white",border:"none",borderRadius:10,fontWeight:700,opacity:(!qreopenOK||saving)?0.5:1}}>{saving?"Saving…":"Reopen Cycle"}</button>}
            </div>
          </div>

                            var s2=String(task["Status"]||"Pending");var isRowOpen=expanded["qrow_"+section+"_"+idx];var isDone=s2==="Completed"||s2==="Validated";var isOverdue=s2==="Overdue";var d=daysUntil(task["Scheduled Date"]);
                            var rlc=isOverdue?"#EF4444":s2==="Pending"&&d!==null&&d<=3?"#FBC02D":(isDone)?"#10B981":s2==="Planned"?"#3B82F6":"#90CAF9";var acts=getActions(task,"Quality");
                            return(
                              <div key={idx} style={{margin:"0 12px 6px",borderRadius:8,border:"1px solid #EBF5FB",borderLeft:"3px solid "+rlc,background:"#FAFCFF",overflow:"hidden"}}>
                                <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={function(){toggleExp("qrow_"+section+"_"+idx);}}>
                                  <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:isOverdue?"#991B1B":DARK,marginBottom:2,textDecoration:"none",opacity:isDone?0.85:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{String(task["Activity Name"]||"")}</div><div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}><Badge status={smartStatus(s2,d)}/>{task["Sub-Category"]&&<span style={{fontSize:10,color:"#0277BD",background:"#E1F5FE",padding:"1px 8px",borderRadius:8,fontWeight:600}}>{task["Sub-Category"]}</span>}{ragChip(task)}{task["Frequency"]&&<span style={{fontSize:10,color:GRAY,background:"#F0F8FF",padding:"1px 8px",borderRadius:8}}>{task["Frequency"]}</span>}{d!==null&&<span style={{fontSize:11,fontWeight:700,color:d<0?"#C62828":d<=3?"#E65100":"#6B7280"}}>{d<0?Math.abs(d)+"d overdue":d===0?"Today":d===1?"Tomorrow":"In "+d+"d"}</span>}{task["Assigned To"]&&<span style={{fontSize:10,color:"#6D28D9",background:"#F3E8FF",padding:"1px 7px",borderRadius:8,fontWeight:600,display:"inline-flex",alignItems:"center",gap:3}}><i className="ti ti-user" aria-hidden="true" style={{fontSize:11}}/>{task["Assigned To"]}</span>}</div></div>
                                  <span style={{fontSize:14,color:GRAY,transform:isRowOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s",display:"inline-flex"}}><i className="ti ti-chevron-down" aria-hidden="true"/></span>
                                </div>
                                {isRowOpen&&(
                                  <div style={{padding:"12px 16px",borderTop:"1px solid #EBF5FB",background:"white"}}>
                                    {task["Description"]&&<div style={{fontSize:12,color:GRAY,lineHeight:1.6,marginBottom:12,padding:"8px 12px",background:"#F8FAFC",borderRadius:8}}>{task["Description"]}</div>}
                                    <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                                      {!isViewer&&acts.map(function(a){return <button key={a.key} onClick={function(){setComment("");setModal({task:task,key:a.key,sheet:"Quality"});}} style={{padding:"8px 14px",background:a.bg,color:"white",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>{a.label}</button>;})}
                                      {(canEdit||canValidate)&&<button onClick={function(){setAssignModal({task:task,sheet:"Quality"});}} style={{padding:"8px 14px",background:"#F3E8FF",color:"#6D28D9",border:"1px solid #DDD6FE",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>Assign</button>}
                                      {canEdit&&<button onClick={function(){setEditRecord({record:task,sheet:"Quality"});}} style={{padding:"8px 14px",background:"#EBF5FB",color:NAVY,border:"1px solid #BBDEFB",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>Edit</button>}
                                      {canDelete&&<button onClick={function(){setDeleteRecord({record:task,sheet:"Quality"});}} style={{padding:"8px 14px",background:"#FFF0F0",color:"#C62828",border:"1px solid #FFCDD2",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>Archive</button>}
                                    </div>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                });
              })()}
            </div>
          )}

          {/* Activity Log (with sub-tabs) */}
          {tab==="activity"&&!loading&&(
            <div>
              <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
                {[{id:"all",label:"All Activity"},{id:"mine",label:"Assigned to Me"}].map(function(st){return(<button key={st.id} onClick={function(){setActivitySubTab(st.id);}} style={{padding:"8px 18px",fontSize:13,borderRadius:10,border:activitySubTab===st.id?"none":"1px solid #E0D4EC",background:activitySubTab===st.id?"#003865":"white",color:activitySubTab===st.id?"white":GRAY,fontWeight:activitySubTab===st.id?700:500,cursor:"pointer"}}>{st.label}</button>);})}
                {activitySubTab==="all"&&<input value={activitySearch} onChange={function(e){setActivitySearch(e.target.value);}} placeholder="Search record, user, detail…" style={{flex:1,minWidth:160,padding:"9px 14px",border:"2px solid #E3F2FD",borderRadius:10,fontSize:13,color:DARK,fontFamily:"Inter,sans-serif"}}/>}
                {activitySubTab==="all"&&<button onClick={exportActivityLog} style={{padding:"8px 16px",fontSize:13,fontWeight:700,borderRadius:10,border:"1px solid #D0E8F5",background:"white",color:"#005A9E",cursor:"pointer"}}>↓ Export</button>}
              </div>
              {activitySubTab==="all"&&<div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>{["All","AMC","Licenses","Quality","Training"].map(function(m){return(<button key={m} onClick={function(){setActivityFilter(m);}} style={{padding:"5px 14px",fontSize:12,borderRadius:18,border:activityFilter===m?"none":"1px solid #E0D4EC",background:activityFilter===m?"#007AC2":"white",color:activityFilter===m?"white":GRAY,fontWeight:activityFilter===m?700:500,cursor:"pointer"}}>{m==="Licenses"?"Licences":m}</button>);})}</div>}
              {(function(){
                var logs=activityLog;
                if(activitySubTab==="mine"){
                  var mine=[];
                  amc.forEach(function(t){if(String(t["Assigned To"]||"")===authUser.name)mine.push({id:"ma_"+t["_docId"],action:"assign",recordName:t["Equipment Name"]||"AMC item",role:authUser.role,user:authUser.name,details:"Current status: "+t["Status"]+(t["Next Service Due Date"]?" · due "+fmtDate(t["Next Service Due Date"]):""),sheet:"AMC",timestamp:null});});
                  lic.forEach(function(t){if(String(t["Assigned To"]||"")===authUser.name)mine.push({id:"ml_"+t["_docId"],action:"assign",recordName:t["License / Agreement Name"]||"Licence",role:authUser.role,user:authUser.name,details:"Current status: "+t["Status"]+(t["Expiry Date"]?" · expires "+fmtDate(t["Expiry Date"]):""),sheet:"Licenses",timestamp:null});});
                  qual.forEach(function(t){if(String(t["Assigned To"]||"")===authUser.name)mine.push({id:"mq_"+t["_docId"],action:"assign",recordName:t["Activity Name"]||"Quality activity",role:authUser.role,user:authUser.name,details:"Current status: "+t["Status"]+(t["Scheduled Date"]?" · "+fmtDate(t["Scheduled Date"]):""),sheet:"Quality",timestamp:null});});
                  training.forEach(function(t){if(String(t["Employee Name"]||"")===authUser.name)mine.push({id:"mt_"+t["_docId"],action:"assign",recordName:t["SOP Name"]||"Training",role:authUser.role,user:authUser.name,details:"Training status: "+t["Status"]+(t["Next Due Date"]?" · next due "+fmtDate(t["Next Due Date"]):""),sheet:"Training",timestamp:null});});
                  logs=mine;
                }
                else{
                  if(activityFilter!=="All")logs=logs.filter(function(l){return l.sheet===activityFilter;});
                  var aq=activitySearch.trim().toLowerCase();
                  if(aq)logs=logs.filter(function(l){return (String(l.recordName||"")+" "+String(l.user||"")+" "+String(l.details||"")+" "+String(l.action||"")).toLowerCase().includes(aq);});
                }
                if(logs.length===0)return(<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{width:64,height:64,borderRadius:16,background:"#EEF4FA",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16}}><i className="ti ti-inbox" aria-hidden="true" style={{fontSize:32,color:"#5B7A99"}}/></div><div style={{fontSize:18,fontWeight:700,color:DARK,marginBottom:8}}>{activitySubTab==="mine"?"Nothing Assigned to You":"No Activity Yet"}</div><div style={{fontSize:14,color:GRAY}}>{activitySubTab==="mine"?"Assignment records mentioning your name will appear here.":"Actions taken in the system will appear here."}</div></div>);
                return(<div><div style={{fontSize:13,fontWeight:700,color:DARK,marginBottom:14}}>{activitySubTab==="mine"?"My Assignments":"Recent Activity"} ({logs.length} records)</div>{logs.map(function(log,i){var roleStyle=RC[log.role]||RC.Staff;return(<div key={log.id||i} style={{background:"white",borderRadius:12,padding:"14px 18px",marginBottom:8,boxShadow:"0 1px 6px rgba(0,56,101,0.06)",display:"flex",gap:12,alignItems:"flex-start"}}><i className={"ti "+(ACT_ICONS[log.action]||"ti-note")} aria-hidden="true" style={{fontSize:18,flexShrink:0,marginTop:2,color:"#5B7A99"}}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:DARK,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{log.recordName||"Record"}</div><div style={{fontSize:11,color:GRAY,marginTop:3}}><span style={{padding:"1px 8px",borderRadius:8,background:roleStyle.bg,color:roleStyle.color,fontWeight:700,fontSize:10,marginRight:8}}>{log.role}</span>{log.user} · {log.details}</div><div style={{fontSize:11,color:GRAY,marginTop:2}}>{log.sheet} · {getTimeAgo(log.timestamp)}</div></div>{log.id&&<span title="Permanent audit-trail entry — cannot be edited or deleted by anyone" style={{display:"inline-flex",alignItems:"center",gap:4,flexShrink:0,alignSelf:"center",fontSize:10,color:"#94A3B8",fontWeight:600}}><i className="ti ti-lock" aria-hidden="true" style={{fontSize:13}}/></span>}</div>);})}{activitySubTab==="all"&&<div style={{textAlign:"center",marginTop:12}}><button onClick={loadMoreActivity} style={{padding:"10px 22px",fontSize:13,fontWeight:600,borderRadius:10,border:"1px solid #D0E8F5",background:"white",color:NAVY,cursor:"pointer"}}>↻ Load older entries (showing last {activityLimit})</button></div>}{editLog&&(<div style={{position:"fixed",inset:0,background:"rgba(0,30,60,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={function(){setEditLog(null);}}><div onClick={function(e){e.stopPropagation();}} style={{background:"white",borderRadius:14,padding:"22px 24px",width:"100%",maxWidth:460,boxShadow:"0 12px 40px rgba(0,56,101,0.25)"}}><div style={{fontSize:15,fontWeight:800,color:DARK,marginBottom:14}}>Edit Activity Entry</div><label style={{fontSize:10,fontWeight:700,color:NAVY,display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.07em"}}>Record name</label><input value={editLog.recordName||""} onChange={function(e){setEditLog(Object.assign({},editLog,{recordName:e.target.value}));}} style={inp}/><label style={{fontSize:10,fontWeight:700,color:NAVY,display:"block",margin:"12px 0 4px",textTransform:"uppercase",letterSpacing:"0.07em"}}>Module / Sheet</label><input value={editLog.sheet||""} onChange={function(e){setEditLog(Object.assign({},editLog,{sheet:e.target.value}));}} style={inp}/><label style={{fontSize:10,fontWeight:700,color:NAVY,display:"block",margin:"12px 0 4px",textTransform:"uppercase",letterSpacing:"0.07em"}}>Details</label><textarea value={editLog.details||""} onChange={function(e){setEditLog(Object.assign({},editLog,{details:e.target.value}));}} style={Object.assign({},inp,{minHeight:70,resize:"vertical"})}/><div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:18}}><button onClick={function(){setEditLog(null);}} style={{padding:"10px 20px",fontSize:13,borderRadius:10,border:"1px solid #E0D4EC",background:"white",color:GRAY,cursor:"pointer"}}>Cancel</button><button onClick={saveEditLog} style={{padding:"10px 22px",fontSize:13,background:"linear-gradient(135deg,#003865,#007AC2)",color:"white",border:"none",borderRadius:10,fontWeight:700,cursor:"pointer"}}>Save Changes</button></div></div></div>)}</div>);
              })()}
            </div>
          )}

          {/* Alerts (4 sections + assignee badges) */}
          {tab==="alerts"&&(
            <div>
              {notifs.length===0?(<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{width:64,height:64,borderRadius:16,background:"#D1FAE5",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16}}><i className="ti ti-circle-check" aria-hidden="true" style={{fontSize:34,color:"#059669"}}/></div><div style={{fontSize:18,fontWeight:700,color:DARK,marginBottom:8}}>All Clear</div><div style={{fontSize:14,color:GRAY}}>No active alerts. All activities are on track.</div></div>):(
                <div>
                  {[
                    {key:"assigned",icon:"ti-target",label:"ASSIGNED TO YOU",color:"#6D28D9",bg:"#F3E8FF",list:myAlerts,empty:"Nothing assigned to you right now."},
                    {key:"critical",icon:"ti-alert-circle",label:"CRITICAL",color:"#991B1B",bg:"#FEE2E2",list:crits,empty:"No critical alerts."},
                    {key:"warning",icon:"ti-alert-triangle",label:"WARNINGS",color:"#92400E",bg:"#FEF3C7",list:warns,empty:"No warnings."},
                    {key:"info",icon:"ti-info-circle",label:"INFO",color:"#005A9E",bg:"#EBF5FB",list:infos,empty:"No info alerts."},
                  ].map(function(sec){
                    var isOpen=alertSecOpen[sec.key];
                    return(
                      <div key={sec.key} style={{marginBottom:12}}>
                        <div className="sect-hdr" style={{background:sec.bg}} onClick={function(){setAlertSecOpen(function(p){var n=Object.assign({},p);n[sec.key]=!n[sec.key];return n;});}}>
                          <i className={"ti "+sec.icon} aria-hidden="true" style={{fontSize:16,color:sec.color}}/>
                          <span style={{fontSize:12,fontWeight:800,color:sec.color,letterSpacing:"0.06em",flex:1}}>{sec.label} ({sec.list.length})</span>
                          <span style={{fontSize:14,color:sec.color,transform:isOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s",display:"inline-flex"}}><i className="ti ti-chevron-down" aria-hidden="true"/></span>
                        </div>
                        {isOpen&&(sec.list.length===0?(<div style={{padding:"12px 16px",fontSize:12,color:GRAY,fontStyle:"italic"}}>{sec.empty}</div>):sec.list.map(function(n){
                          var s=NS[n.level];var acts=n.task?getActions(n.task,n.sheet):[];var tagBg=n.level==="danger"?"#FCA5A5":n.level==="warning"?"#FCD34D":"#93C5FD";var tagColor=n.level==="danger"?"#7F1D1D":n.level==="warning"?"#78350F":"#1E3A5F";
                          return(
                            <div key={n.id} style={{background:s.bg,border:"1px solid "+s.border,borderRadius:12,padding:"14px 18px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                              <span style={{fontSize:14,color:s.dot}}>●</span>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>{n.tag&&<span style={{fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:8,background:tagBg,color:tagColor}}>{n.tag}</span>}<div style={{fontSize:14,color:s.color,fontWeight:700}}>{n.text}</div></div>
                                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>{n.task&&n.task["Status"]&&<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:8,background:"white",border:"1px solid "+s.border,color:s.color}}>Status: {String(n.task["Status"])}</span>}{n.assignedTo?<span style={{fontSize:11,color:"#6D28D9",background:"#F3E8FF",padding:"2px 8px",borderRadius:8,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4}}><i className="ti ti-user" aria-hidden="true" style={{fontSize:12}}/>Assigned: {n.assignedTo}{n.isMine?" (you)":""}</span>:<span style={{fontSize:11,color:"#92400E",background:"#FEF3C7",padding:"2px 8px",borderRadius:8,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4}}><i className="ti ti-alert-triangle" aria-hidden="true" style={{fontSize:12}}/>Unassigned — no one is on this yet</span>}{n.task&&(n.task["Vendor Name"]||n.task["Next Service Due Date"]||n.task["Expiry Date"])&&<span style={{fontSize:11,color:s.color,opacity:0.7}}>{(n.task["Vendor Name"]||"")}{n.task["Next Service Due Date"]||n.task["Expiry Date"]?" · "+fmtDate(n.task["Next Service Due Date"]||n.task["Expiry Date"]):""}</span>}</div>
                              </div>
                              <div style={{display:"flex",gap:8,flexShrink:0}}>{!isViewer&&acts.slice(0,1).map(function(a){return <button key={a.key} onClick={function(){if(a.key==="validate"&&n.task["Frequency"]){var nd=calcNextDate(n.task["Frequency"],n.task["Next Service Due Date"]);setPlanDate(nd);setAutoSchedInfo("Auto-calculated from "+n.task["Frequency"]+": next service "+fmtDate(nd));}else{setPlanDate("");setAutoSchedInfo("");}setComment("");setModal({task:n.task,key:a.key,sheet:n.sheet});}} style={{padding:"8px 16px",background:a.bg,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700}}>{a.label}</button>;})}<button onClick={function(){dismissAlert(n.id);}} style={{padding:"8px 14px",background:"white",border:"1px solid #E0D4EC",borderRadius:8,fontSize:12,color:GRAY}}>Dismiss</button></div>
                            </div>
                          );
                        }))}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

        </div>

        <div style={{padding:"14px 28px",borderTop:"1px solid #E3F2FD",background:"white",display:"flex",justifyContent:"space-between",fontSize:11,color:GRAY}}>
          <span>Posh Enterprises · Compliance Tracker</span>
          <span>{todayLong()}</span>
        </div>
      </div>

      {/* ── MOBILE BOTTOM NAV ── */}
      <div className="mobile-nav">
        {[
          isControlRoom&&{id:"locations",label:"Hubs/CFAs",   icon:"ti-map-pin"},
          !isViewer&&{id:"mytasks",  label:"Tasks",    icon:"ti-clipboard-list", badge:myAlerts.length>0, cnt:myAlerts.length},
          canSeeRDM&&{id:"rdm",      label:"Console",  icon:"ti-radio-tower"},
          {id:"home",     label:"Home",     icon:"ti-layout-dashboard", mod:true},
          {id:"amc",      label:"AMC",      icon:"ti-tool", mod:true},
          {id:"licenses", label:"Licences", icon:"ti-certificate", mod:true},
          {id:"quality",  label:"Quality",  icon:"ti-circle-check", mod:true},
          !isScopedOverseer&&{id:"alerts",   label:"Alerts",   icon:"ti-bell", badge:notifCount>0, cnt:notifCount},
          canViewKPI&&{id:"kpi", label:"KPI", icon:"ti-chart-bar"},
          !isScopedOverseer&&{id:"activity", label:"Log",      icon:"ti-history"},
          isRDM&&{id:"activity", label:"Log",      icon:"ti-history", mod:true},
          !isScopedOverseer&&{id:"vendors",  label:"Vendors",  icon:"ti-building"},
          {id:"assets",   label:"Assets",   icon:"ti-package", mod:true},
          {id:"legal",    label:"Legal",    icon:"ti-scale", mod:true},
        ].filter(Boolean).filter(function(item){return !(isScopedOverseer&&item.mod&&!focusLoc);}).map(function(item){
          var active=item.id==="locations"?showOverview:(tab===item.id&&!showOverview);
          return(
            <button key={item.id} onClick={function(){if(item.id==="locations"){setFocusLoc(null);setTab("home");setFilter("All");setSearchQuery("");setSelectedIds([]);return;}setTab(item.id);setFilter("All");setSearchQuery("");setSelectedIds([]);setDateFrom("");setDateTo("");if(item.id==="kpi"&&kpiLogs.length===0)loadKpiLogs();if(item.id==="users")fetchAllUsers();}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:62,flexShrink:0,background:"transparent",border:"none",color:active?"#007AC2":"#9CA3AF",fontSize:10,fontWeight:active?700:500,cursor:"pointer",padding:"8px 6px",fontFamily:"Inter,sans-serif",position:"relative",borderTop:active?"2px solid #007AC2":"2px solid transparent",marginTop:-2}}>
              <i className={"ti "+item.icon} aria-hidden="true" style={{fontSize:22,lineHeight:1.2}}/>
              <span>{item.label}</span>
              {item.badge&&<span style={{position:"absolute",top:4,right:"50%",transform:"translateX(14px)",minWidth:15,height:15,borderRadius:"50%",background:"#E53935",fontSize:8,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,padding:"0 3px"}}>{item.cnt>9?"9+":item.cnt}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
