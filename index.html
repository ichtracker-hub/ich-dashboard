  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#F0F8FF;}
    input,textarea,button,select{font-family:'Inter',sans-serif;outline:none;}
    button{cursor:pointer;}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:230px;background:white;border-right:1px solid #E3F2FD;display:flex;flex-direction:column;z-index:50;overflow-y:auto;}
    .main-content{margin-left:230px;min-height:100vh;display:flex;flex-direction:column;width:calc(100% - 230px);}
    .nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:transparent;border:1px solid transparent;color:#6B7280;font-size:13px;font-weight:500;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;margin-bottom:3px;transition:background 0.15s;}
    .nav-btn.active{background:#EBF5FB;border:1px solid #BBDEFB;color:#003865;font-weight:700;}
    .nav-btn:hover:not(.active){background:#F7FBFF;}
    .nav-sec{font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:0.08em;text-transform:uppercase;padding:14px 14px 5px;}
    .seg-bar{display:inline-flex;background:#EBF2F8;border-radius:9px;padding:3px;gap:2px;}
    .seg-bar button{padding:6px 15px;border:none;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:#6B7280;font-family:'Inter',sans-serif;transition:all 0.12s;}
    .seg-bar button.sel{background:white;color:#003865;font-weight:700;box-shadow:0 1px 3px rgba(0,56,101,0.12);}
    .act-card{background:white;border-radius:12px;box-shadow:0 1px 6px rgba(0,56,101,0.06);margin-bottom:10px;overflow:hidden;transition:box-shadow 0.2s;position:relative;z-index:6;}
    .loc-card:hover{box-shadow:0 8px 24px rgba(0,56,101,0.14)!important;transform:translateY(-2px);}
    .act-card:hover{box-shadow:0 4px 16px rgba(0,56,101,0.1);}
    .act-hdr{padding:16px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;}
    .act-body{padding:0 20px 16px;border-top:1px solid #E3F2FD;}
    .pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;}
    .modal-ov{position:fixed;inset:0;background:rgba(0,56,101,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(3px);}
    .modal-box{background:white;border-radius:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,56,101,0.15);}
    .mobile-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:2px solid #E3F2FD;display:none;justify-content:flex-start;align-items:stretch;z-index:100;padding:6px 0 calc(6px + env(safe-area-inset-bottom));overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}.mobile-nav::-webkit-scrollbar{display:none;}
    .mob-btn{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;background:transparent;border:none;color:#6B7280;font-size:10px;font-weight:600;cursor:pointer;padding:8px 4px;font-family:'Inter',sans-serif;}
    .mob-btn.active{color:#007AC2;}
    .mob-btn .mob-icon{font-size:20px;line-height:1.2;}
    .help-text{font-size:10px;color:#9CA3AF;margin-top:3px;line-height:1.4;}
    .req-star{color:#EF4444;margin-left:2px;}
    .char-count{font-size:10px;color:#9CA3AF;float:right;margin-top:2px;}
    .char-count.ok{color:#10B981;}
    .char-count.warn{color:#F59E0B;}
    .char-count.err{color:#EF4444;}
    .sop-warn{padding:8px 12px;background:#FEF3C7;border:1px solid #FCD34D;border-radius:8px;font-size:11px;color:#92400E;margin-bottom:10px;}
    .sop-ok{padding:8px 12px;background:#D1FAE5;border:1px solid #6EE7B7;border-radius:8px;font-size:11px;color:#065F46;margin-bottom:10px;}
    .tmpl-badge{padding:5px 10px;background:#E8F5E9;border:1px solid #A7F3D0;border-radius:8px;font-size:11px;color:#065F46;font-weight:600;margin-bottom:10px;display:block;}
    .kpi-tile{background:white;border-radius:12px;padding:14px 12px;text-align:center;box-shadow:0 1px 6px rgba(0,56,101,0.06);}
    .sect-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;cursor:pointer;margin-bottom:8px;user-select:none;}
    .mytask-card{background:white;border-radius:12px;padding:14px 18px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,56,101,0.06);}
    @media(max-width:768px){
      .sidebar{display:none !important;}
      .main-content{margin-left:0 !important;width:100% !important;padding-bottom:76px;}
      .mobile-nav{display:flex !important;}
      .content-pad{padding:14px 12px !important;}
      .topbar{padding:12px 14px !important;}
      .topbar-title{font-size:16px !important;}
      .modal-box{border-radius:16px !important;}
    }
    @keyframes toastSlide{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>

  { v:"1.9.4", date:"2026-06-28", by:"Head (BOSSMANPOSH)", note:"Full UI refresh. (1) Every emoji replaced with professional Tabler outline icons — sidebar, mobile nav, topbar, activity log, buttons, empty states, chevrons, warning/status chips, Lifetime badge. (2) Sidebar nav grouped into Modules / Reports / Admin sections. (3) Filter bars (AMC, Licences, Quality, Legal) converted to clean segmented controls. (4) Sidebar action buttons gained icons; Sign Out now red. (5) Status clarity: a Pending AMC/Quality item with a far-off due date now reads 'Scheduled' (calm grey) instead of amber 'Pending'; within 7 days it reads 'Due soon' — badge now reflects whether action is actually needed. (6) Change Log is now visible to the Head only — other roles no longer see the version/change-log link or modal. (7) Fixed: 'Refresh Data' wiped all records for the Head/overseer view (one-shot fetch filtered by locationId 'all' matched nothing) — refresh now scopes the same way the realtime listeners do. (8) Asset Register second tab now labels by location type — 'Hub Owned Assets' or 'CFA Owned Assets' (Hub / CFA when viewing the whole network), and follows the drilled-in hub. (9) Activity Log is now an IMMUTABLE append-only audit trail — entries can no longer be edited or deleted by anyone (Firestore rules enforce it; Edit/Delete buttons replaced with a lock indicator). Requires deploying firestore.rules." },

function getAMCCategory(name){
  var n=String(name||"").toLowerCase();
  if(n.startsWith("bopt")||n.startsWith("reach truck"))return "Material Handling";
  if(n.startsWith("dg set")||n.includes("dg set"))return "DG Set";
  if(n.startsWith("ahu"))return "AHU";
  if(n.startsWith("temperature sensor"))return "Temperature Sensor";
  if(n.startsWith("pest control"))return "Pest Control";
  if(n.startsWith("insectocutor"))return "Insectocutor";
  if(n.startsWith("fire extinguisher")||n.startsWith("fire alarm")||n.startsWith("sprinkler"))return "Fire Safety";
  if(n.startsWith("access control"))return "Access Control";
  if(n.startsWith("weighing"))return "Weighing Scale";
  if(n.startsWith("hvac"))return "HVAC";
  return String(name||"Other");
}
function getLicCategory(name){
  var n=String(name||"").toLowerCase();
  if(n.includes("drug licence")||n.includes("food and drugs"))return "Drug Licence";
  if(n.includes("pollution control"))return "Pollution Control Board";
  if(n.includes("gst"))return "GST";
  if(n.includes("registration certificate"))return "Labor Compliance";
  if(n.includes("lease"))return "Lease Agreement";
  if(n.includes("insurance"))return "Insurance";
  if(n.includes("biomedical")||n.includes("incinerator"))return "BioMedical Waste";
  if(n.includes("fire safety")||n.includes("sprinkler")||n.includes("fire extinguisher")||n.includes("disaster management"))return "Fire Safety";
  if(n.includes("hvac"))return "HVAC";
  if(n.includes("genset")||n.includes("dg set"))return "DG Set";
  if(n.includes("lift truck")||n.includes("bopt"))return "Material Handling";
  if(n.includes("access control")||n.includes("spectra"))return "Access Control";
  if(n.includes("weighing"))return "Weighing Scale";
  if(n.includes("agreement")||n.includes("manpower")||n.includes("security")||n.includes("electrical")||n.includes("housekeeping"))return "Agreements";
  return String(name||"Other");
}

   UTILITIES
══════════════════════════════════════════ */
function parseGDate(s){
  if(!s)return null;
  try{
    if(typeof s==="string"&&s.indexOf("Date(")===0){var p=s.replace("Date(","").replace(")","").split(",");return new Date(parseInt(p[0]),parseInt(p[1]),parseInt(p[2]||1));}
    if(typeof s==="string"&&/^\d{2}\/\d{2}\/\d{4}$/.test(s)){var q=s.split("/");return new Date(parseInt(q[2]),parseInt(q[1])-1,parseInt(q[0]));}
    var d=new Date(s);return isNaN(d.getTime())?null:d;
  }catch(e){return null;}
}
function daysUntil(s){
  if(!s)return null;
  var d=parseGDate(s);if(!d)return null;
  var t=new Date();t.setHours(0,0,0,0);d.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function fmtDate(s){
  if(!s)return "—";
  if(typeof s==="string"&&/^\d{2}\/\d{2}\/\d{4}$/.test(s)){var p=s.split("/");var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return p[0]+" "+mo[parseInt(p[1])-1]+" "+p[2];}
  var d=parseGDate(s);if(!d)return String(s);
  return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
}
function todayLong(){return new Date().toLocaleDateString("en-IN",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});}
function todayShort(){return new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});}
function todayISO(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function getGreeting(){var h=new Date().getHours();if(h<12)return "Morning";if(h<17)return "Afternoon";return "Evening";}
function getTimeAgo(d){if(!d)return "";var n=new Date();var s=Math.floor((n-d)/1000);if(s<60)return "Just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return Math.floor(s/86400)+"d ago";}
function fmtPhone(p){if(!p)return "";var c=String(p).replace(/\D/g,"");if(c.length===12&&c.slice(0,2)==="91")c=c.slice(2);if(c.length===11&&c[0]==="0")c=c.slice(1);return "+91 "+c;}
function toInputDate(s){if(!s)return "";if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){var p=s.split("/");return p[2]+"-"+p[1]+"-"+p[0];}if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;var d=parseGDate(s);if(!d)return "";return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

/* NEW v2: auto-calculate next service date from frequency */
function calcNextDate(frequency,fromDateStr){
  var d=new Date();
  if(fromDateStr){var p=parseGDate(fromDateStr);if(p)d=new Date(p.getTime());}
  d.setHours(0,0,0,0);
  var f=String(frequency||"").toLowerCase();
  if(f.includes("daily"))                                              d.setDate(d.getDate()+1);
  else if(f.includes("fort")||f.includes("bi-week"))                  d.setDate(d.getDate()+14);
  else if(f.includes("weekly")&&!f.includes("fort"))                  d.setDate(d.getDate()+7);
  else if(f.includes("biannual")||f.includes("semi")||(f.includes("half")&&f.includes("year"))||f.includes("6 month")) d.setMonth(d.getMonth()+6);
  else if(f.includes("quart")||(f.includes("3")&&f.includes("month"))) d.setMonth(d.getMonth()+3);
  else if(f.includes("bimonth")||(f.includes("2")&&f.includes("month"))) d.setMonth(d.getMonth()+2);
  else if(f.includes("annual")||f.includes("year")||f.includes("12 month")) d.setFullYear(d.getFullYear()+1);
  else d.setMonth(d.getMonth()+1); // default monthly
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

/* NEW v2: week boundary helper for KPI */
function wkStart(weeksAgo){
  var d=new Date();var day=d.getDay()||7;
  d.setDate(d.getDate()-day+1-(weeksAgo*7));d.setHours(0,0,0,0);return d;
}

/* [9] Deadline timeline helpers — effective deadline falls back to the record's natural due date. */
function effDeadline(rec){
  var dd=rec["Deadline"]||rec["Next Service Due Date"]||rec["Scheduled Date"]||"";
  if(!dd&&String(rec["Expiry Date"]||"")!=="Lifetime")dd=rec["Expiry Date"]||"";
  return dd;
}
function dlChip(rec){
  var dd=effDeadline(rec);if(!dd)return null;
  var n=daysUntil(dd);if(n===null)return null;
  if(["Completed","Validated"].indexOf(String(rec["Status"]))>-1)return null;
  if(n<0)return(<span style={{fontSize:10,color:"#fff",background:"#EF4444",padding:"1px 7px",borderRadius:8,fontWeight:700}}>{Math.abs(n)}d past deadline</span>);
  if(n<=7)return(<span style={{fontSize:10,color:"#92400E",background:"#FEF3C7",padding:"1px 7px",borderRadius:8,fontWeight:700}}>deadline in {n}d</span>);
  return null;
}
/* Activity RAG monitoring — escalation keyed off the DUE/compliance date (not the assignment date). */
function activityRAG(rec){
  if(["Completed","Validated"].indexOf(String(rec["Status"]))>-1)return {label:"Complete",color:"#065F46",bg:"#D1FAE5"};
  var n=daysUntil(effDeadline(rec));if(n===null)return null;
  if(n<0)return {label:"Overdue",color:"#fff",bg:"#B91C1C"};
  if(n<=2)return {label:"Critical",color:"#fff",bg:"#EF4444"};
  if(n<=7)return {label:"Approaching",color:"#92400E",bg:"#FEF3C7"};
  return {label:"On Track",color:"#065F46",bg:"#D1FAE5"};
}
function ragChip(rec){var r=activityRAG(rec);if(!r)return null;return(<span style={{fontSize:10,color:r.color,background:r.bg,padding:"1px 8px",borderRadius:8,fontWeight:700}}>{r.label}</span>);}
function splitCSVLine(line){var out=[],cur="",inQ=false;for(var j=0;j<line.length;j++){var ch=line[j];if(inQ){if(ch==='"'){if(line[j+1]==='"'){cur+='"';j++;}else{inQ=false;}}else{cur+=ch;}}else{if(ch==='"'){inQ=true;}else if(ch===","){out.push(cur);cur="";}else{cur+=ch;}}}out.push(cur);return out;}

async function fetchFromFirestore(collectionName,locationId){
  try{
    var ref=db.collection(collectionName);
    var query=locationId?ref.where("locationId","==",locationId):ref;
    var snap=await query.get();
    return snap.docs.filter(function(doc){return !doc.data().archived;}).map(function(doc){
      var d=doc.data();
      if(collectionName==="amc")return mapAMC(doc.id,d);
      if(collectionName==="licences")return mapLicence(doc.id,d);
      if(collectionName==="quality")return mapQuality(doc.id,d);
      if(collectionName==="training")return mapTraining(doc.id,d);
      return Object.assign({"_docId":doc.id},d);
    });
  }catch(e){console.error("Firestore fetch error:",e);return [];}
}
async function updateFirestore(sheet,row){
  try{
    var collName=sheet==="AMC"?"amc":sheet==="Licenses"?"licences":sheet==="Training"?"training":"quality";
    var docId=row["_docId"];if(!docId){console.error("No _docId on row");return false;}
    var data=sheet==="AMC"?unmapAMC(row):sheet==="Licenses"?unmapLicence(row):sheet==="Training"?unmapTraining(row):unmapQuality(row);
    Object.keys(data).forEach(function(k){if(data[k]==="")delete data[k];});
    await db.collection(collName).doc(docId).update(data);return true;
  }catch(e){console.error("Firestore update error:",e);return false;}
}
async function logActivity(action,sheet,recordName,details,userName,userRole,locId){
  try{await db.collection("activityLog").add({action:action||"",sheet:sheet||"",recordName:recordName||"",user:userName||"",role:userRole||"",locationId:locId||"",details:details||"",timestamp:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){console.error("Log error",e);}
}
/* Friendly message from a Cloud Function (callable) error. */
function authErrMsg(e){
  var s=String((e&&(e.code||""))+" "+(e&&(e.message||"")));
  if(/not-found/.test(s))return "User not found. Check the username.";
  if(/unauthenticated|wrong|incorrect|invalid password/i.test(s))return "Incorrect password. Try again.";
  if(/permission-denied/.test(s))return "This account is not active, or you are not allowed. Contact your administrator.";
  if(/failed-precondition/.test(s))return "No password set for this account. Contact your administrator.";
  if(/invalid-argument/.test(s))return "Please fill all fields correctly (passwords need 6+ characters).";
  if(/already-exists/.test(s))return "That username is already taken.";
  if(/unavailable|network|deadline/i.test(s))return "Network problem. Check your connection and try again.";
  return "Something went wrong. Please try again.";
}
async function fetchActivityLog(locId,limit){
  var lim=limit||20;
  function mapDocs(docs){return docs.map(function(doc){var d=doc.data();return{id:doc.id,action:d.action||"",sheet:d.sheet||"",recordName:d.recordName||"",user:d.user||"",role:d.role||"",details:d.details||"",timestamp:d.timestamp?d.timestamp.toDate():new Date()};});}
  try{
    // Preferred path: filter by location + newest-first. This needs a composite
    // index (locationId ASC, timestamp DESC). If that index is missing the query
    // throws failed-precondition — we fall back below so the log STILL works.
    var q=locId?db.collection("activityLog").where("locationId","==",locId).orderBy("timestamp","desc").limit(lim):db.collection("activityLog").orderBy("timestamp","desc").limit(lim);
    var snap=await q.get();
    return mapDocs(snap.docs);
  }catch(e){
    console.warn("activityLog primary query failed ("+((e&&e.code)||e)+") — falling back to order-only + client-side location filter.");
    try{
      // Order-only query uses the automatic single-field timestamp index (always present).
      var snap2=await db.collection("activityLog").orderBy("timestamp","desc").limit(Math.max(lim*4,100)).get();
      var docs=snap2.docs;
      if(locId)docs=docs.filter(function(d){return (d.data().locationId||"")===locId;});
      return mapDocs(docs.slice(0,lim));
    }catch(e2){console.error("activityLog fallback also failed:",e2);return [];}
  }
}

function DeleteConfirm(props){

  return(
    <div className="modal-ov">
      <div className="modal-box" style={{maxWidth:400}}>
        <div style={{padding:"26px 26px 0",textAlign:"center"}}>

          <div style={{fontSize:16,fontWeight:800,color:DARK,marginBottom:8}}>{confirmHard?"Delete Permanently?":"Remove Record?"}</div>
          <div style={{fontSize:13,color:GRAY,lineHeight:1.6,marginBottom:6}}>You are about to {confirmHard?"permanently delete":"remove"}:</div>

            <button onClick={function(){setConfirmHard(false);}} disabled={props.saving} style={{flex:1,padding:"12px",fontSize:13,borderRadius:10,border:"1px solid #E0D4EC",background:"white",color:GRAY,cursor:"pointer",fontWeight:600}}>Back</button>

          </div>
        ):(
          <div style={{padding:"18px 26px 26px"}}>
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              <button onClick={props.onClose} style={{flex:1,padding:"12px",fontSize:13,borderRadius:10,border:"1px solid #E0D4EC",background:"white",color:GRAY,cursor:"pointer",fontWeight:600}}>Cancel</button>
              <button onClick={props.onConfirm} disabled={props.saving} style={{flex:1,padding:"12px",fontSize:13,background:"linear-gradient(135deg,#C62828,#E53935)",color:"white",border:"none",borderRadius:10,fontWeight:700,opacity:props.saving?0.6:1,cursor:"pointer"}}>{props.saving?"Archiving…":"Archive"}</button>
            </div>
            {props.onHardDelete&&<button onClick={function(){setConfirmHard(true);}} disabled={props.saving} style={{width:"100%",padding:"10px",fontSize:12,borderRadius:10,border:"1px solid #FFCDD2",background:"#FFF5F5",color:"#991B1B",cursor:"pointer",fontWeight:700}}>Delete permanently instead</button>}
          </div>
        )}
      </div>
    </div>
  );
}

function slugifyLoc(s){return String(s||"").trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");}
// Build a printable credential slip (PDF) for one or more freshly-created logins.
// Called at creation/reset time only — passwords are never stored, so this is the
// one moment the plaintext is available to hand over. cred = {password, loginUrl, users:[{username,fullName,role,locationName}]}.
function buildCredentialPdf(cred){
  var jspdf=window.jspdf;if(!jspdf||!jspdf.jsPDF){alert("PDF library not loaded.");return;}
  var doc=new jspdf.jsPDF();
  var users=cred.users||[];
  var locName=(users[0]&&users[0].locationName)||"";
  doc.setFillColor(0,56,101);doc.rect(0,0,210,30,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont(undefined,"bold");doc.text("POSH Compliance Tracker — Login Details",14,14);
  doc.setFontSize(10);doc.setFont(undefined,"normal");doc.text((locName?locName+"  ·  ":"")+todayLong(),14,23);
  doc.setTextColor(0,0,0);
  doc.setFontSize(11);doc.setFont(undefined,"normal");
  doc.text("Sign in at:  "+(cred.loginUrl||""),14,42);
  doc.setFont(undefined,"bold");doc.text("Temporary password:  "+(cred.password||""),14,50);
  doc.setFont(undefined,"normal");doc.setFontSize(9);doc.setTextColor(120,120,120);
  doc.text("Please change this password after your first login (Profile → Change Password).",14,57);
  doc.setTextColor(0,0,0);
  doc.autoTable({startY:64,head:[["Username","Name","Role"]],body:users.map(function(u){return[u.username,u.fullName||"",u.role||""];}),theme:"grid",headStyles:{fillColor:[0,122,194]},styles:{fontSize:10}});
  var y=doc.lastAutoTable.finalY+12;
  doc.setFontSize(10);doc.setTextColor(0,56,101);doc.setFont(undefined,"bold");
  doc.text("QUICK START GUIDE",14,y);y+=7;
  doc.setFont(undefined,"normal");doc.setFontSize(9);doc.setTextColor(0,0,0);
  ["1. Open the login URL above in Chrome on your computer or mobile.",
   "2. Enter your username and the temporary password above.",
   "3. IMPORTANT: Change your password immediately — Profile → Change Password.",
   "4. Add your hub's records using the Bulk Upload (⬆) button or + Add buttons per module.",
   "5. Dashboard auto-alerts 30 / 15 / 7 / 5 / 3 / 1 days before AMC, licence & quality due dates.",
   "6. Staff submit evidence → Managers validate. Click 'How to Use This System' for the full guide.",
   "7. For help, contact your Head (system administrator)."
  ].forEach(function(s){doc.text(s,14,y);y+=6;});
  y+=4;
  doc.setFontSize(9);doc.setTextColor(150,150,150);
  doc.text("Confidential — hand these credentials directly to the account holder. Do not forward.",14,y);
  doc.save("Login_Details_"+(locName?slugifyLoc(locName)+"_":"")+new Date().toISOString().split("T")[0]+".pdf");
}

/* Manage Hubs — Head-only. Rename a hub's display name (merges duplicates by name)

   but kept in Firestore (reversible). Built-in hubs are defined in code and can be
   renamed by overriding their name with a same-id location doc, but not removed. */
function ManageHubsModal(props){
  var dbHubs=props.dbHubs||[];          // [{id,docId,name,type,active}]
  var builtins=props.builtins||[];      // [{id,name}]

  var [draft,setDraft]=useState("");

  var [showArchived,setShowArchived]=useState(false);
  var [err,setErr]=useState("");
  var builtinIds=builtins.map(function(b){return b.id;});
  function startEdit(h){setEditId(h.docId);setDraft(h.name);setErr("");}
  function saveEdit(h){
    var nm=String(draft||"").trim();
    if(!nm){setErr("Name cannot be empty.");return;}
    setBusy(h.docId);setErr("");
    props.onRename(h.docId,nm).then(function(){setEditId("");setBusy("");}).catch(function(e){setErr(props.errMsg?props.errMsg(e):"Rename failed.");setBusy("");});
  }
  function remove(h){

            <div style={{fontSize:11,color:GRAY,marginTop:2}}>{h.type||"Hub"} · id: {h.id} · {n} record{n===1?"":"s"}</div>
          </div>
          {h.active===false?(
            <button disabled={b} onClick={function(){restore(h);}} style={Object.assign({},sbtn,{background:"#EBF5FB",color:NAVY,border:"1px solid #BBDEFB"})}>{b?"…":"Restore"}</button>
          ):(
            <React.Fragment>
              <button disabled={b} onClick={function(){startEdit(h);}} style={Object.assign({},sbtn,{background:"#EBF5FB",color:NAVY,border:"1px solid #BBDEFB"})}>Rename</button>
              <button disabled={b} onClick={function(){remove(h);}} style={Object.assign({},sbtn,{background:"#FFF0F0",color:"#C62828",border:"1px solid #FFCDD2"})}>{b?"…":"Remove"}</button>

      <div style={{fontSize:17,fontWeight:800,color:DARK,marginBottom:4}}>Manage Hubs &amp; CFAs</div>

      {err&&<div style={{marginBottom:12,padding:"10px 14px",background:"#FEE2E2",borderRadius:8,fontSize:12,color:"#991B1B"}}>{err}</div>}
      <div style={{fontSize:11,fontWeight:700,color:NAVY,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Added hubs ({active.length})</div>
      {active.length?active.map(hubRow):<div style={{fontSize:12,color:GRAY,marginBottom:8}}>No hubs added via the dashboard yet.</div>}
      <div style={{fontSize:11,fontWeight:700,color:NAVY,textTransform:"uppercase",letterSpacing:"0.06em",margin:"16px 0 8px"}}>Built-in hubs</div>
      {builtins.map(function(b){return(<div key={b.id} style={Object.assign({},row,{opacity:0.85})}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:DARK}}>{b.name}</div><div style={{fontSize:11,color:GRAY,marginTop:2}}>id: {b.id} · {countFor(b.id)} records</div></div><span style={{fontSize:10,color:GRAY,background:"#EEF2F7",padding:"3px 8px",borderRadius:6}}>built-in</span></div>);})}

      </div>
    </div></div>
  );
}

            <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.6)",textTransform:"uppercase",marginBottom:4}}>Overall Compliance</div>
            <div style={{fontSize:38,fontWeight:900,color:overallColor,lineHeight:1}}>{overallScore}%</div>

            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginTop:4}}>{amcG+licG+qualG}/{totalRecords} items compliant</div>
          </div>

      </div>
      <div style={{background:"white",borderRadius:16,padding:"14px 18px",marginBottom:14,boxShadow:"0 1px 8px rgba(0,56,101,0.07)",borderTop:"3px solid #007AC2"}}>

/* ══════════════════════════════════════════
   CALENDAR VIEW
══════════════════════════════════════════ */
function CalendarView(props){
  var amc=props.amc,lic=props.lic,qual=props.qual||[],month=props.month;
  var y=month.getFullYear(),m=month.getMonth();
  var mNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var firstDay=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  var events={};
  amc.forEach(function(t){var d=parseGDate(t["Next Service Due Date"]);if(d&&d.getMonth()===m&&d.getFullYear()===y){var k=d.getDate();if(!events[k])events[k]=[];events[k].push({name:t["Equipment Name"],status:t["Status"],type:"AMC"});}});
  lic.forEach(function(t){if(String(t["Expiry Date"])==="Lifetime")return;var d=parseGDate(t["Expiry Date"]);if(d&&d.getMonth()===m&&d.getFullYear()===y){var k=d.getDate();if(!events[k])events[k]=[];events[k].push({name:t["License / Agreement Name"],status:t["Status"],type:"Lic"});}});
  qual.forEach(function(t){if(!t["Scheduled Date"])return;var d=parseGDate(t["Scheduled Date"]);if(d&&d.getMonth()===m&&d.getFullYear()===y){var k=d.getDate();if(!events[k])events[k]=[];events[k].push({name:t["Activity Name"],status:t["Status"],type:"Quality"});}});
  var today=new Date();
  var cells=[];for(var i=0;i<firstDay;i++)cells.push(null);for(var d2=1;d2<=dim;d2++)cells.push(d2);
  return(
    <div style={{background:"white",borderRadius:16,padding:"20px",boxShadow:"0 1px 8px rgba(0,56,101,0.07)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <button onClick={props.onPrev} style={{background:"#F0F8FF",border:"none",borderRadius:8,padding:"8px 16px",fontSize:18,cursor:"pointer",color:NAVY}}>‹</button>
        <div style={{fontSize:16,fontWeight:800,color:DARK}}>{mNames[m]} {y}</div>
        <button onClick={props.onNext} style={{background:"#F0F8FF",border:"none",borderRadius:8,padding:"8px 16px",fontSize:18,cursor:"pointer",color:NAVY}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(function(d3){return(<div key={d3} style={{textAlign:"center",fontSize:10,fontWeight:700,color:GRAY,padding:"5px 0",textTransform:"uppercase"}}>{d3}</div>);})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map(function(day,idx){
          if(!day)return <div key={"e"+idx}/>;
          var isT=today.getDate()===day&&today.getMonth()===m&&today.getFullYear()===y;
          var evs=events[day]||[];
          return(
            <div key={day} style={{minHeight:58,padding:3,borderRadius:7,background:isT?"#EBF5FB":evs.length>0?"#F8FAFB":"transparent",border:isT?"2px solid "+BLUE:evs.length>0?"1px solid #D0E8F5":"1px solid #F0F0F0"}}>
              <div style={{fontSize:11,fontWeight:isT?800:500,color:isT?BLUE:DARK,marginBottom:2}}>{day}</div>
              {evs.slice(0,2).map(function(e,ei){return(<div key={ei} style={{fontSize:8,fontWeight:600,padding:"1px 3px",borderRadius:3,marginBottom:1,background:(e.status==="Overdue"||e.status==="Expired")?"#FEE2E2":e.type==="AMC"?"#EBF5FB":e.type==="Quality"?"#EDE9FE":"#E8F5E9",color:(e.status==="Overdue"||e.status==="Expired")?"#991B1B":e.type==="AMC"?NAVY:e.type==="Quality"?"#6D28D9":"#065F46",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.name}</div>);})}
              {evs.length>2&&<div style={{fontSize:8,color:GRAY}}>+{evs.length-2}</div>}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:14,marginTop:14,flexWrap:"wrap"}}>
        {[{bg:"#EBF5FB",tc:NAVY,lbl:"AMC Due"},{bg:"#E8F5E9",tc:"#065F46",lbl:"Licence Expiry"},{bg:"#EDE9FE",tc:"#6D28D9",lbl:"Quality"},{bg:"#FEE2E2",tc:"#991B1B",lbl:"Overdue/Expired"}].map(function(l,i){return(<div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:GRAY}}><div style={{width:12,height:12,borderRadius:3,background:l.bg,flexShrink:0}}/><span>{l.lbl}</span></div>);})}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   VENDOR DIRECTORY

function VendorDirectory(props){
  var amc=props.amc,lic=props.lic,sq=props.searchQuery||"";
  var vmap={};
  amc.forEach(function(t){var vn=String(t["Vendor Name"]||"").trim();if(!vn)return;if(!vmap[vn])vmap[vn]={name:vn,contact:t["Vendor Contact Person"]||"",phone:t["Vendor Contact No"]||"",items:[],type:"AMC Vendor"};var eq=String(t["Equipment Name"]||"");if(eq&&vmap[vn].items.indexOf(eq)===-1)vmap[vn].items.push(eq);});
  lic.forEach(function(t){var cp=String(t["Contact Person"]||"").trim();if(!cp)return;var key="L_"+cp;if(!vmap[key])vmap[key]={name:cp,contact:cp,phone:t["Contact No"]||"",items:[],type:"Licence Contact"};var ln=String(t["License / Agreement Name"]||"");if(ln&&vmap[key].items.indexOf(ln)===-1)vmap[key].items.push(ln);});
  var vendors=Object.values(vmap);
  if(sq){var q=sq.toLowerCase();vendors=vendors.filter(function(v){return v.name.toLowerCase().includes(q)||v.phone.includes(q)||v.items.some(function(i){return i.toLowerCase().includes(q);});});}
  if(vendors.length===0)return(<div style={{textAlign:"center",padding:"40px",color:GRAY,fontSize:14}}>No vendors found{sq?" matching your search":""}.</div>);
  return(
    <div>
      {vendors.map(function(v,i){return(
        <div key={i} style={{background:"white",borderRadius:12,padding:"16px 20px",marginBottom:10,boxShadow:"0 1px 6px rgba(0,56,101,0.06)",borderLeft:"4px solid "+(v.type==="AMC Vendor"?BLUE:"#10B981")}}>
          <div style={{fontSize:14,fontWeight:800,color:DARK,marginBottom:6}}>{v.name}</div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:8,alignItems:"center"}}>
            {v.contact&&v.contact!==v.name&&<span style={{fontSize:12,color:GRAY}}>{v.contact}</span>}
            {v.phone&&<span style={{fontSize:13,fontWeight:700,color:BLUE}}>{fmtPhone(v.phone)}</span>}
            <span style={{fontSize:10,padding:"2px 10px",borderRadius:10,background:v.type==="AMC Vendor"?"#EBF5FB":"#E8F5E9",color:v.type==="AMC Vendor"?NAVY:"#065F46",fontWeight:700}}>{v.type}</span>

function TrainingPage(props){
  var recs=props.training||[];
  var q=(props.search||"").toLowerCase();
  var [view,setView]=useState("matrix");
  var fr=recs.filter(function(r){if(!q)return true;return(r["Employee Name"]||"").toLowerCase().includes(q)||(r["SOP Name"]||"").toLowerCase().includes(q)||(r["Department"]||"").toLowerCase().includes(q);});
  var empSet={};(props.users||[]).forEach(function(u){empSet[u.name]=true;});recs.forEach(function(r){if(r["Employee Name"])empSet[r["Employee Name"]]=true;});
  var emps=Object.keys(empSet).sort();
  var sopSet={};recs.forEach(function(r){if(r["SOP Name"])sopSet[r["SOP Name"]]=true;});
  var sops=Object.keys(sopSet).sort();
  var recMap={};recs.forEach(function(r){recMap[r["Employee Name"]+"||"+r["SOP Name"]]=r;});
  function cnt(st){return recs.filter(function(r){return r["Status"]===st;}).length;}
  var done=cnt("Completed"),pend=cnt("Pending"),over=cnt("Retraining Due");
  var ns=0;emps.forEach(function(e){sops.forEach(function(s){if(!recMap[e+"||"+s])ns++;});});
  var mand={};recs.forEach(function(r){if(r["Mandatory"]&&r["SOP Name"])mand[r["SOP Name"]]=true;});
  var mandSops=Object.keys(mand);

  emps.forEach(function(e){mandSops.forEach(function(s){var rc2=recMap[e+"||"+s];if(rc2&&rc2["Status"]==="Completed")reqMet++;});});

      var cols=[["#","Employee","Dept","SOP / Training","Mand.","Assigned","Completed","Next Due","Frequency","Trainer","Status"]];
      var rows=fr.slice().sort(function(a,b){return(a["Employee Name"]||"").localeCompare(b["Employee Name"]||"");}).map(function(r,i){return[String(i+1),r["Employee Name"]||"",r["Department"]||"—",r["SOP Name"]||"",r["Mandatory"]?"Yes":"No",r["Assigned Date"]?fmtDate(r["Assigned Date"]):"—",r["Completion Date"]?fmtDate(r["Completion Date"]):"—",r["Next Due Date"]?fmtDate(r["Next Due Date"]):"—",r["Frequency"]||"—",r["Trainer Name"]||"—",r["Status"]];});
      var col={"Completed":[209,250,229],"Pending":[254,243,199],"Retraining Due":[254,226,226],"Not Started":[243,244,246]};
      doc.autoTable({head:cols,body:rows,startY:28,styles:{fontSize:7.5,cellPadding:2.5,overflow:"linebreak"},headStyles:{fillColor:[0,56,101],textColor:[255,255,255],fontStyle:"bold",fontSize:8},didParseCell:function(data){if(data.section==="body"){var st=rows[data.row.index][rows[data.row.index].length-1];var c=col[st];if(c)data.cell.styles.fillColor=c;}},margin:{left:14,right:14},foot:[[{content:"Non-compliant (Retraining Due): "+over+"  ·  Pending: "+pend+"  ·  Total records: "+rows.length,colSpan:11,styles:{halign:"right",fontSize:7,textColor:[150,150,150]}}]],footStyles:{fillColor:[248,250,252]}});
      doc.save("PCT_Training_"+new Date().toISOString().split("T")[0]+".pdf");

            <tbody>{fr.slice().sort(function(a,b){return(a["Employee Name"]||"").localeCompare(b["Employee Name"]||"")||(a["SOP Name"]||"").localeCompare(b["SOP Name"]||"");}).map(function(r){var c=SC[r["Status"]]||SC["Not Started"];return <tr key={r["_docId"]} style={{borderBottom:"1px solid #F0F6FC"}}><td style={{padding:"9px 10px",fontSize:12,fontWeight:600,color:DARK}}>{r["Employee Name"]}</td><td style={{padding:"9px 10px",fontSize:12,color:GRAY}}>{r["Department"]||"—"}</td><td style={{padding:"9px 10px",fontSize:12,color:DARK}}>{r["SOP Name"]}</td><td style={{padding:"9px 10px",fontSize:11}}>{r["Mandatory"]?<span style={{color:"#059669",fontWeight:700}}>Mandatory</span>:<span style={{color:GRAY}}>Optional</span>}</td><td style={{padding:"9px 10px",fontSize:12,color:GRAY}}>{r["Assigned Date"]?fmtDate(r["Assigned Date"]):"—"}</td><td style={{padding:"9px 10px",fontSize:12,color:GRAY}}>{r["Completion Date"]?fmtDate(r["Completion Date"]):"—"}</td><td style={{padding:"9px 10px",fontSize:12,color:GRAY}}>{r["Next Due Date"]?fmtDate(r["Next Due Date"]):"—"}</td><td style={{padding:"9px 10px",fontSize:12,color:GRAY}}>{r["Frequency"]||"—"}</td><td style={{padding:"9px 10px",fontSize:12,color:GRAY}}>{r["Trainer Name"]||"—"}</td><td style={{padding:"9px 10px"}}><span style={{fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:8,background:c.bg,color:c.fg,border:"1px solid "+c.bd,whiteSpace:"nowrap"}}>{r["Status"]}</span></td><td style={{padding:"9px 10px",whiteSpace:"nowrap"}}>{r["Evidence File"]&&<a href={r["Evidence File"]} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:BLUE,fontWeight:600,marginRight:8}}>Proof</a>}{props.canManage&&<button onClick={function(){props.onCell(r["Employee Name"],r["SOP Name"],r);}} style={{fontSize:11,fontWeight:700,color:NAVY,background:"#EBF5FB",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer"}}>Edit</button>}</td></tr>;})}</tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   RDM CONSOLE  (NEW v3 — executive command view)
   Read-only. Aging-based risk, accountability by person,
   audit-readiness, single most-urgent action. Reuses
   global helpers only (daysUntil/fmtDate/Badge) — additive.
══════════════════════════════════════════ */
function RDMConsole(props){
  var amc=props.amc||[],lic=props.lic||[],qual=props.qual||[],training=props.training||[],user=props.authUser||{},go=props.onTabChange||function(){},onFollowUp=props.onFollowUp||function(){};
  var [followed,setFollowed]=useState({});
  function follow(item,key){if(followed[key])return;onFollowUp(item);var n=Object.assign({},followed);n[key]=true;setFollowed(n);}
  function rcol(p){return p>=85?"#15803D":p>=65?"#B45309":"#B91C1C";}
  function sevCol(days){var a=Math.abs(days);return a>30?"#B91C1C":a>7?"#B45309":"#005A9E";}
  function score(arr,good){var t=arr.length;if(t===0)return 100;return Math.round((arr.filter(good).length/t)*100);}
  var amcGood=function(t){var s=String(t["Status"]);return["Completed","Validated","Submitted","Planned"].indexOf(s)>-1||(s==="Pending"&&daysUntil(t["Next Service Due Date"])>0);};
  var licGood=function(t){return String(t["Status"])==="Active";};
  var qualGood=function(t){var s=String(t["Status"]);return["Completed","Validated","Planned","Submitted"].indexOf(s)>-1||(s==="Pending"&&daysUntil(t["Scheduled Date"])>=0);};
  var amcScore=score(amc,amcGood),licScore=score(lic,licGood),qualScore=score(qual,qualGood);
  var mandGaps=training.filter(function(t){return t["Mandatory"]&&String(t["Status"])!=="Completed";});
  var totalRec=amc.length+lic.length+qual.length;
  var overall=totalRec>0?Math.round((amc.filter(amcGood).length+lic.filter(licGood).length+qual.filter(qualGood).length)/totalRec*100):100;
  var verdict=overall>=85?{t:"On track",c:"#22C55E"}:overall>=65?{t:"Watch",c:"#FBBF24"}:{t:"Needs action",c:"#FB7185"};
  var issues=[];
  amc.forEach(function(t){var d=daysUntil(t["Next Service Due Date"]);var s=String(t["Status"]);if(s==="Overdue"||(d!==null&&d<0&&["Completed","Validated"].indexOf(s)<0))issues.push({mod:"AMC",name:t["Equipment Name"]||"AMC item",who:String(t["Assigned To"]||"Unassigned"),age:d===null?-999:d,tab:"amc"});});
  qual.forEach(function(t){var d=daysUntil(t["Scheduled Date"]);var s=String(t["Status"]);if(s==="Overdue"||(d!==null&&d<0&&["Completed","Validated"].indexOf(s)<0))issues.push({mod:"QUAL",name:t["Activity Name"]||"Quality activity",who:String(t["Assigned To"]||"Unassigned"),age:d===null?-999:d,tab:"quality"});});
  lic.forEach(function(t){if(String(t["Expiry Date"])==="Lifetime")return;var d=daysUntil(t["Expiry Date"]);if(String(t["Status"])==="Expired"||(d!==null&&d<0))issues.push({mod:"LIC",name:t["License / Agreement Name"]||"Licence",who:String(t["Assigned To"]||"Unassigned"),age:d===null?-999:d,tab:"licenses"});});
  var crit=issues.filter(function(i){return Math.abs(i.age)>30;});
  var oldest=issues.reduce(function(m,i){var a=i.age===-999?0:Math.abs(i.age);return a>m?a:m;},0);
  var byPerson={};
  issues.forEach(function(i){var k=i.who;if(!byPerson[k])byPerson[k]={name:k,open:0,worst:0,tab:i.tab};byPerson[k].open++;var a=i.age===-999?0:Math.abs(i.age);if(a>byPerson[k].worst)byPerson[k].worst=a;});
  var people=Object.keys(byPerson).map(function(k){return byPerson[k];}).sort(function(a,b){return b.open-a.open||b.worst-a.worst;});
  var elig=amc.filter(function(t){return["Submitted","Validated","Completed"].indexOf(String(t["Status"]))>-1;});
  var withEv=elig.filter(function(t){return t["Evidence File"];});
  var auditPct=elig.length>0?Math.round(withEv.length/elig.length*100):100;
  var sorted=issues.slice().sort(function(a,b){return a.age-b.age;});
  var topAction=sorted.length>0?sorted[0]:null;
  var topKey=topAction?(topAction.mod+"|"+topAction.name):"";
  function exportPdf(){
    try{
      var jspdf=window.jspdf;if(!jspdf||!jspdf.jsPDF){alert("PDF library not loaded.");return;}
      var doc=new jspdf.jsPDF();
      doc.setFillColor(0,56,101);doc.rect(0,0,210,28,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(15);doc.setFont(undefined,"bold");doc.text("RDM Compliance Summary",14,13);
      doc.setFontSize(10);doc.setFont(undefined,"normal");doc.text((user.locationName||"Posh Enterprises")+"  ·  "+todayLong(),14,21);
      doc.setTextColor(0,0,0);doc.setFontSize(26);doc.setFont(undefined,"bold");doc.text(overall+"%",14,46);
      doc.setFontSize(11);doc.setFont(undefined,"normal");doc.text("Overall site compliance — "+verdict.t,42,45);
      doc.autoTable({startY:54,head:[["Area","Score"]],body:[["AMC",amcScore+"%"],["Licences",licScore+"%"],["Quality",qualScore+"%"],["Mandatory training gaps",String(mandGaps.length)]],theme:"grid",headStyles:{fillColor:[0,122,194]},styles:{fontSize:10}});
      var y=doc.lastAutoTable.finalY+10;
      doc.setFontSize(11);doc.setFont(undefined,"bold");doc.text("Open items: "+issues.length+"   Critical (30+ days): "+crit.length+"   Oldest: "+oldest+" days",14,y);
      if(people.length>0){doc.autoTable({startY:y+4,head:[["Person","Open items","Oldest (days)"]],body:people.slice(0,12).map(function(p){return[p.name,String(p.open),String(p.worst)];}),theme:"striped",headStyles:{fillColor:[0,56,101]},styles:{fontSize:10}});y=doc.lastAutoTable.finalY;}
      doc.setFontSize(11);doc.setFont(undefined,"bold");doc.text("Audit readiness: "+auditPct+"%  ("+withEv.length+" of "+elig.length+" records with evidence)",14,y+12);
      doc.save("RDM_Summary_"+new Date().toISOString().split("T")[0]+".pdf");
    }catch(e){alert("PDF error: "+e.message);}
  }
  var card={background:"white",borderRadius:16,padding:"20px 22px",marginBottom:16,boxShadow:"0 1px 10px rgba(0,56,101,0.06)",border:"1px solid #EBF2F9"};
  var label={fontSize:11,fontWeight:700,color:"#90A4AE",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:16};
  function FollowBtn(p){var done=!!followed[p.k];return(<button onClick={function(e){e.stopPropagation();follow(p.item,p.k);}} style={{padding:"7px 16px",borderRadius:9,border:done?"1px solid #BBE7CB":"1px solid #BBDEFB",background:done?"#EAF7EF":"white",color:done?"#15803D":"#005A9E",fontSize:12,fontWeight:700,cursor:done?"default":"pointer",fontFamily:"Inter,sans-serif",flexShrink:0,whiteSpace:"nowrap",display:"inline-flex",alignItems:"center",gap:4}}>{done&&<i className="ti ti-check" aria-hidden="true" style={{fontSize:13}}/>}{done?"Followed up":(p.compact?"Remind":"Follow up")}</button>);}
  return(
    <div style={{maxWidth:940,margin:"0 auto"}}>
      <div style={{background:"linear-gradient(135deg,#003865 0%,#0A5A96 100%)",borderRadius:20,padding:"26px 28px",marginBottom:20,boxShadow:"0 6px 24px rgba(0,56,101,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:18}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.6)",letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:8}}>RDM Console</div>
            <div style={{fontSize:22,fontWeight:800,color:"white",marginBottom:4}}>{(user.locationName||"Posh Enterprises")}</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.55)"}}>{todayLong()} · {totalRec} records monitored</div>
            <button onClick={exportPdf} style={{marginTop:14,padding:"7px 16px",borderRadius:9,border:"1px solid rgba(255,255,255,0.35)",background:"rgba(255,255,255,0.12)",color:"white",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Inter,sans-serif"}}>Export PDF</button>
          </div>
          <div style={{textAlign:"right",display:"flex",alignItems:"center",gap:16}}>
            <div>
              <div style={{fontSize:44,fontWeight:800,color:"white",lineHeight:1}}>{overall}<span style={{fontSize:22,opacity:0.7}}>%</span></div>
              <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.55)",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:4}}>Compliance</div>
            </div>
            <div style={{width:11,height:11,borderRadius:"50%",background:verdict.c,flexShrink:0}}/>
            <div style={{fontSize:13,fontWeight:700,color:"white",whiteSpace:"nowrap"}}>{verdict.t}</div>
          </div>
        </div>
      </div>

      {topAction?(
        <div style={Object.assign({},card,{borderLeft:"4px solid "+sevCol(topAction.age),display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"})}>
          <div style={{flex:"1 1 240px",minWidth:0}}>
            <div style={{fontSize:11,fontWeight:700,color:sevCol(topAction.age),letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>Top priority</div>
            <div style={{fontSize:16,fontWeight:700,color:NAVY,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{topAction.name}</div>
            <div style={{fontSize:12,color:GRAY}}>{topAction.mod} · {topAction.who} · {topAction.age===-999?"no due date":Math.abs(topAction.age)+" days overdue"}</div>
          </div>
          <div style={{display:"flex",gap:10,flexShrink:0}}>
            <button onClick={function(){go(topAction.tab);}} style={{padding:"7px 16px",borderRadius:9,border:"none",background:"#003865",color:"white",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Inter,sans-serif"}}>Open</button>
            <FollowBtn k={topKey} item={topAction}/>
          </div>
        </div>
      ):(
        <div style={Object.assign({},card,{borderLeft:"4px solid #22C55E",display:"flex",alignItems:"center",gap:12})}>
          <div style={{width:10,height:10,borderRadius:"50%",background:"#22C55E"}}/>
          <div style={{fontSize:14,fontWeight:600,color:"#15803D"}}>Everything is up to date — no overdue items.</div>
        </div>
      )}

      <div style={card}>
        <div style={label}>Compliance by area</div>
        <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
          {[{l:"AMC",v:amcScore,tab:"amc"},{l:"Licences",v:licScore,tab:"licenses"},{l:"Quality",v:qualScore,tab:"quality"}].map(function(m){return(
            <div key={m.l} onClick={function(){go(m.tab);}} style={{flex:1,minWidth:80,textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:30,fontWeight:800,color:rcol(m.v),lineHeight:1}}>{m.v}%</div>
              <div style={{fontSize:11,fontWeight:600,color:GRAY,marginTop:7}}>{m.l}</div>
            </div>);})}
          <div onClick={function(){go("quality");}} style={{flex:1,minWidth:80,textAlign:"center",cursor:"pointer"}}>
            <div style={{fontSize:30,fontWeight:800,color:mandGaps.length>0?"#B45309":"#15803D",lineHeight:1}}>{mandGaps.length}</div>
            <div style={{fontSize:11,fontWeight:600,color:GRAY,marginTop:7}}>Training gaps</div>
          </div>
        </div>
      </div>

      {issues.length>0&&(
        <div style={card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <div style={Object.assign({},label,{marginBottom:0})}>Who needs a nudge</div>
            <div style={{fontSize:12,color:GRAY}}>{issues.length} open{crit.length>0?" · "+crit.length+" critical (30+ days)":""}{oldest>0?" · oldest "+oldest+" days":""}</div>
          </div>
          {people.slice(0,4).map(function(p,i){var pk="p|"+p.name;return(
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:i<Math.min(people.length,4)-1?"1px solid #F2F7FC":"none"}}>
              <div style={{width:34,height:34,borderRadius:"50%",background:"#F0F6FC",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:NAVY,flexShrink:0}}>{(p.name[0]||"?").toUpperCase()}</div>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,color:DARK,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div><div style={{fontSize:12,color:GRAY}}>{p.open} open · oldest {p.worst} days</div></div>
              <FollowBtn k={pk} item={{mod:"Team",name:p.open+" open item"+(p.open>1?"s":""),who:p.name,tab:p.tab}} compact={true}/>
            </div>);})}
        </div>
      )}

      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:12}}>
          <div style={Object.assign({},label,{marginBottom:0})}>Audit readiness</div>
          <div style={{fontSize:22,fontWeight:800,color:rcol(auditPct)}}>{auditPct}%</div>
        </div>
        <div style={{height:8,background:"#EEF4FA",borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",width:auditPct+"%",background:rcol(auditPct),borderRadius:6,transition:"width 0.5s"}}/></div>
        <div style={{fontSize:12,color:GRAY,marginTop:10}}>{withEv.length} of {elig.length} submitted or closed AMC records have evidence on file — the first thing an auditor checks.</div>
      </div>
    </div>
  );
}

  function downloadTemplate(){

  }
  // Split one CSV line into fields, honouring "quoted, fields" and "" escaped quotes.
  function splitCSVLine(line){
    var out=[],cur="",inQ=false;
    for(var j=0;j<line.length;j++){
      var ch=line[j];
      if(inQ){
        if(ch==='"'){ if(line[j+1]==='"'){cur+='"';j++;} else {inQ=false;} }
        else {cur+=ch;}
      }else{
        if(ch==='"'){inQ=true;}
        else if(ch===","){out.push(cur);cur="";}
        else {cur+=ch;}
      }
    }
    out.push(cur);
    return out;
  }
  function parseCSV(text){
    var raw=String(text).replace(/^﻿/,""); // strip Excel BOM
    var lines=raw.split(/\r?\n/).filter(function(l){return l.trim()!=="";});
    if(lines.length<2)return {rows:[],error:"File needs a header row plus at least one asset row."};
    var out=[],errs=[];
    for(var i=1;i<lines.length;i++){
      var cols=splitCSVLine(lines[i]);
      var owner=String(cols[0]||"").trim().toLowerCase();if(owner!=="hub"&&owner!=="abbott")owner="hub";
      var name=String(cols[2]||"").trim();
      if(!name){errs.push("Row "+(i+1)+": missing Asset Name");continue;}
      var amc=String(cols[5]||"").trim().toLowerCase();
      out.push({owner:owner,assetNo:String(cols[1]||"").trim(),name:name,plantCode:String(cols[3]||"").trim(),qty:Number(cols[4])||0,withAMC:(amc==="yes"||amc==="y"||amc==="true"),assetLocation:String(cols[6]||"").trim()||(authUser.locationName||"")});
    }
    return {rows:out,error:errs.length?errs.join("; "):""};
  }

    reader.readAsText(f);
  }

              <button onClick={function(){setModal(null);}} style={{background:"#F0F8FF",border:"none",width:32,height:32,borderRadius:8,fontSize:16,color:GRAY,cursor:"pointer"}}><i className="ti ti-x" aria-hidden="true"/></button>

              {(modal.rec.history&&modal.rec.history.length)?modal.rec.history.slice().reverse().map(function(h,i){return(

              );}):<div style={{textAlign:"center",padding:"30px",color:GRAY,fontSize:13}}>No history recorded yet.</div>}
            </div>
          </div>
        </div></div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   [7] LEGAL CASES  (Add / Edit / Delete; cheque-bounce case type)

function mapLegalCase(id,d){
  return{_docId:id,caseNumber:d.caseNumber||"",caseTitle:d.caseTitle||"",court:d.court||"",responsible:d.responsible||"",partyName:d.partyName||"",caseType:d.caseType||"",status:d.status||"Open",date:d.date||"",nextHearing:d.nextHearing||"",amount:d.amount||"",notes:d.notes||"",createdBy:d.createdBy||"",Location:d.locationId||""};
}
// Escalation chip for a legal case, keyed off the Next Hearing date (mirrors activity RAG).
function legalEscalation(c){
  if(["Settled","Closed","Dismissed"].indexOf(String(c.status))>-1)return null;
  var n=daysUntil(c.nextHearing);if(n===null)return {label:"No hearing set",color:"#92400E",bg:"#FEF3C7"};
  if(n<0)return {label:"Hearing overdue",color:"#fff",bg:"#B91C1C"};
  if(n<=3)return {label:"Hearing in "+n+"d",color:"#fff",bg:"#EF4444"};
  if(n<=14)return {label:"Hearing in "+n+"d",color:"#92400E",bg:"#FEF3C7"};
  return null;
}
function LegalCasesPage(props){
  var cases=props.cases||[],canEdit=props.canEdit,canDelete=props.canDelete,authUser=props.authUser;
  var [q,setQ]=useState("");

  var [modal,setModal]=useState(null);
  var [saving,setSaving]=useState(false);
  var [bulkLegal,setBulkLegal]=useState(null);
  function downloadLegalTemplate(){var csv="Case No,Case Title,Party Name,Court,Case Type,Next Hearing,Status,Amount\nCB-2024-001,ABC v XYZ,ABC Company,District Court,Cheque Bounce,2026-08-15,Open,500000\n";var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="legal_cases_template.csv";a.click();}
  function parseLegalCSV(text){var raw=String(text).replace(/^﻿/,"");var lines=raw.split(/\r?\n/).filter(function(l){return l.trim()!=="";});if(lines.length<2)return{rows:[],error:"File needs a header row + at least one data row."};var out=[],errs=[];for(var i=1;i<lines.length;i++){var cols=splitCSVLine(lines[i]);var party=String(cols[2]||"").trim();if(!party){errs.push("Row "+(i+1)+": missing Party Name");continue;}out.push({caseNumber:String(cols[0]||"").trim(),caseTitle:String(cols[1]||"").trim(),partyName:party,court:String(cols[3]||"").trim(),caseType:String(cols[4]||"Other").trim()||"Other",nextHearing:String(cols[5]||"").trim(),status:String(cols[6]||"Open").trim()||"Open",amount:String(cols[7]||"").trim()});}return{rows:out,error:errs.length?errs.join("; "):""};}
  function onBulkLegalFile(e){var f=e.target.files&&e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var res=parseLegalCSV(ev.target.result);setBulkLegal({rows:res.rows,error:res.error,busy:false});};r.readAsText(f);}
  async function importBulkLegal(){if(!bulkLegal||!bulkLegal.rows.length)return;setBulkLegal(function(b){return Object.assign({},b,{busy:true});});try{var CHUNK=450,rows=bulkLegal.rows;for(var s=0;s<rows.length;s+=CHUNK){var batch=db.batch();rows.slice(s,s+CHUNK).forEach(function(r){batch.set(db.collection("legalCases").doc(),Object.assign({},r,{locationId:authUser.locationId||"",date:"",notes:"",responsible:"",createdBy:authUser.name}));});await batch.commit();}await logActivity("add","Legal","Bulk import",bulkLegal.rows.length+" legal cases imported by "+authUser.name,authUser.name,authUser.role,authUser.locationId||"");setBulkLegal(null);}catch(e){console.error("[bulkLegal]",e);setBulkLegal(function(b){return Object.assign({},b,{busy:false,error:"Import failed: "+((e&&e.message)||e)});}); }}
  var TYPES=["Cheque Bounce","Recovery Suit","Consumer Case","Labour Dispute","Contract Dispute","Criminal Complaint","Other"];
  var STATUSES=["Open","In Progress","Hearing Scheduled","Settled","Closed","Dismissed"];
  var scolor={"Open":"#1E40AF","In Progress":"#92400E","Hearing Scheduled":"#6D28D9","Settled":"#065F46","Closed":"#374151","Dismissed":"#374151"};
  function blank(t){return {caseNumber:"",caseTitle:"",court:"",responsible:"",partyName:"",caseType:t||"Recovery Suit",status:"Open",date:todayISO(),nextHearing:"",amount:"",notes:""};}
  function upd(k,v){setModal(function(m){return Object.assign({},m,{rec:Object.assign({},m.rec,{[k]:v})});});}
  async function save(){
    var r=modal.rec;if(!String(r.partyName||"").trim()){alert("Party Name is required.");return;}
    setSaving(true);
    try{
      var data={caseNumber:r.caseNumber||"",caseTitle:r.caseTitle||"",court:r.court||"",responsible:r.responsible||"",partyName:r.partyName,caseType:r.caseType||"Other",status:r.status||"Open",date:r.date||"",nextHearing:r.nextHearing||"",amount:r.amount||"",notes:r.notes||"",locationId:authUser.locationId||""};
      if(modal.mode==="edit"&&r._docId){await db.collection("legalCases").doc(r._docId).update(data);await logActivity("edit","Legal",r.partyName,"Case updated by "+authUser.name,authUser.name,authUser.role,authUser.locationId||"");}
      else{data.createdBy=authUser.name;data.createdAt=firebase.firestore.FieldValue.serverTimestamp();await db.collection("legalCases").add(data);await logActivity("add","Legal",r.partyName,(data.caseType||"Case")+" added by "+authUser.name,authUser.name,authUser.role,authUser.locationId||"");}
      setModal(null);
    }catch(e){console.error("[legalCases save]",e);alert("Save failed: "+((e&&e.message)||e));}
    finally{setSaving(false);}
  }
  async function del(c){
    if(!window.confirm("Delete the legal case for \""+c.partyName+"\"? It will be removed from the list."))return;
    try{await db.collection("legalCases").doc(c._docId).update({archived:true,archivedBy:authUser.name,archivedOn:todayISO()});await logActivity("delete","Legal",c.partyName,"Case deleted by "+authUser.name,authUser.name,authUser.role,authUser.locationId||"");}
    catch(e){console.error("[legalCases del]",e);alert("Delete failed: "+((e&&e.message)||e));}
  }
  var rows=cases.slice();
  if(fStatus!=="All")rows=rows.filter(function(c){return c.status===fStatus;});

  var inp={width:"100%",padding:"9px 12px",border:"1.5px solid #D0E8F5",borderRadius:8,fontSize:13,color:DARK,fontFamily:"Inter,sans-serif",boxSizing:"border-box",background:"white"};

    <div>

        {canEdit&&<button onClick={downloadLegalTemplate} style={{padding:"10px 14px",background:"#EBF5FB",color:NAVY,border:"1px solid #BBDEFB",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}><i className="ti ti-download" aria-hidden="true" style={{fontSize:14,verticalAlign:"-2px",marginRight:5}}/>Template</button>}
        {canEdit&&<button onClick={function(){setBulkLegal({rows:[],error:"",busy:false});}} style={{padding:"10px 14px",background:"#EBF5FB",color:NAVY,border:"1px solid #BBDEFB",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}><i className="ti ti-upload" aria-hidden="true" style={{fontSize:14,verticalAlign:"-2px",marginRight:5}}/>Bulk Upload</button>}
        {canEdit&&<button onClick={function(){setModal({mode:"add",rec:blank()});}} style={{padding:"10px 18px",background:"linear-gradient(135deg,#10B981,#059669)",color:"white",border:"none",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>+ Add Case</button>}
      </div>
      <div style={{display:"flex",marginBottom:14,flexWrap:"wrap"}}>
        <div className="seg-bar">{["All"].concat(STATUSES).map(function(s){return(<button key={s} onClick={function(){setFStatus(s);}} className={fStatus===s?"sel":""}>{s}</button>);})}</div>
      </div>
      {rows.length===0?(
        <div style={{textAlign:"center",padding:"50px 20px",color:GRAY}}><div style={{fontSize:16,fontWeight:700,color:DARK,marginBottom:6}}>No legal cases{fStatus!=="All"||query?" match":" yet"}</div><div style={{fontSize:13}}>{canEdit?"Use “+ Add Case” to create one.":"No records to show."}</div></div>
      ):(
        <div>
          <div style={{fontSize:13,fontWeight:700,color:DARK,marginBottom:10}}>Legal Cases ({rows.length})</div>
          {rows.map(function(c){return(
            <div key={c._docId} style={{background:"white",borderRadius:12,padding:"14px 18px",marginBottom:8,boxShadow:"0 1px 6px rgba(0,56,101,0.06)",borderLeft:"4px solid "+(scolor[c.status]||"#90A4AE")}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
                <div style={{minWidth:0,flex:1}}>
                  <div style={{fontSize:14,fontWeight:800,color:DARK,marginBottom:2}}>{c.caseTitle||c.partyName||"—"}</div>
                  <div style={{fontSize:11,color:GRAY,marginBottom:4}}>{c.caseNumber?("Case No. "+c.caseNumber):""}{c.caseNumber&&(c.court||c.partyName)?" · ":""}{c.court||""}{(c.court&&c.partyName)?" · ":""}{c.caseTitle&&c.partyName?("Party: "+c.partyName):""}</div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:8,background:c.caseType==="Cheque Bounce"?"#FFF7ED":"#EBF5FB",color:c.caseType==="Cheque Bounce"?"#9A3412":NAVY}}>{c.caseType||"—"}</span>
                    <span style={{fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:8,background:"#F1F5F9",color:scolor[c.status]||"#374151"}}>{c.status}</span>

                    {c.date&&<span style={{fontSize:11,color:GRAY}}>Filed {fmtDate(c.date)}</span>}

      {modal&&(

/* ══════════════════════════════════════════
   [5] LICENCE BREAKUP — director list + competent person verification
══════════════════════════════════════════ */
function LicenceBreakupPage(props){
  var lic=props.lic||[],canEdit=props.canEdit,authUser=props.authUser;
  var [q,setQ]=useState("");

  var [draft,setDraft]=useState({competent:"",directors:[],newDir:""});
  var [saving,setSaving]=useState(false);
  var inp={width:"100%",padding:"8px 11px",border:"1.5px solid #D0E8F5",borderRadius:8,fontSize:13,color:DARK,fontFamily:"Inter,sans-serif",boxSizing:"border-box",background:"white"};
  function startEdit(l){setEditId(l._docId);setDraft({competent:l["Competent Person"]||"",directors:(l["Directors"]||[]).slice(),newDir:""});}
  function addDir(){var n=String(draft.newDir||"").trim();if(!n)return;setDraft(function(d){return Object.assign({},d,{directors:d.directors.concat([n]),newDir:""});});}
  function rmDir(i){setDraft(function(d){var a=d.directors.slice();a.splice(i,1);return Object.assign({},d,{directors:a});});}
  async function saveEdit(l){
    setSaving(true);
    try{await db.collection("licences").doc(l._docId).update({competentPerson:draft.competent,directors:draft.directors,competentVerified:false});await logActivity("edit","Licenses",l["License / Agreement Name"],"Breakup updated (competent person + directors) by "+authUser.name,authUser.name,authUser.role,authUser.locationId||"");setEditId(null);}
    catch(e){console.error("[breakup save]",e);alert("Save failed: "+((e&&e.message)||e));}
    finally{setSaving(false);}
  }
  async function verify(l){
    try{await db.collection("licences").doc(l._docId).update({competentVerified:true,competentVerifiedBy:authUser.name,competentVerifiedOn:todayISO()});await logActivity("edit","Licenses",l["License / Agreement Name"],"Competent person verified by "+authUser.name,authUser.name,authUser.role,authUser.locationId||"");}
    catch(e){console.error("[breakup verify]",e);alert("Verify failed: "+((e&&e.message)||e));}

  var query=q.trim().toLowerCase();
  var breakupLic=lic.filter(function(l){return !!l["Requires Breakup"];});
  var rows=query?breakupLic.filter(function(l){return (String(l["License / Agreement Name"])+" "+String(l["Company"])+" "+String(l["Competent Person"])).toLowerCase().includes(query);}):breakupLic;
  return(
