<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICH Integrated Central Hub</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:sans-serif; background:#F8FAFC; }
    input,textarea,button { font-family:sans-serif; outline:none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

var useState   = React.useState;
var useEffect  = React.useEffect;
var useCallback = React.useCallback;

var SHEET_ID = "13cTQU5vA_go5gIwVe4CaxgtfZosxvIUH9RsptoxVC_8";
var API_URL  = "https://script.google.com/macros/s/AKfycbxf4MT0tUFvWw1cD_hvinFYQ0pZet1Hgfv5cNl44BsUSDGXnLUGfd9uPrrr-2qdT0VBtg/exec";

async function fetchSheet(sheet) {
  try {
    var url  = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json&sheet=" + encodeURIComponent(sheet);
    var res  = await fetch(url);
    var text = await res.text();
    var m    = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?\s*$/);
    if (!m) return [];
    var json = JSON.parse(m[1]);
    if (!json.table || !json.table.rows) return [];
    var cols = json.table.cols.map(function(c) { return c.label || c.id; });
    return json.table.rows
      .filter(function(r) { return r.c && r.c.some(function(cell) { return cell && cell.v !== null && cell.v !== ""; }); })
      .map(function(r) {
        var obj = {};
        (r.c || []).forEach(function(cell, i) { obj[cols[i]] = (cell && cell.v !== null) ? cell.v : ""; });
        return obj;
      });
  } catch(e) { return []; }
}

async function postUpdate(sheet, row, rowIndex) {
  try {
    await fetch(API_URL, {
      method:"POST", mode:"no-cors",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({ sheet:sheet, row:row, rowIndex:rowIndex })
    });
    return true;
  } catch(e) { return false; }
}

var TODAY = new Date();
TODAY.setHours(0,0,0,0);

function daysUntil(s) {
  if (!s) return null;
  try { var d = new Date(s); d.setHours(0,0,0,0); return Math.round((d - TODAY) / 86400000); }
  catch(e) { return null; }
}

function fmtDate(s) {
  if (!s) return "—";
  try { return new Date(s).toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" }); }
  catch(e) { return String(s); }
}

function todayStr() {
  return TODAY.toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" });
}

var ROLE_COLORS = {
  Head:     { color:"#7C3AED", bg:"#EDE9FE", icon:"◉" },
  Manager:  { color:"#B45309", bg:"#FEF3C7", icon:"◈" },
  Operator: { color:"#0369A1", bg:"#E0F2FE", icon:"◎" },
  RDM:      { color:"#065F46", bg:"#D1FAE5", icon:"◆" },
  Staff:    { color:"#374151", bg:"#F3F4F6", icon:"○" },
  Viewer:   { color:"#6B7280", bg:"#F9FAFB", icon:"◌" },
};

var STATUS_COLORS = {
  Pending:   { bg:"#FEF3C7", color:"#92400E", dot:"#D97706" },
  Planned:   { bg:"#DBEAFE", color:"#1E40AF", dot:"#3B82F6" },
  Submitted: { bg:"#EDE9FE", color:"#5B21B6", dot:"#7C3AED" },
  Validated: { bg:"#D1FAE5", color:"#065F46", dot:"#10B981" },
  Completed: { bg:"#D1FAE5", color:"#065F46", dot:"#10B981" },
  Active:    { bg:"#D1FAE5", color:"#065F46", dot:"#10B981" },
  Expired:   { bg:"#FEE2E2", color:"#991B1B", dot:"#EF4444" },
  Overdue:   { bg:"#FEE2E2", color:"#991B1B", dot:"#EF4444" },
};

var NOTIF_STYLE = {
  danger:  { bg:"#FEE2E2", color:"#991B1B", border:"#FCA5A5", dot:"#EF4444" },
  warning: { bg:"#FEF3C7", color:"#92400E", border:"#FCD34D", dot:"#F59E0B" },
  info:    { bg:"#EDE9FE", color:"#5B21B6", border:"#C4B5FD", dot:"#7C3AED" },
  success: { bg:"#D1FAE5", color:"#065F46", border:"#6EE7B7", dot:"#10B981" },
};

function StatusBadge(props) {
  var s = STATUS_COLORS[props.status] || STATUS_COLORS.Pending;
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:5, fontSize:11, padding:"3px 9px", borderRadius:20, background:s.bg, color:s.color, fontWeight:600, whiteSpace:"nowrap" }}>
      <span style={{ display:"inline-block", width:6, height:6, borderRadius:"50%", background:s.dot }} />
      {props.status}
    </span>
  );
}

function LoginScreen(props) {
  var [username, setUsername] = useState("");
  var [password, setPassword] = useState("");
  var [error, setError]       = useState("");
  var [loading, setLoading]   = useState(false);

  async function handleLogin() {
    if (!username || !password) { setError("Please enter username and password."); return; }
    setLoading(true); setError("");
    var users = await fetchSheet("Users");
    if (!users || users.length === 0) { setError("Cannot connect to server. Please check internet and try again."); setLoading(false); return; }
    var match = null;
    for (var i = 0; i < users.length; i++) {
      var u = users[i];
      if (
        String(u["Username"] || "").trim().toLowerCase() === username.trim().toLowerCase() &&
        String(u["Password"] || "").trim() === password.trim() &&
        String(u["Active (Yes/No)"] || "").trim() === "Yes"
      ) { match = u; break; }
    }
    if (match) {
      props.onLogin({ name:String(match["Full Name"]), role:String(match["Role"]), email:String(match["Email ID"]), username:String(match["Username"]) });
    } else {
      setError("Invalid credentials. Please check username and password.");
    }
    setLoading(false);
  }

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg,#0A1628 0%,#0F2744 50%,#0A1628 100%)" }}>
      <div style={{ width:"100%", maxWidth:380, padding:"0 20px" }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.2em", color:"#F59E0B", textTransform:"uppercase", marginBottom:8 }}>Integrated Central Hub</div>
          <div style={{ fontSize:28, fontWeight:700, color:"white" }}>ICH Dashboard</div>
          <div style={{ fontSize:12, color:"#64748B", marginTop:6 }}>AMC · Licenses · Quality</div>
        </div>
        <div style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:12, padding:24 }}>
          <div style={{ marginBottom:14 }}>
            <label style={{ fontSize:11, color:"#94A3B8", fontWeight:500, display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:"0.08em" }}>Username</label>
            <input value={username} onChange={function(e){setUsername(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")handleLogin();}} placeholder="e.g. POSH.ICH"
              style={{ width:"100%", background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, padding:"10px 14px", color:"white", fontSize:14 }} />
          </div>
          <div style={{ marginBottom:20 }}>
            <label style={{ fontSize:11, color:"#94A3B8", fontWeight:500, display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:"0.08em" }}>Password</label>
            <input type="password" value={password} onChange={function(e){setPassword(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")handleLogin();}} placeholder="Enter your password"
              style={{ width:"100%", background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, padding:"10px 14px", color:"white", fontSize:14 }} />
          </div>
          {error && <div style={{ fontSize:12, color:"#FCA5A5", marginBottom:14, padding:"8px 12px", background:"rgba(239,68,68,0.15)", borderRadius:6 }}>{error}</div>}
          <button onClick={handleLogin} disabled={loading}
            style={{ width:"100%", padding:"12px", background:loading?"#78716C":"#F59E0B", border:"none", borderRadius:8, color:"#0A1628", fontSize:15, fontWeight:700 }}>
            {loading ? "Signing in…" : "SIGN IN"}
          </button>
        </div>
        <div style={{ textAlign:"center", marginTop:16, fontSize:11, color:"#475569" }}>ICH Indore · Secure Access</div>
      </div>
    </div>
  );
}

function App() {
  var [user, setUser]             = useState(null);
  var [tab, setTab]               = useState("amc");
  var [amcData, setAmcData]       = useState([]);
  var [licData, setLicData]       = useState([]);
  var [qualData, setQualData]     = useState([]);
  var [loading, setLoading]       = useState(false);
  var [modal, setModal]           = useState(null);
  var [comment, setComment]       = useState("");
  var [fileName, setFileName]     = useState("");
  var [plannedDate, setPlannedDate] = useState("");
  var [filter, setFilter]         = useState("All");
  var [notifOpen, setNotifOpen]   = useState(false);
  var [dismissed, setDismissed]   = useState([]);
  var [saving, setSaving]         = useState(false);

  var loadData = useCallback(async function() {
    setLoading(true);
    var results = await Promise.all([fetchSheet("AMC"), fetchSheet("Licenses"), fetchSheet("Quality")]);
    var amc = results[0]; var lic = results[1]; var qual = results[2];
    setAmcData(amc.map(function(t) {
      var d = daysUntil(t["Next Service Due Date"]);
      if (d !== null && d < 0 && String(t["Status"]) === "Pending") return Object.assign({}, t, { Status:"Overdue" });
      return t;
    }));
    setLicData(lic.map(function(t) {
      if (t["Expiry Date"] && String(t["Expiry Date"]) !== "Lifetime") {
        var d = daysUntil(t["Expiry Date"]);
        if (d !== null && d < 0 && String(t["Status"]) === "Active") return Object.assign({}, t, { Status:"Expired" });
      }
      return t;
    }));
    setQualData(qual.filter(function(t) { return t["Activity Name"]; }));
    setLoading(false);
  }, []);

  useEffect(function() { if (user) loadData(); }, [user]);

  if (!user) return <LoginScreen onLogin={function(u) { setUser(u); }} />;

  var role = user.role;
  var rc   = ROLE_COLORS[role] || ROLE_COLORS.Staff;
  var isViewer    = (role === "Head" || role === "Viewer");
  var canValidate = (role === "Manager");
  var canSignOff  = (role === "RDM");
  var canSubmit   = (role === "Staff" || role === "Operator" || role === "Manager");
  var canSetup    = (role === "Manager" || role === "Operator");

  function getActions(task, sheet) {
    var s = String(task["Status"]);
    if (sheet === "AMC") {
      if (canSubmit && (s === "Pending" || s === "Overdue")) return [{key:"plan",label:"Mark Planned",bg:"#3B82F6"},{key:"submit",label:"Submit Evidence",bg:"#7C3AED"}];
      if (canValidate && s === "Submitted") return [{key:"validate",label:"Validate & Close",bg:"#10B981"},{key:"sendback",label:"Send Back",bg:"#EF4444"}];
      if (canSignOff && s === "Validated") return [{key:"signoff",label:"RDM Sign Off",bg:"#0369A1"}];
    }
    if (sheet === "Licenses") {
      var d = daysUntil(task["Expiry Date"]);
      if (canSetup && (s === "Expired" || (d !== null && d <= 30 && String(task["Expiry Date"]) !== "Lifetime"))) return [{key:"renew",label:"Mark Renewed",bg:"#10B981"}];
    }
    return [];
  }

  var notifs = [];
  amcData.forEach(function(t) {
    var d = daysUntil(t["Next Service Due Date"]); var s = String(t["Status"]);
    if (s === "Overdue") notifs.push({id:"od_"+t["S.No"],level:"danger",text:String(t["Equipment Name"])+" is OVERDUE",task:t,sheet:"AMC"});
    else if (s === "Pending" && d !== null && d >= 0 && d <= 3) notifs.push({id:"soon_"+t["S.No"],level:"warning",text:String(t["Equipment Name"])+" due "+(d===0?"today":"in "+d+"d"),task:t,sheet:"AMC"});
    if (s === "Submitted") notifs.push({id:"sub_"+t["S.No"],level:"info",text:String(t["Equipment Name"])+" awaiting validation",task:t,sheet:"AMC"});
  });
  licData.forEach(function(t) {
    var d = daysUntil(t["Expiry Date"]); var s = String(t["Status"]);
    if (s === "Expired") notifs.push({id:"lod_"+t["S.No"],level:"danger",text:"License EXPIRED: "+String(t["License / Agreement Name"]),task:t,sheet:"Licenses"});
    else if (d !== null && d >= 0 && d <= 30 && String(t["Expiry Date"]) !== "Lifetime") notifs.push({id:"lexp_"+t["S.No"],level:"warning",text:"License expiring in "+d+"d: "+String(t["License / Agreement Name"]),task:t,sheet:"Licenses"});
  });
  notifs = notifs.filter(function(n) { return dismissed.indexOf(n.id) === -1; });
  var criticals = notifs.filter(function(n) { return n.level === "danger"; });
  var notifCount = notifs.length;

  async function handleAction() {
    if (!modal) return; setSaving(true);
    var task=modal.task; var key=modal.key; var sheet=modal.sheet; var rowIndex=modal.rowIndex;
    var updated = Object.assign({}, task); var now = todayStr();
    if (key==="plan")     { updated["Status"]="Planned"; updated["Planned Date"]=plannedDate; updated["Planned By"]=user.name; }
    if (key==="submit")   { updated["Status"]="Submitted"; updated["Evidence File"]=fileName||"evidence.pdf"; updated["Submitted By"]=user.name; updated["Submitted On"]=now; }
    if (key==="validate") { updated["Status"]="Validated"; updated["Validated By"]=user.name; updated["Validated On"]=now; updated["Remarks"]=comment; }
    if (key==="sendback") { updated["Status"]="Pending"; updated["Remarks"]="Sent back: "+comment; }
    if (key==="signoff")  { updated["Status"]="Completed"; updated["Remarks"]=comment; }
    if (key==="renew")    { updated["Status"]="Active"; updated["Remarks"]="Renewed "+now+" by "+user.name+". "+comment; }
    await postUpdate(sheet, updated, rowIndex);
    await new Promise(function(r) { setTimeout(r, 2500); });
    await loadData(); setSaving(false);
    setModal(null); setComment(""); setFileName(""); setPlannedDate("");
  }

  var dispAmc = filter==="All" ? amcData : amcData.filter(function(t){return String(t["Status"])===filter;});
  var dispLic = filter==="All" ? licData : licData.filter(function(t){return String(t["Status"])===filter;});

  return (
    <div style={{ fontFamily:"sans-serif", background:"#F8FAFC", minHeight:"100vh", position:"relative" }}>

      {modal && (
        <div style={{ position:"fixed", inset:0, background:"rgba(10,22,40,0.6)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 }}>
          <div style={{ background:"white", borderRadius:14, border:"1px solid #E2E8F0", padding:"1.5rem", width:"92%", maxWidth:460, boxShadow:"0 20px 60px rgba(0,0,0,0.2)", maxHeight:"90vh", overflowY:"auto" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
              <div>
                <div style={{ fontSize:10, fontWeight:600, color:"#94A3B8", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:4 }}>{modal.sheet} Action</div>
                <div style={{ fontSize:17, fontWeight:600, color:"#0F172A" }}>{modal.task["Equipment Name"]||modal.task["License / Agreement Name"]||modal.task["Activity Name"]}</div>
              </div>
              <button onClick={function(){setModal(null);}} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#94A3B8" }}>✕</button>
            </div>
            <div style={{ background:"#F8FAFC", borderRadius:8, padding:"10px 14px", marginBottom:14, fontSize:12 }}>
              {modal.task["Vendor Name"] && <div style={{marginBottom:4}}><span style={{color:"#64748B"}}>Vendor: </span><strong>{modal.task["Vendor Name"]}</strong></div>}
              {modal.task["Next Service Due Date"] && <div style={{marginBottom:4}}><span style={{color:"#64748B"}}>Due: </span><strong>{fmtDate(modal.task["Next Service Due Date"])}</strong></div>}
              {modal.task["Expiry Date"] && <div style={{marginBottom:4}}><span style={{color:"#64748B"}}>Expires: </span><strong>{fmtDate(modal.task["Expiry Date"])}</strong></div>}
              <div><span style={{color:"#64748B"}}>Status: </span><StatusBadge status={String(modal.task["Status"])} /></div>
            </div>
            {modal.task["Evidence File"] && <div style={{marginBottom:12,fontSize:12,background:"#EDE9FE",color:"#5B21B6",borderRadius:6,padding:"7px 12px"}}>Evidence: {modal.task["Evidence File"]}</div>}
            {modal.task["Remarks"] && <div style={{marginBottom:10,fontSize:12,color:"#64748B",fontStyle:"italic"}}>Note: {modal.task["Remarks"]}</div>}
            {modal.key==="plan" && <div style={{marginBottom:14}}><label style={{fontSize:11,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>Planned vendor visit date</label><input type="date" value={plannedDate} onChange={function(e){setPlannedDate(e.target.value);}} style={{width:"100%",padding:"9px 12px",border:"1px solid #E2E8F0",borderRadius:8,fontSize:13}}/></div>}
            {modal.key==="submit" && <div style={{marginBottom:14}}><label style={{fontSize:11,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>Evidence document filename</label><input value={fileName} onChange={function(e){setFileName(e.target.value);}} placeholder="e.g. service_report_may2026.pdf" style={{width:"100%",padding:"9px 12px",border:"1px solid #E2E8F0",borderRadius:8,fontSize:13}}/></div>}
            {(modal.key==="validate"||modal.key==="sendback"||modal.key==="signoff"||modal.key==="renew") && (
              <div style={{marginBottom:16}}>
                <label style={{fontSize:11,color:"#64748B",display:"block",marginBottom:6,fontWeight:500}}>{modal.key==="validate"?"Validation remarks":modal.key==="sendback"?"Reason (required)":modal.key==="signoff"?"RDM review notes":"Renewal remarks"}</label>
                <textarea value={comment} onChange={function(e){setComment(e.target.value);}} placeholder="Add your remarks…" rows={3} style={{width:"100%",resize:"vertical",fontSize:13,padding:"9px 12px",border:"1px solid #E2E8F0",borderRadius:8,color:"#0F172A"}}/>
              </div>
            )}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={function(){setModal(null);}} style={{padding:"8px 16px",fontSize:13,borderRadius:8,border:"1px solid #E2E8F0",background:"white"}}>Cancel</button>
              {modal.key==="plan"     && <button onClick={handleAction} disabled={saving} style={{padding:"8px 16px",fontSize:13,background:"#3B82F6",color:"white",border:"none",borderRadius:8,fontWeight:500}}>{saving?"Saving…":"Confirm Plan"}</button>}
              {modal.key==="submit"   && <button onClick={handleAction} disabled={saving} style={{padding:"8px 16px",fontSize:13,background:"#7C3AED",color:"white",border:"none",borderRadius:8,fontWeight:500}}>{saving?"Saving…":"Submit Evidence"}</button>}
              {modal.key==="validate" && <button onClick={handleAction} disabled={saving} style={{padding:"8px 16px",fontSize:13,background:"#10B981",color:"white",border:"none",borderRadius:8,fontWeight:500}}>{saving?"Saving…":"Validate & Close"}</button>}
              {modal.key==="sendback" && <button onClick={handleAction} disabled={saving||!comment} style={{padding:"8px 16px",fontSize:13,background:"#EF4444",color:"white",border:"none",borderRadius:8,fontWeight:500,opacity:(!comment||saving)?0.5:1}}>{saving?"Saving…":"Send Back"}</button>}
              {modal.key==="signoff"  && <button onClick={handleAction} disabled={saving} style={{padding:"8px 16px",fontSize:13,background:"#0369A1",color:"white",border:"none",borderRadius:8,fontWeight:500}}>{saving?"Saving…":"RDM Sign Off"}</button>}
              {modal.key==="renew"    && <button onClick={handleAction} disabled={saving} style={{padding:"8px 16px",fontSize:13,background:"#10B981",color:"white",border:"none",borderRadius:8,fontWeight:500}}>{saving?"Saving…":"Confirm Renewal"}</button>}
            </div>
          </div>
        </div>
      )}

      <div style={{background:"linear-gradient(135deg,#0A1628 0%,#0F2744 100%)",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.15em",color:"#F59E0B",textTransform:"uppercase",marginBottom:2}}>Integrated Central Hub · ICH Indore</div>
          <div style={{fontSize:20,fontWeight:700,color:"white"}}>AMC &amp; Quality Dashboard</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:12,padding:"4px 12px",borderRadius:20,background:rc.bg,color:rc.color,fontWeight:600}}>{rc.icon} {role}</span>
          <span style={{fontSize:12,color:"#94A3B8"}}>{user.name}</span>
          <div style={{position:"relative"}}>
            <button onClick={function(){setNotifOpen(!notifOpen);}} style={{width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
              {notifCount>0 && <span style={{position:"absolute",top:3,right:3,width:16,height:16,background:"#EF4444",borderRadius:"50%",fontSize:9,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{notifCount>9?"9+":notifCount}</span>}
            </button>
          </div>
          <button onClick={function(){setUser(null);setAmcData([]);setLicData([]);setQualData([]);}} style={{fontSize:11,padding:"5px 12px",background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,color:"#FCA5A5"}}>Sign Out</button>
        </div>
      </div>

      <div style={{padding:"16px 20px"}}>

        {notifOpen && (
          <div style={{marginBottom:14,border:"1px solid #E2E8F0",borderRadius:10,overflow:"hidden"}}>
            <div style={{padding:"10px 16px",background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,fontWeight:600,color:"#0F172A"}}>Alerts &amp; Notifications</span>
              <button onClick={function(){setNotifOpen(false);}} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",color:"#94A3B8"}}>✕</button>
            </div>
            {notifs.length===0
              ? <div style={{padding:"1.25rem",textAlign:"center",fontSize:13,color:"#94A3B8"}}>No alerts at this time.</div>
              : notifs.map(function(n) {
                var s=NOTIF_STYLE[n.level]; var acts=n.task?getActions(n.task,n.sheet):[];
                return (
                  <div key={n.id} style={{padding:"10px 16px",background:s.bg,borderBottom:"1px solid "+s.border,display:"flex",alignItems:"center",gap:10}}>
                    <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:s.dot,flexShrink:0}}/>
                    <span style={{fontSize:13,color:s.color,flex:1}}>{n.text}</span>
                    <div style={{display:"flex",gap:6}}>
                      {acts.slice(0,1).map(function(a){return <button key={a.key} onClick={function(){setModal({task:n.task,key:a.key,sheet:n.sheet,rowIndex:Number(n.task["S.No"])+1});setNotifOpen(false);}} style={{fontSize:11,padding:"4px 10px",background:a.bg,color:"white",border:"none",borderRadius:6}}>{a.label}</button>;})}
                      <button onClick={function(){setDismissed(dismissed.concat([n.id]));}} style={{fontSize:11,padding:"4px 10px",background:"transparent",border:"1px solid "+s.border,borderRadius:6,color:s.color}}>Dismiss</button>
                    </div>
                  </div>
                );
              })
            }
          </div>
        )}

        {criticals.length>0 && !notifOpen && (
          <div style={{background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:8,padding:"10px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
            <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#EF4444",flexShrink:0}}/>
            <span style={{fontSize:13,color:"#991B1B",flex:1}}><strong>{criticals.length} critical {criticals.length===1?"alert":"alerts"}</strong> — {criticals[0].text}</span>
            <button onClick={function(){setNotifOpen(true);}} style={{fontSize:12,padding:"4px 12px",background:"#991B1B",color:"white",border:"none",borderRadius:6}}>View All</button>
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:18}}>
          {[
            {label:"AMC Contracts",   value:amcData.length,                                                               bg:"#EFF6FF",color:"#1D4ED8",border:"#BFDBFE"},
            {label:"Overdue",         value:amcData.filter(function(t){return String(t["Status"])==="Overdue";}).length,  bg:"#FEE2E2",color:"#991B1B",border:"#FCA5A5"},
            {label:"Pending Approval",value:amcData.filter(function(t){return String(t["Status"])==="Submitted";}).length,bg:"#EDE9FE",color:"#5B21B6",border:"#C4B5FD"},
            {label:"Licenses",        value:licData.length,                                                               bg:"#F0FDF4",color:"#166534",border:"#BBF7D0"},
            {label:"Expiring/Expired",value:licData.filter(function(t){var d=daysUntil(t["Expiry Date"]);return String(t["Status"])==="Expired"||(d!==null&&d>=0&&d<=30&&String(t["Expiry Date"])!=="Lifetime");}).length,bg:"#FEF3C7",color:"#92400E",border:"#FCD34D"},
          ].map(function(c){
            return (
              <div key={c.label} style={{background:c.bg,border:"1px solid "+c.border,borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:10,color:c.color,fontWeight:600,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.07em"}}>{c.label}</div>
                <div style={{fontSize:28,fontWeight:700,color:c.color,lineHeight:1}}>{c.value}</div>
              </div>
            );
          })}
        </div>

        <div style={{display:"flex",borderBottom:"2px solid #E2E8F0",marginBottom:16,overflowX:"auto"}}>
          {[
            {id:"amc",      label:"AMC ("+amcData.length+")"},
            {id:"licenses", label:"Licenses ("+licData.length+")"},
            {id:"quality",  label:"Quality ("+qualData.length+")"},
            {id:"alerts",   label:"Alerts",badge:notifCount},
          ].map(function(t){
            return (
              <button key={t.id} onClick={function(){setTab(t.id);setFilter("All");}} style={{padding:"9px 16px",fontSize:13,background:"transparent",border:"none",cursor:"pointer",borderBottom:tab===t.id?"2px solid #F59E0B":"2px solid transparent",marginBottom:-2,color:tab===t.id?"#0F172A":"#64748B",fontWeight:tab===t.id?600:400,whiteSpace:"nowrap"}}>
                {t.label}
                {t.badge>0 && <span style={{marginLeft:5,background:"#EF4444",color:"white",borderRadius:10,fontSize:10,padding:"1px 6px",fontWeight:700}}>{t.badge}</span>}
              </button>
            );
          })}
        </div>

        {(tab==="amc"||tab==="licenses") && (
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            {(tab==="amc"?["All","Pending","Planned","Submitted","Validated","Completed","Overdue"]:["All","Active","Expired"]).map(function(f){
              return <button key={f} onClick={function(){setFilter(f);}} style={{padding:"4px 12px",fontSize:12,borderRadius:20,cursor:"pointer",background:filter===f?"#0F172A":"white",color:filter===f?"white":"#64748B",border:filter===f?"1px solid #0F172A":"1px solid #E2E8F0",fontWeight:filter===f?500:400}}>{f}</button>;
            })}
          </div>
        )}

        {loading && <div style={{textAlign:"center",padding:"2.5rem",color:"#94A3B8",fontSize:13}}>Loading live data from Google Sheet…</div>}

        {tab==="amc" && !loading && (
          <div>
            {dispAmc.length===0 && <div style={{textAlign:"center",padding:"2rem",color:"#94A3B8",fontSize:13}}>No tasks match this filter.</div>}
            {dispAmc.map(function(task,idx){
              var s=String(task["Status"]); var days=daysUntil(task["Next Service Due Date"]);
              var isOverdue=s==="Overdue"; var isDueSoon=s==="Pending"&&days!==null&&days>=0&&days<=3;
              var acts=getActions(task,"AMC");
              var lc=isOverdue?"#EF4444":isDueSoon?"#F59E0B":(s==="Validated"||s==="Completed")?"#10B981":s==="Submitted"?"#7C3AED":s==="Planned"?"#3B82F6":"#CBD5E1";
              return (
                <div key={idx} style={{border:"1px solid "+(isOverdue?"#FCA5A5":isDueSoon?"#FCD34D":"#E2E8F0"),borderLeft:"3px solid "+lc,borderRadius:8,padding:"12px 16px",marginBottom:8,background:"white"}}>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                        <StatusBadge status={s}/>
                        {isOverdue && days!==null && <span style={{fontSize:11,color:"#991B1B",fontWeight:600}}>{"↑ "+Math.abs(days)+"d overdue"}</span>}
                        {isDueSoon && <span style={{fontSize:11,color:"#92400E",fontWeight:600}}>{"Due "+(days===0?"today":"in "+days+"d")}</span>}
                        {task["Frequency"] && <span style={{fontSize:11,color:"#94A3B8"}}>{task["Frequency"]}</span>}
                      </div>
                      <div style={{fontSize:15,fontWeight:600,color:"#0F172A",marginBottom:4}}>{String(task["Equipment Name"]||"")}</div>
                      <div style={{fontSize:12,color:"#64748B",display:"flex",gap:12,flexWrap:"wrap"}}>
                        {task["Vendor Name"] && <span>{"Vendor: "+task["Vendor Name"]}</span>}
                        {task["Next Service Due Date"] && <span>{"Due: "+fmtDate(task["Next Service Due Date"])}</span>}
                        {task["AMC Period"] && <span>{"Period: "+task["AMC Period"]}</span>}
                        {task["Frequency"] && <span>{task["Frequency"]}</span>}
                      </div>
                      {task["Vendor Contact Person"] && <div style={{marginTop:4,fontSize:11,color:"#64748B"}}>{"Contact: "+task["Vendor Contact Person"]+" · "+task["Vendor Contact No"]}</div>}
                      {task["Planned Date"] && <div style={{marginTop:5,fontSize:12,color:"#3B82F6"}}>{"Planned: "+fmtDate(task["Planned Date"])+" by "+task["Planned By"]}</div>}
                      {task["Evidence File"] && <div style={{marginTop:5,fontSize:12,color:"#7C3AED",background:"#EDE9FE",display:"inline-block",padding:"3px 9px",borderRadius:6}}>{"Evidence: "+task["Evidence File"]}</div>}
                      {task["Submitted By"] && <div style={{marginTop:4,fontSize:11,color:"#64748B"}}>{"Submitted by "+task["Submitted By"]+" · "+fmtDate(task["Submitted On"])}</div>}
                      {task["Validated By"] && <div style={{marginTop:3,fontSize:11,color:"#065F46"}}>{"Validated by "+task["Validated By"]+" · "+fmtDate(task["Validated On"])}</div>}
                      {task["Remarks"] && <div style={{marginTop:4,fontSize:12,color:"#64748B",fontStyle:"italic"}}>{'"'+task["Remarks"]+'"'}</div>}
                    </div>
                    {!isViewer && acts.length>0 && (
                      <div style={{display:"flex",gap:6,flexDirection:"column",flexShrink:0}}>
                        {acts.map(function(a){return <button key={a.key} onClick={function(){setModal({task:task,key:a.key,sheet:"AMC",rowIndex:idx+2});}} style={{fontSize:12,padding:"6px 12px",background:a.bg,color:"white",border:"none",borderRadius:6,fontWeight:500,whiteSpace:"nowrap"}}>{a.label}</button>;})}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {tab==="licenses" && !loading && (
          <div>
            {dispLic.length===0 && <div style={{textAlign:"center",padding:"2rem",color:"#94A3B8",fontSize:13}}>No licenses match this filter.</div>}
            {dispLic.map(function(lic,idx){
              var s=String(lic["Status"]); var days=daysUntil(lic["Expiry Date"]);
              var isExpired=s==="Expired"; var isUrgent=days!==null&&days>=0&&days<=30&&String(lic["Expiry Date"])!=="Lifetime";
              var acts=getActions(lic,"Licenses");
              var lc=isExpired?"#EF4444":isUrgent?"#F59E0B":"#10B981";
              return (
                <div key={idx} style={{border:"1px solid "+(isExpired?"#FCA5A5":isUrgent?"#FCD34D":"#E2E8F0"),borderLeft:"3px solid "+lc,borderRadius:8,padding:"12px 16px",marginBottom:8,background:"white"}}>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                        <StatusBadge status={s}/>
                        {isUrgent && !isExpired && <span style={{fontSize:11,color:"#92400E",fontWeight:600}}>{"Expiring in "+days+" days"}</span>}
                        {isExpired && <span style={{fontSize:11,color:"#991B1B",fontWeight:600}}>EXPIRED — Renewal required</span>}
                      </div>
                      <div style={{fontSize:15,fontWeight:600,color:"#0F172A",marginBottom:4}}>{String(lic["License / Agreement Name"]||"")}</div>
                      <div style={{fontSize:12,color:"#64748B",display:"flex",gap:12,flexWrap:"wrap"}}>
                        {lic["Company"] && <span>{"Company: "+lic["Company"]}</span>}
                        {lic["License No / Key"] && <span>{"No: "+lic["License No / Key"]}</span>}
                        {lic["Expiry Date"] && <span>{"Expires: "+fmtDate(lic["Expiry Date"])}</span>}
                        {lic["Renewal Due Date"] && <span>{"Renewal Due: "+fmtDate(lic["Renewal Due Date"])}</span>}
                      </div>
                      {lic["Contact Person"] && <div style={{marginTop:4,fontSize:12,color:"#64748B"}}>{"Contact: "+lic["Contact Person"]+" · "+lic["Contact No"]}</div>}
                      {lic["Competent Person"] && <div style={{marginTop:3,fontSize:12,color:"#64748B"}}>{"Competent Person: "+lic["Competent Person"]}</div>}
                      {lic["Remarks"] && <div style={{marginTop:4,fontSize:12,color:"#64748B",fontStyle:"italic"}}>{'"'+lic["Remarks"]+'"'}</div>}
                    </div>
                    {!isViewer && acts.length>0 && (
                      <div style={{flexShrink:0}}>
                        {acts.map(function(a){return <button key={a.key} onClick={function(){setModal({task:lic,key:a.key,sheet:"Licenses",rowIndex:idx+2});}} style={{fontSize:12,padding:"6px 12px",background:a.bg,color:"white",border:"none",borderRadius:6,fontWeight:500}}>{a.label}</button>;})}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {tab==="quality" && !loading && (
          <div>
            {["Training","Daily Housekeeping","Fortnightly Housekeeping"].map(function(section){
              var items=qualData.filter(function(t){return String(t["Activity Type"])===section;});
              if (items.length===0) return null;
              return (
                <div key={section} style={{marginBottom:20}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#F59E0B",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
                    <span style={{display:"inline-block",width:20,height:2,background:"#F59E0B"}}/>
                    {section}
                    <span style={{flex:1,height:1,background:"#E2E8F0",display:"inline-block"}}/>
                  </div>
                  {items.map(function(task,idx){
                    return (
                      <div key={idx} style={{border:"1px solid #E2E8F0",borderLeft:"3px solid #7C3AED",borderRadius:8,padding:"12px 16px",marginBottom:8,background:"white",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                        <div>
                          <div style={{fontSize:14,fontWeight:500,color:"#0F172A",marginBottom:3}}>{String(task["Activity Name"]||"")}</div>
                          <div style={{fontSize:12,color:"#64748B",display:"flex",gap:10,flexWrap:"wrap"}}>
                            {task["Description"] && <span>{task["Description"]}</span>}
                            {task["Frequency"] && <span>{"· "+task["Frequency"]}</span>}
                          </div>
                        </div>
                        <StatusBadge status={String(task["Status"]||"Pending")}/>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}

        {tab==="alerts" && (
          <div>
            {notifs.length===0
              ? <div style={{padding:"3rem",textAlign:"center",color:"#94A3B8",fontSize:14}}>No active alerts. All activities on track.</div>
              : notifs.map(function(n){
                var s=NOTIF_STYLE[n.level]; var acts=n.task?getActions(n.task,n.sheet):[];
                return (
                  <div key={n.id} style={{background:s.bg,border:"1px solid "+s.border,borderRadius:8,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                    <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:s.dot,flexShrink:0}}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:s.color,fontWeight:600}}>{n.text}</div>
                      {n.task && <div style={{fontSize:11,color:s.color,opacity:0.75,marginTop:2}}>{(n.task["Vendor Name"]||"")+" · "+fmtDate(n.task["Next Service Due Date"]||n.task["Expiry Date"])}</div>}
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      {acts.slice(0,1).map(function(a){return <button key={a.key} onClick={function(){setModal({task:n.task,key:a.key,sheet:n.sheet,rowIndex:Number(n.task["S.No"])+1});}} style={{fontSize:12,padding:"5px 12px",background:a.bg,color:"white",border:"none",borderRadius:6,fontWeight:500}}>{a.label}</button>;})}
                      <button onClick={function(){setDismissed(dismissed.concat([n.id]));}} style={{fontSize:12,padding:"5px 10px",background:"transparent",border:"1px solid "+s.border,borderRadius:6,color:s.color}}>Dismiss</button>
                    </div>
                  </div>
                );
              })
            }
          </div>
        )}

      </div>

      <div style={{padding:"12px 20px",borderTop:"1px solid #E2E8F0",display:"flex",justifyContent:"space-between",fontSize:11,color:"#94A3B8",background:"white"}}>
        <span>ICH Integrated Central Hub · Indore</span>
        <span>{todayStr()}</span>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
