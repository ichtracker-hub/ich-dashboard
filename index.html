<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ICH · Integrated Central Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#F4F6FB;}
    input,textarea,button{font-family:'Inter',sans-serif;outline:none;}
    button{cursor:pointer;}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:230px;background:#1C1C2E;display:flex;flex-direction:column;z-index:50;overflow-y:auto;}
    .main-content{margin-left:230px;min-height:100vh;display:flex;flex-direction:column;width:calc(100% - 230px);}
    .nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:transparent;border:1px solid transparent;color:#FFFFFF;font-size:13px;font-weight:500;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;margin-bottom:3px;transition:background 0.15s;}
    .nav-btn.active{background:rgba(194,24,91,0.2);border:1px solid rgba(194,24,91,0.35);color:#F48FB1;font-weight:700;}
    .nav-btn:hover:not(.active){background:rgba(255,255,255,0.07);}
    .act-card{background:white;border-radius:12px;box-shadow:0 1px 6px rgba(28,28,46,0.06);margin-bottom:10px;overflow:hidden;transition:box-shadow 0.2s;}
    .act-card:hover{box-shadow:0 4px 16px rgba(28,28,46,0.1);}
    .act-hdr{padding:16px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;}
    .act-body{padding:0 20px 16px;border-top:1px solid #F4F6FB;}
    .pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;}
    .modal-ov{position:fixed;inset:0;background:rgba(28,28,46,0.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(3px);}
    .modal-box{background:white;border-radius:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(28,28,46,0.2);}
    .mobile-nav{position:fixed;bottom:0;left:0;right:0;background:#1C1C2E;border-top:2px solid rgba(194,24,91,0.3);display:none;justify-content:space-around;align-items:stretch;z-index:100;padding:6px 0 calc(6px + env(safe-area-inset-bottom));}
    .mob-btn{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;background:transparent;border:none;color:rgba(255,255,255,0.45);font-size:10px;font-weight:600;cursor:pointer;padding:8px 4px;font-family:'Inter',sans-serif;}
    .mob-btn.active{color:#F48FB1;}
    .mob-btn .mob-icon{font-size:20px;line-height:1.2;}
    @media(max-width:768px){
      .sidebar{display:none !important;}
      .main-content{margin-left:0 !important;width:100% !important;padding-bottom:72px;}
      .mobile-nav{display:flex !important;}
    }
  </style>
</head>

/* ═══════════════════════════════════════════
   UTILITY — all defined before anything else
═══════════════════════════════════════════ */
function parseGDate(s) {
  if (!s) return null;
  try {
    if (typeof s === "string" && s.indexOf("Date(") === 0) {
      var p = s.replace("Date(","").replace(")","").split(",");
      return new Date(parseInt(p[0]), parseInt(p[1]), parseInt(p[2]||1));
    }
    if (typeof s === "string" && /^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
      var q = s.split("/");
      return new Date(parseInt(q[2]), parseInt(q[1])-1, parseInt(q[0]));
    }
    var d = new Date(s);
    return isNaN(d.getTime()) ? null : d;
  } catch(e) { return null; }
}

function daysUntil(s) {
  if (!s) return null;
  var d = parseGDate(s);
  if (!d) return null;
  var t = new Date(); t.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
}

function fmtDate(s) {
  if (!s) return "—";
  if (typeof s === "string" && /^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
    var p = s.split("/");
    var mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return p[0]+" "+mo[parseInt(p[1])-1]+" "+p[2];
  }
  var d = parseGDate(s);
  if (!d) return String(s);
  return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
}

function todayLong() {
  return new Date().toLocaleDateString("en-IN",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
}
function todayShort() {
  return new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
}

/* ═══════════════════════════════════════════
   API
═══════════════════════════════════════════ */
async function fetchSheet(sheet) {
  try {
    var url = "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:json&sheet="+encodeURIComponent(sheet);
    var res = await fetch(url);
    var txt = await res.text();
    var m   = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?\s*$/);
    if (!m) return [];
    var json = JSON.parse(m[1]);
    if (!json.table || !json.table.rows) return [];
    var cols = json.table.cols.map(function(c){ return c.label||c.id; });
    return json.table.rows
      .filter(function(r){ return r.c && r.c.some(function(cell){ return cell && cell.v !== null && cell.v !== ""; }); })
      .map(function(r){
        var obj = {};
        (r.c||[]).forEach(function(cell,i){
          var v = (cell && cell.v !== null) ? cell.v : "";
          if (cell && cell.f && typeof cell.v === "string" && cell.v.indexOf("Date(") === 0) v = cell.f;
          obj[cols[i]] = v;
        });
        return obj;
      });
  } catch(e) { return []; }
}

async function postUpdate(sheet, row, rowIndex) {
  try {
    await fetch(API_URL, {method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({sheet:sheet,row:row,rowIndex:rowIndex})});
    return true;
  } catch(e) { return false; }
}

function fileToBase64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){res(r.result.split(',')[1]);};
    r.onerror=rej; r.readAsDataURL(file);
  });
}
async function postWithFile(sheet,row,rowIndex,file){
  try{
    var b64=await fileToBase64(file);
    await fetch(API_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"submitEvidence",sheet:sheet,row:row,rowIndex:rowIndex,
        fileData:b64,fileName:file.name,fileType:file.type})});
    return true;
  }catch(e){return false;}
}

/* ═══════════════════════════════════════════
   MAIN DASHBOARD
═══════════════════════════════════════════ */
function App() {
  var [authUser,setAuthUser] = useState(null);
  var [tab,setTab]           = useState("amc");
  var [isMobile,setIsMobile] = useState(window.innerWidth<=768);
  React.useEffect(function(){
    function onResize(){setIsMobile(window.innerWidth<=768);}
    window.addEventListener('resize',onResize);
    return function(){window.removeEventListener('resize',onResize);};
  },[]);
  var [amc,setAmc]           = useState([]);
  var [lic,setLic]           = useState([]);
  var [qual,setQual]         = useState([]);
  var [loading,setLoading]   = useState(false);
  var [loadErr,setLoadErr]   = useState("");
  var [modal,setModal]       = useState(null);
  var [comment,setComment]   = useState("");
  var [fileName,setFileName] = useState("");
  var [planDate,setPlanDate] = useState("");
  var [filter,setFilter]     = useState("All");
  var [notifOpen,setNotifOpen] = useState(false);
  var [dismissed,setDismissed] = useState([]);
  var [saving,setSaving]     = useState(false);
  var [evidenceFile,setEvidenceFile] = useState(null);
  var [expanded,setExpanded] = useState({});

  async function loadData() {
    setLoading(true); setLoadErr("");
    try {
      var ra = await fetchSheet("AMC");
      var rl = await fetchSheet("Licenses");
      var rq = await fetchSheet("Quality");
      setAmc(ra.map(function(t){
        var d=daysUntil(t["Next Service Due Date"]);
        if(d!==null&&d<0&&String(t["Status"])==="Pending") return Object.assign({},t,{Status:"Overdue"});
        return t;
      }));
      setLic(rl.map(function(t){
        if(t["Expiry Date"]&&String(t["Expiry Date"])!=="Lifetime"){
          var d=daysUntil(t["Expiry Date"]);
          if(d!==null&&d<0&&String(t["Status"])==="Active") return Object.assign({},t,{Status:"Expired"});
        }
        return t;
      }));
      setQual(rq.filter(function(t){return t["Activity Name"];}));
      if(ra.length===0&&rl.length===0) setLoadErr("Data not loaded. Click Refresh.");
    } catch(e) { setLoadErr("Error loading. Click Refresh."); }
    setLoading(false);
  }

  useEffect(function(){ if(authUser) loadData(); },[authUser]);

  if (!authUser) return isMobile
    ? <MobileLoginScreen onLogin={function(u){setAuthUser(u);}} />
    : <LoginScreen onLogin={function(u){setAuthUser(u);}} />;

  var role = authUser.role;
  var rc   = RC[role]||RC.Staff;
  var isViewer    = (role==="Head"||role==="Viewer");
  var canValidate = (role==="Manager");
  var canSignOff  = (role==="RDM");
  var canSubmit   = (role==="Staff"||role==="Operator"||role==="Manager");
  var canSetup    = (role==="Manager"||role==="Operator");

  function getActions(task, sheet) {
    var s = String(task["Status"]);
    if (sheet==="AMC") {
      if (canSubmit&&(s==="Pending"||s==="Overdue")) return [{key:"plan",label:"Mark Planned",bg:"#3B82F6"},{key:"submit",label:"Submit Evidence",bg:"#7B1FA2"}];
      if (canValidate&&s==="Submitted") return [{key:"validate",label:"Validate & Close",bg:"#2E7D32"},{key:"sendback",label:"Send Back",bg:"#C62828"}];
      if (canSignOff&&s==="Validated") return [{key:"signoff",label:"RDM Sign Off",bg:"#0277BD"}];
    }
    if (sheet==="Licenses") {
      var d=daysUntil(task["Expiry Date"]);
      if (canSetup&&(s==="Expired"||(d!==null&&d<=30&&String(task["Expiry Date"])!=="Lifetime"))) return [{key:"renew",label:"Mark Renewed",bg:"#2E7D32"}];
    }
    return [];
  }

  var notifs = [];
  amc.forEach(function(t){
    var d=daysUntil(t["Next Service Due Date"]); var s=String(t["Status"]);
    if(s==="Overdue") notifs.push({id:"od_"+t["S.No"],level:"danger",text:String(t["Equipment Name"])+" is OVERDUE",task:t,sheet:"AMC"});
    else if(s==="Pending"&&d!==null&&d>=0&&d<=3) notifs.push({id:"s_"+t["S.No"],level:"warning",text:String(t["Equipment Name"])+" due "+(d===0?"today":"in "+d+"d"),task:t,sheet:"AMC"});
    if(s==="Submitted") notifs.push({id:"sub_"+t["S.No"],level:"info",text:String(t["Equipment Name"])+" awaiting validation",task:t,sheet:"AMC"});
  });
  lic.forEach(function(t){
    var d=daysUntil(t["Expiry Date"]); var s=String(t["Status"]);
    if(s==="Expired") notifs.push({id:"le_"+t["S.No"],level:"danger",text:"EXPIRED: "+String(t["License / Agreement Name"]),task:t,sheet:"Licenses"});
    else if(d!==null&&d>=0&&d<=30&&String(t["Expiry Date"])!=="Lifetime") notifs.push({id:"lw_"+t["S.No"],level:"warning",text:"Expiring in "+d+"d: "+String(t["License / Agreement Name"]),task:t,sheet:"Licenses"});
  });
  notifs = notifs.filter(function(n){return dismissed.indexOf(n.id)===-1;});
  var crits      = notifs.filter(function(n){return n.level==="danger";});
  var notifCount = notifs.length;

  async function handleAction() {
    if(!modal) return; setSaving(true);
    var task=modal.task; var key=modal.key; var sheet=modal.sheet; var ri=modal.rowIndex;
    var upd=Object.assign({},task); var now=todayShort();
    if(key==="plan")     {upd["Status"]="Planned";upd["Planned Date"]=planDate;upd["Planned By"]=authUser.name;}
    if(key==="submit"){
      if(!evidenceFile){setSaving(false);return;}
      var upd2=Object.assign({},task,{Status:"Submitted","Submitted By":authUser.name,"Submitted On":now});
      await postWithFile(sheet,upd2,ri,evidenceFile);
      await new Promise(function(r){setTimeout(r,5000);});
      await loadData(); setSaving(false);
      setModal(null); setComment(""); setEvidenceFile(null); setPlanDate(""); return;
    }
    if(key==="validate") {upd["Status"]="Validated";upd["Validated By"]=authUser.name;upd["Validated On"]=now;upd["Remarks"]=comment;}
    if(key==="sendback") {upd["Status"]="Pending";upd["Remarks"]="Sent back: "+comment;}
    if(key==="signoff")  {upd["Status"]="Completed";upd["Remarks"]=comment;}
    if(key==="renew")    {upd["Status"]="Active";upd["Remarks"]="Renewed "+now+" by "+authUser.name+". "+comment;}
    await postUpdate(sheet,upd,ri);
    await new Promise(function(r){setTimeout(r,2500);});
    await loadData(); setSaving(false);
    setModal(null); setComment(""); setFileName(""); setPlanDate("");
  }

  function toggleExp(id){
    setExpanded(function(p){var n=Object.assign({},p);n[id]=!n[id];return n;});
  }

  var dispAmc = filter==="All"?amc:amc.filter(function(t){return String(t["Status"])===filter;});
  var dispLic = filter==="All"?lic:lic.filter(function(t){return String(t["Status"])===filter;});

  var kpis = [
    {label:"AMC Contracts",   value:amc.length,                                                             bg:"#C2185B"},
    {label:"Overdue",         value:amc.filter(function(t){return String(t["Status"])==="Overdue";}).length, bg:"#B71C1C"},
    {label:"Pending Approval",value:amc.filter(function(t){return String(t["Status"])==="Submitted";}).length,bg:"#4A148C"},
    {label:"Licenses",        value:lic.length,                                                              bg:"#1B5E20"},
    {label:"Expiring/Expired",value:lic.filter(function(t){var d=daysUntil(t["Expiry Date"]);return String(t["Status"])==="Expired"||(d!==null&&d>=0&&d<=30&&String(t["Expiry Date"])!=="Lifetime");}).length,bg:"#BF360C"},
  ];

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#F4F6FB"}}>

      {/* ── MODAL ── */}
      {modal&&(
        <div className="modal-ov">
          <div className="modal-box">
            <div style={{padding:"24px 24px 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:PINK,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>{modal.sheet} · Action</div>
                  <div style={{fontSize:18,fontWeight:800,color:DARK}}>{modal.task["Equipment Name"]||modal.task["License / Agreement Name"]||modal.task["Activity Name"]}</div>
                </div>
                <button onClick={function(){setModal(null);}} style={{background:"#F4F6FB",border:"none",width:32,height:32,borderRadius:8,fontSize:16,color:GRAY}}>✕</button>
              </div>
              <div style={{background:"#F9F5FC",borderRadius:12,padding:"14px 16px",marginBottom:18,fontSize:13}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px"}}>
                  {modal.task["Vendor Name"]&&<div><span style={{color:GRAY}}>Vendor: </span><strong>{modal.task["Vendor Name"]}</strong></div>}
                  {modal.task["Next Service Due Date"]&&<div><span style={{color:GRAY}}>Due: </span><strong style={{color:PINK}}>{fmtDate(modal.task["Next Service Due Date"])}</strong></div>}
                  {modal.task["Expiry Date"]&&<div><span style={{color:GRAY}}>Expires: </span><strong style={{color:PINK}}>{fmtDate(modal.task["Expiry Date"])}</strong></div>}
                  {modal.task["Frequency"]&&<div><span style={{color:GRAY}}>Frequency: </span>{modal.task["Frequency"]}</div>}
                  {modal.task["Vendor Contact Person"]&&<div><span style={{color:GRAY}}>Contact: </span>{modal.task["Vendor Contact Person"]}</div>}
                  {modal.task["Vendor Contact No"]&&<div><span style={{color:GRAY}}>Phone: </span><strong style={{color:PINK}}>{modal.task["Vendor Contact No"]}</strong></div>}
                  <div style={{gridColumn:"1/-1"}}><span style={{color:GRAY}}>Status: </span><Badge status={String(modal.task["Status"])}/></div>
                </div>
              </div>
              {modal.task["Evidence File"]&&<div style={{marginBottom:14,padding:"10px 14px",background:"#EDE9FE",borderRadius:10,fontSize:13,color:"#4527A0",fontWeight:600}}>📎 {modal.task["Evidence File"]}</div>}
              {modal.task["Remarks"]&&<div style={{marginBottom:14,fontSize:13,color:GRAY,fontStyle:"italic",padding:"10px 14px",background:"#F9F5FC",borderRadius:10}}>{modal.task["Remarks"]}</div>}
              {modal.key==="plan"&&<div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,color:DARK,display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>Planned Vendor Visit Date</label><input type="date" value={planDate} onChange={function(e){setPlanDate(e.target.value);}} style={{width:"100%",padding:"12px 16px",border:"2px solid #F0EDF5",borderRadius:10,fontSize:14,color:DARK}}/></div>}
              {modal.key==="submit"&&<div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,color:DARK,display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>Upload Evidence File</label><input type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx" onChange={function(e){setEvidenceFile(e.target.files[0]||null);}} style={{width:"100%",padding:"10px 16px",border:"2px solid #F0EDF5",borderRadius:10,fontSize:13,color:DARK,background:"#FAFAFA",cursor:"pointer"}}/>{evidenceFile&&<div style={{marginTop:8,padding:"8px 12px",background:"#EDE9FE",borderRadius:8,fontSize:12,color:"#4527A0",fontWeight:600}}>📎 {evidenceFile.name} ({(evidenceFile.size/1024).toFixed(1)} KB)</div>}</div>}
              {(modal.key==="validate"||modal.key==="sendback"||modal.key==="signoff"||modal.key==="renew")&&(
                <div style={{marginBottom:16}}>
                  <label style={{fontSize:11,fontWeight:700,color:DARK,display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>{modal.key==="validate"?"Validation Remarks":modal.key==="sendback"?"Reason for Sending Back":modal.key==="signoff"?"RDM Review Notes":"Renewal Remarks"}</label>
                  <textarea value={comment} onChange={function(e){setComment(e.target.value);}} placeholder="Add your remarks…" rows={3} style={{width:"100%",resize:"vertical",padding:"12px 16px",border:"2px solid #F0EDF5",borderRadius:10,fontSize:14,color:DARK,fontFamily:"Inter,sans-serif"}}/>
                </div>
              )}
            </div>
            <div style={{padding:"14px 24px 24px",display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={function(){setModal(null);}} style={{padding:"12px 20px",fontSize:14,borderRadius:10,border:"1px solid #E0D4EC",background:"white",color:GRAY,fontWeight:500}}>Cancel</button>
              {modal.key==="plan"    &&<button onClick={handleAction} disabled={saving} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#1565C0,#1E88E5)",color:"white",border:"none",borderRadius:10,fontWeight:700}}>{saving?"Saving…":"Confirm Plan"}</button>}
              {modal.key==="submit"  &&<button onClick={handleAction} disabled={saving||!evidenceFile} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#6A1B9A,#9C27B0)",color:"white",border:"none",borderRadius:10,fontWeight:700,opacity:(!evidenceFile||saving)?0.5:1}}>{saving?"Uploading…":"Submit Evidence"}</button>}
              {modal.key==="validate"&&<button onClick={handleAction} disabled={saving} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#2E7D32,#43A047)",color:"white",border:"none",borderRadius:10,fontWeight:700}}>{saving?"Saving…":"Validate & Close"}</button>}
              {modal.key==="sendback"&&<button onClick={handleAction} disabled={saving||!comment} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#C62828,#E53935)",color:"white",border:"none",borderRadius:10,fontWeight:700,opacity:(!comment||saving)?0.5:1}}>{saving?"Saving…":"Send Back"}</button>}
              {modal.key==="signoff" &&<button onClick={handleAction} disabled={saving} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#0277BD,#0288D1)",color:"white",border:"none",borderRadius:10,fontWeight:700}}>{saving?"Saving…":"RDM Sign Off"}</button>}
              {modal.key==="renew"   &&<button onClick={handleAction} disabled={saving} style={{padding:"12px 24px",fontSize:14,background:"linear-gradient(135deg,#2E7D32,#43A047)",color:"white",border:"none",borderRadius:10,fontWeight:700}}>{saving?"Saving…":"Confirm Renewal"}</button>}
            </div>
          </div>
        </div>
      )}

      {/* ── SIDEBAR ── */}
      <div className="sidebar">
        <div style={{padding:"18px 16px 12px"}}>
          <img src={LOGO} alt="beyond OTIF" style={{height:50,objectFit:"contain",marginBottom:12}}/>
          <div style={{height:1,background:"rgba(255,255,255,0.08)"}}/>
        </div>
        <div style={{padding:"10px 12px"}}>
          <div style={{background:"rgba(255,255,255,0.07)",borderRadius:10,padding:"11px 14px"}}>
            <div style={{fontSize:13,fontWeight:700,color:"white",marginBottom:5}}>{authUser.name}</div>
            <span style={{fontSize:11,padding:"3px 12px",borderRadius:20,background:rc.bg,color:rc.color,fontWeight:700}}>{role}</span>
          </div>
        </div>
        <nav style={{padding:"8px 12px",flex:1}}>
          {[
            {id:"amc",      label:"AMC Activities",icon:"⚙", cnt:amc.length},
            {id:"licenses", label:"Licenses",       icon:"📋",cnt:lic.length},
            {id:"quality",  label:"Quality",        icon:"✓", cnt:qual.length},
            {id:"alerts",   label:"Alerts",         icon:"🔔",cnt:notifCount,badge:notifCount>0},
          ].map(function(item){
            var active=tab===item.id;
            return(
              <button key={item.id} onClick={function(){setTab(item.id);setFilter("All");}} className={"nav-btn"+(active?" active":"")}>
                <span style={{fontSize:15,width:18,textAlign:"center",flexShrink:0}}>{item.icon}</span>
                <span style={{flex:1,color:active?"#F48FB1":"#FFFFFF"}}>{item.label}</span>
                <span style={{fontSize:11,padding:"2px 7px",borderRadius:8,background:active?"rgba(194,24,91,0.35)":"rgba(255,255,255,0.12)",color:active?"#F48FB1":"#FFFFFF",fontWeight:600}}>{item.cnt}</span>
                {item.badge&&<span style={{width:7,height:7,borderRadius:"50%",background:"#E53935",flexShrink:0}}/>}
              </button>
            );
          })}
        </nav>
        <div style={{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
          <button onClick={function(){loadData();}} style={{width:"100%",padding:"10px",background:"rgba(194,24,91,0.15)",border:"1px solid rgba(194,24,91,0.3)",borderRadius:10,color:"#F48FB1",fontSize:13,fontWeight:600,marginBottom:7}}>↻ Refresh Data</button>
          <button onClick={function(){setAuthUser(null);setAmc([]);setLic([]);setQual([]);}} style={{width:"100%",padding:"10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"rgba(255,255,255,0.6)",fontSize:13}}>Sign Out</button>
        </div>
      </div>

      {/* ── MAIN CONTENT ── */}
      <div className="main-content">
        {/* Top bar */}
        <div style={{background:"white",borderBottom:"1px solid #F0EDF5",padding:"14px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:40}}>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:DARK}}>ICH Dashboard</div>
            <div style={{fontSize:12,color:GRAY,marginTop:2}}>{todayLong()}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {notifCount>0&&(
              <button onClick={function(){setNotifOpen(!notifOpen);}} style={{position:"relative",width:38,height:38,borderRadius:10,background:"#FCE4EC",border:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                🔔
                <span style={{position:"absolute",top:5,right:5,width:16,height:16,background:"#E53935",borderRadius:"50%",fontSize:9,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{notifCount>9?"9+":notifCount}</span>
              </button>
            )}
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:13,fontWeight:700,color:DARK}}>{authUser.name}</div>
              <span style={{fontSize:11,padding:"3px 12px",borderRadius:20,background:rc.bg,color:rc.color,fontWeight:700}}>{role}</span>
            </div>
          </div>
        </div>

        <div style={{padding:"20px 28px",flex:1}}>

          {/* Notification panel */}
          {notifOpen&&(
            <div style={{marginBottom:18,background:"white",borderRadius:14,border:"1px solid #F0EDF5",overflow:"hidden",boxShadow:"0 4px 20px rgba(28,28,46,0.08)"}}>
              <div style={{padding:"12px 18px",borderBottom:"1px solid #F0EDF5",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:15,fontWeight:700,color:DARK}}>Alerts &amp; Notifications</span>
                <button onClick={function(){setNotifOpen(false);}} style={{background:"none",border:"none",fontSize:16,color:GRAY}}>✕</button>
              </div>
              {notifs.length===0
                ?<div style={{padding:"16px",textAlign:"center",fontSize:13,color:GRAY}}>All clear — no pending alerts.</div>
                :notifs.map(function(n){
                  var s=NS[n.level]; var acts=n.task?getActions(n.task,n.sheet):[];
                  return(
                    <div key={n.id} style={{padding:"11px 18px",background:s.bg,borderBottom:"1px solid "+s.border,display:"flex",alignItems:"center",gap:12}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:s.dot,flexShrink:0}}/>
                      <span style={{fontSize:13,color:s.color,flex:1,fontWeight:500}}>{n.text}</span>
                      <div style={{display:"flex",gap:8}}>
                        {acts.slice(0,1).map(function(a){return <button key={a.key} onClick={function(){setModal({task:n.task,key:a.key,sheet:n.sheet,rowIndex:Number(n.task["S.No"])+1});setNotifOpen(false);}} style={{fontSize:12,padding:"6px 14px",background:a.bg,color:"white",border:"none",borderRadius:8,fontWeight:600}}>{a.label}</button>;})}
                        <button onClick={function(){setDismissed(dismissed.concat([n.id]));}} style={{fontSize:12,padding:"6px 12px",background:"white",border:"1px solid #E0D4EC",borderRadius:8,color:GRAY}}>Dismiss</button>
                      </div>
                    </div>
                  );
                })
              }
            </div>
          )}

          {/* Critical banner */}
          {crits.length>0&&!notifOpen&&(
            <div style={{background:"#B71C1C",borderRadius:12,padding:"12px 18px",marginBottom:18,display:"flex",alignItems:"center",gap:12,boxShadow:"0 4px 16px rgba(183,28,28,0.3)"}}>
              <span style={{fontSize:18}}>⚠️</span>
              <span style={{fontSize:13,color:"white",flex:1,fontWeight:500}}><strong>{crits.length} critical {crits.length===1?"alert":"alerts"}</strong> — {crits[0].text}</span>
              <button onClick={function(){setNotifOpen(true);}} style={{fontSize:12,padding:"7px 16px",background:"rgba(255,255,255,0.2)",color:"white",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,fontWeight:600}}>View All</button>
            </div>
          )}

          {/* KPI cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:22}}>
            {kpis.map(function(c){return(
              <div key={c.label} style={{background:c.bg,borderRadius:12,padding:"16px 18px"}}>
                <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.82)",textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:6}}>{c.label}</div>
                <div style={{fontSize:36,fontWeight:800,color:"#FFFFFF",lineHeight:1}}>{c.value}</div>
              </div>
            );})}
          </div>

          {/* Tabs */}
          <div style={{display:"flex",borderBottom:"2px solid #F0EDF5",marginBottom:16}}>
            {[
              {id:"amc",     label:"AMC ("+amc.length+")"},
              {id:"licenses",label:"Licenses ("+lic.length+")"},
              {id:"quality", label:"Quality ("+qual.length+")"},
              {id:"alerts",  label:"Alerts",badge:notifCount},
            ].map(function(t){return(
              <button key={t.id} onClick={function(){setTab(t.id);setFilter("All");}} style={{padding:"10px 18px",fontSize:13,background:"transparent",border:"none",cursor:"pointer",borderBottom:tab===t.id?"2px solid "+PINK:"2px solid transparent",marginBottom:-2,color:tab===t.id?DARK:GRAY,fontWeight:tab===t.id?700:400}}>
                {t.label}
                {t.badge>0&&<span style={{marginLeft:6,background:"#E53935",color:"white",borderRadius:10,fontSize:10,padding:"1px 7px",fontWeight:700}}>{t.badge}</span>}
              </button>
            );})}
          </div>

          {/* Filters */}
          {(tab==="amc"||tab==="licenses")&&(
            <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
              {(tab==="amc"?["All","Pending","Planned","Submitted","Validated","Completed","Overdue"]:["All","Active","Expired"]).map(function(f){return(
                <button key={f} onClick={function(){setFilter(f);}} style={{padding:"6px 16px",fontSize:12,borderRadius:20,border:filter===f?"none":"1px solid #E0D4EC",background:filter===f?"linear-gradient(135deg,#C2185B,#E91E8C)":"white",color:filter===f?"white":GRAY,fontWeight:filter===f?700:400,boxShadow:filter===f?"0 2px 8px rgba(194,24,91,0.25)":"none"}}>{f}</button>
              );})}
            </div>
          )}

          {loading&&<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:32,marginBottom:12}}>⏳</div><div style={{fontSize:15,color:GRAY}}>Loading live data from Google Sheet…</div></div>}
          {!loading&&loadErr&&(
            <div style={{textAlign:"center",padding:"40px 20px"}}>
              <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
              <div style={{fontSize:14,color:"#C62828",marginBottom:16}}>{loadErr}</div>
              <button onClick={function(){loadData();}} style={{padding:"12px 28px",background:"linear-gradient(135deg,#C2185B,#E91E8C)",border:"none",borderRadius:12,color:"white",fontWeight:700,fontSize:15}}>↻ Refresh Data</button>
            </div>
          )}

          {/* AMC */}
          {tab==="amc"&&!loading&&!loadErr&&(
            <div>
              {dispAmc.length===0&&<div style={{textAlign:"center",padding:"40px",color:GRAY,fontSize:14}}>No tasks match this filter.</div>}
              {dispAmc.map(function(task,idx){
                var s=String(task["Status"]); var days=daysUntil(task["Next Service Due Date"]);
                var isOD=s==="Overdue"; var isSoon=s==="Pending"&&days!==null&&days>=0&&days<=3;
                var isExp=expanded["a_"+idx]; var acts=getActions(task,"AMC");
                var lc=isOD?"#EF4444":isSoon?"#FBC02D":(s==="Validated"||s==="Completed")?"#10B981":s==="Submitted"?"#7C3AED":s==="Planned"?"#3B82F6":"#E0D4EC";
                return(
                  <div key={idx} className="act-card" style={{borderLeft:"4px solid "+lc}}>
                    <div className="act-hdr" onClick={function(){toggleExp("a_"+idx);}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:15,fontWeight:700,color:DARK,marginBottom:5}}>{String(task["Equipment Name"]||"")}</div>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                          <Badge status={s}/>
                          {task["Vendor Name"]&&<span style={{fontSize:12,color:GRAY}}>{task["Vendor Name"]}</span>}
                          {task["Vendor Contact No"]&&<span style={{fontSize:12,color:PINK,fontWeight:600}}>{task["Vendor Contact No"]}</span>}
                        </div>
                      </div>
                      <div style={{textAlign:"right",marginRight:12}}>
                        <div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Due Date</div>
                        <div style={{fontSize:16,fontWeight:800,color:isOD?"#C62828":isSoon?"#E65100":DARK}}>{fmtDate(task["Next Service Due Date"])}</div>
                        {isOD&&days!==null&&<div style={{fontSize:11,color:"#EF4444",fontWeight:700}}>{"↑ "+Math.abs(days)+"d overdue"}</div>}
                        {isSoon&&<div style={{fontSize:11,color:"#E65100",fontWeight:700}}>{"Due "+(days===0?"today":"in "+days+"d")}</div>}
                      </div>
                      <span style={{fontSize:16,color:GRAY,transform:isExp?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▾</span>
                    </div>
                    {isExp&&(
                      <div className="act-body">
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:"10px 20px",padding:"14px 0",borderBottom:"1px solid #F4F6FB",marginBottom:14}}>
                          {task["Serial No"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Serial No</div><div style={{fontSize:14,fontWeight:600,color:DARK}}>{task["Serial No"]}</div></div>}
                          {task["Frequency"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Frequency</div><div style={{fontSize:14,fontWeight:600,color:DARK}}>{task["Frequency"]}</div></div>}
                          {task["AMC Period"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>AMC Period</div><div style={{fontSize:14,fontWeight:600,color:DARK}}>{task["AMC Period"]}</div></div>}
                          {task["Vendor Contact Person"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Contact Person</div><div style={{fontSize:14,fontWeight:600,color:DARK}}>{task["Vendor Contact Person"]}</div></div>}
                          {task["Vendor Contact No"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Contact No</div><div style={{fontSize:14,fontWeight:700,color:PINK}}>{task["Vendor Contact No"]}</div></div>}
                          {task["Planned Date"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Planned Date</div><div style={{fontSize:14,fontWeight:700,color:"#1565C0"}}>{fmtDate(task["Planned Date"])} — {task["Planned By"]}</div></div>}
                          {task["Submitted By"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Submitted By</div><div style={{fontSize:14,fontWeight:600,color:DARK}}>{task["Submitted By"]} · {fmtDate(task["Submitted On"])}</div></div>}
                          {task["Validated By"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Validated By</div><div style={{fontSize:14,fontWeight:700,color:"#1B5E20"}}>{task["Validated By"]} · {fmtDate(task["Validated On"])}</div></div>}
                        </div>
                        {task["Evidence File"]&&<div style={{marginBottom:12,display:"inline-flex",alignItems:"center",gap:8,padding:"8px 14px",background:"#EDE9FE",borderRadius:8,fontSize:13,color:"#4527A0",fontWeight:600}}>📎 {task["Evidence File"]}</div>}
                        {task["Remarks"]&&<div style={{marginBottom:12,fontSize:13,color:GRAY,fontStyle:"italic",padding:"9px 13px",background:"#F9F5FC",borderRadius:8}}>{task["Remarks"]}</div>}
                        {!isViewer&&acts.length>0&&(
                          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                            {acts.map(function(a){return <button key={a.key} onClick={function(){setModal({task:task,key:a.key,sheet:"AMC",rowIndex:idx+2});}} style={{padding:"10px 22px",background:a.bg,color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:700,boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>{a.label}</button>;})}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Licenses */}
          {tab==="licenses"&&!loading&&!loadErr&&(
            <div>
              {dispLic.length===0&&<div style={{textAlign:"center",padding:"40px",color:GRAY,fontSize:14}}>No licenses match this filter.</div>}
              {dispLic.map(function(item,idx){
                var s=String(item["Status"]); var days=daysUntil(item["Expiry Date"]);
                var isExp2=s==="Expired"; var isUrg=days!==null&&days>=0&&days<=30&&String(item["Expiry Date"])!=="Lifetime";
                var isOpen=expanded["l_"+idx]; var acts=getActions(item,"Licenses");
                var lc=isExp2?"#EF4444":isUrg?"#FBC02D":"#10B981";
                return(
                  <div key={idx} className="act-card" style={{borderLeft:"4px solid "+lc}}>
                    <div className="act-hdr" onClick={function(){toggleExp("l_"+idx);}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:15,fontWeight:700,color:DARK,marginBottom:5}}>{String(item["License / Agreement Name"]||"")}</div>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                          <Badge status={s}/>
                          {item["Company"]&&<span style={{fontSize:12,color:GRAY}}>{item["Company"]}</span>}
                          {isUrg&&!isExp2&&<span style={{fontSize:12,color:"#E65100",fontWeight:700}}>Expiring in {days} days</span>}
                          {isExp2&&<span style={{fontSize:12,color:"#C62828",fontWeight:700}}>⚠ EXPIRED</span>}
                        </div>
                      </div>
                      <div style={{textAlign:"right",marginRight:12}}>
                        <div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Expiry Date</div>
                        <div style={{fontSize:16,fontWeight:800,color:isExp2?"#C62828":isUrg?"#E65100":DARK}}>{fmtDate(item["Expiry Date"])}</div>
                      </div>
                      <span style={{fontSize:16,color:GRAY,transform:isOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▾</span>
                    </div>
                    {isOpen&&(
                      <div className="act-body">
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:"10px 20px",padding:"14px 0",borderBottom:"1px solid #F4F6FB",marginBottom:14}}>
                          {item["License No / Key"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>License No</div><div style={{fontSize:14,fontWeight:600,color:DARK}}>{item["License No / Key"]}</div></div>}
                          {item["Location"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Location</div><div style={{fontSize:14,fontWeight:600,color:DARK}}>{item["Location"]}</div></div>}
                          {item["Renewal Due Date"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Renewal Due</div><div style={{fontSize:14,fontWeight:700,color:"#E65100"}}>{fmtDate(item["Renewal Due Date"])}</div></div>}
                          {item["Contact Person"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Contact Person</div><div style={{fontSize:14,fontWeight:600,color:DARK}}>{item["Contact Person"]}</div></div>}
                          {item["Contact No"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Contact No</div><div style={{fontSize:14,fontWeight:700,color:PINK}}>{item["Contact No"]}</div></div>}
                          {item["Competent Person"]&&<div><div style={{fontSize:10,color:GRAY,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>Competent Person</div><div style={{fontSize:14,fontWeight:600,color:DARK}}>{item["Competent Person"]}</div></div>}
                        </div>
                        {item["Remarks"]&&<div style={{marginBottom:14,fontSize:13,color:GRAY,fontStyle:"italic",padding:"9px 13px",background:"#F9F5FC",borderRadius:8}}>{item["Remarks"]}</div>}
                        {!isViewer&&acts.length>0&&(
                          <div style={{display:"flex",gap:10}}>
                            {acts.map(function(a){return <button key={a.key} onClick={function(){setModal({task:item,key:a.key,sheet:"Licenses",rowIndex:idx+2});}} style={{padding:"10px 22px",background:a.bg,color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:700,boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>{a.label}</button>;})}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Quality */}
          {tab==="quality"&&!loading&&!loadErr&&(
            <div>
              {["Training","Daily Housekeeping","Fortnightly Housekeeping"].map(function(section){
                var items=qual.filter(function(t){return String(t["Activity Type"])===section;});
                if(items.length===0) return null;
                var sc2=section==="Training"?"#1565C0":section==="Daily Housekeeping"?"#2E7D32":"#6A1B9A";
                var sb2=section==="Training"?"#E3F2FD":section==="Daily Housekeeping"?"#E8F5E9":"#EDE7F6";
                return(
                  <div key={section} style={{marginBottom:24}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                      <span style={{padding:"5px 16px",background:sb2,borderRadius:20,fontSize:13,fontWeight:700,color:sc2}}>{section}</span>
                      <span style={{flex:1,height:1,background:"#F0EDF5",display:"inline-block"}}/>
                      <span style={{fontSize:12,color:GRAY}}>{items.length} activities</span>
                    </div>
                    {items.map(function(task,idx){
                      var s2=String(task["Status"]||"Pending");
                      var isO=expanded["q_"+section+"_"+idx];
                      return(
                        <div key={idx} className="act-card" style={{borderLeft:"4px solid "+sc2}}>
                          <div className="act-hdr" onClick={function(){toggleExp("q_"+section+"_"+idx);}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:14,fontWeight:700,color:DARK,marginBottom:4}}>{String(task["Activity Name"]||"")}</div>
                              <div style={{display:"flex",gap:8,alignItems:"center"}}><Badge status={s2}/>{task["Frequency"]&&<span style={{fontSize:12,color:GRAY}}>{task["Frequency"]}</span>}</div>
                            </div>
                            <span style={{fontSize:16,color:GRAY,transform:isO?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▾</span>
                          </div>
                          {isO&&(
                            <div className="act-body">
                              <div style={{padding:"12px 0",fontSize:13,color:GRAY}}>{task["Description"]||"No additional details."}</div>
                              {task["Assigned To"]&&<div style={{fontSize:13,color:DARK,fontWeight:600,marginTop:6}}>Assigned to: {task["Assigned To"]}</div>}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          )}

          {/* Alerts */}
          {tab==="alerts"&&(
            <div>
              {notifs.length===0
                ?<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:48,marginBottom:16}}>✅</div><div style={{fontSize:18,fontWeight:700,color:DARK,marginBottom:8}}>All Clear</div><div style={{fontSize:14,color:GRAY}}>No active alerts. All activities are on track.</div></div>
                :notifs.map(function(n){
                  var s=NS[n.level]; var icon=n.level==="danger"?"🔴":n.level==="warning"?"🟡":"🔵";
                  var acts=n.task?getActions(n.task,n.sheet):[];
                  return(
                    <div key={n.id} style={{background:s.bg,border:"1px solid "+s.border,borderRadius:12,padding:"14px 18px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
                      <span style={{fontSize:18}}>{icon}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,color:s.color,fontWeight:700}}>{n.text}</div>
                        {n.task&&<div style={{fontSize:12,color:s.color,opacity:0.75,marginTop:3}}>{(n.task["Vendor Name"]||"")+" · "+fmtDate(n.task["Next Service Due Date"]||n.task["Expiry Date"])}</div>}
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        {acts.slice(0,1).map(function(a){return <button key={a.key} onClick={function(){setModal({task:n.task,key:a.key,sheet:n.sheet,rowIndex:Number(n.task["S.No"])+1});}} style={{padding:"8px 16px",background:a.bg,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700}}>{a.label}</button>;})}
                        <button onClick={function(){setDismissed(dismissed.concat([n.id]));}} style={{padding:"8px 14px",background:"white",border:"1px solid #E0D4EC",borderRadius:8,fontSize:12,color:GRAY}}>Dismiss</button>
                      </div>
                    </div>
                  );
                })
              }
            </div>
          )}

        </div>

        <div style={{padding:"14px 28px",borderTop:"1px solid #F0EDF5",background:"white",display:"flex",justifyContent:"space-between",fontSize:11,color:GRAY}}>
          <span>Posh Enterprises · Integrated Central Hub · Indore</span>
          <span>{todayLong()}</span>
        </div>
      </div>

      {/* ── MOBILE BOTTOM NAV ── */}
      <div className="mobile-nav">
        {[
          {id:"amc",     label:"AMC",     icon:"⚙"},
          {id:"licenses",label:"Licences",icon:"📋"},
          {id:"quality", label:"Quality", icon:"✓"},
          {id:"alerts",  label:"Alerts",  icon:"🔔", badge:notifCount>0, cnt:notifCount},
        ].map(function(item){
          var active=tab===item.id;
          return(
            <button key={item.id} onClick={function(){setTab(item.id);setFilter("All");}}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flex:1,background:"transparent",border:"none",color:active?"#F48FB1":"rgba(255,255,255,0.45)",fontSize:10,fontWeight:active?700:600,cursor:"pointer",padding:"8px 4px",fontFamily:"Inter,sans-serif",position:"relative"}}>
              <span style={{fontSize:21,lineHeight:1.2}}>{item.icon}</span>
              <span>{item.label}</span>
              {item.badge&&<span style={{position:"absolute",top:4,right:"50%",transform:"translateX(14px)",width:16,height:16,borderRadius:"50%",background:"#E53935",fontSize:9,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{item.cnt>9?"9+":item.cnt}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
