<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>ICH · Integrated Central Hub · Indore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body,#root{height:100%;}
    body{font-family:'Inter',sans-serif;background:#F4F6FB;overflow-x:hidden;}
    input,textarea,select,button{font-family:'Inter',sans-serif;outline:none;}
    button{cursor:pointer;}

    /* ── SIDEBAR ── */
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:232px;background:#1C1C2E;display:flex;flex-direction:column;z-index:50;overflow-y:auto;}
    .main-content{margin-left:232px;min-height:100vh;display:flex;flex-direction:column;width:calc(100% - 232px);}

    /* ── NAV BUTTONS ── */
    .nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:transparent;border:1px solid transparent;color:rgba(255,255,255,0.75);font-size:13px;font-weight:500;cursor:pointer;text-align:left;margin-bottom:3px;transition:background 0.15s,color 0.15s;}
    .nav-btn.active{background:rgba(194,24,91,0.18);border-color:rgba(194,24,91,0.3);color:#F48FB1;font-weight:700;}
    .nav-btn:hover:not(.active){background:rgba(255,255,255,0.07);color:#fff;}

    /* ── TASK CARDS ── */
    .act-card{background:white;border-radius:12px;box-shadow:0 1px 6px rgba(28,28,46,0.07);margin-bottom:10px;overflow:hidden;transition:box-shadow 0.2s;}
    .act-card:hover{box-shadow:0 4px 18px rgba(28,28,46,0.11);}
    .act-hdr{display:flex;align-items:center;gap:10px;cursor:pointer;padding:14px 18px;}
    .act-body{padding:0 18px 16px;border-top:1px solid #F4F6FB;}
    .data-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
    .data-cell .label{font-size:10px;color:#6B7280;font-weight:600;margin-bottom:2px;}
    .data-cell .val{font-size:12px;font-weight:600;color:#1C1C2E;word-break:break-word;}

    /* ── PILLS ── */
    .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}

    /* ── KPI STRIP ── */
    .kpi-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
    .kpi-card{flex:1;min-width:80px;background:white;border-radius:10px;padding:10px 14px;box-shadow:0 1px 4px rgba(28,28,46,0.06);}
    .kpi-val{font-size:22px;font-weight:800;color:#1C1C2E;line-height:1;}
    .kpi-lbl{font-size:10px;color:#6B7280;font-weight:600;margin-top:3px;letter-spacing:0.02em;}

    /* ── FILTER BAR ── */
    .filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
    .filter-btn{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid #E5E7EB;background:white;color:#6B7280;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
    .filter-btn.active{background:#C2185B;border-color:#C2185B;color:white;font-weight:700;}

    /* ── MODAL ── */
    .modal-ov{position:fixed;inset:0;background:rgba(28,28,46,0.6);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;backdrop-filter:blur(4px);}
    .modal-box{background:white;border-radius:20px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(28,28,46,0.25);}

    /* ── MOBILE NAV ── */
    .mobile-nav{position:fixed;bottom:0;left:0;right:0;background:#1C1C2E;border-top:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:50;}
    .mob-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;color:rgba(255,255,255,0.45);font-size:9px;font-weight:600;cursor:pointer;padding:4px 12px;letter-spacing:0.03em;}
    .mob-btn.active{color:#F48FB1;}
    .mob-btn .mob-icon{font-size:20px;line-height:1.2;}

    /* ── LOGIN ── */
    .login-left{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    @media(max-width:640px){
      .login-left{display:none!important;}
      .login-right{width:100%!important;max-width:100%!important;padding:32px 24px!important;}
      .sidebar{display:none!important;}
      .main-content{margin-left:0!important;width:100%!important;padding-bottom:80px;}
      .mobile-nav{display:flex!important;}
      .kpi-card{min-width:calc(50% - 4px);}
    }
    @media(min-width:641px){.mobile-nav{display:none!important;}}

    /* ── RESPONSIVE TOGGLE ── */
    .mobile-forced .sidebar{display:none!important;}
    .mobile-forced .main-content{margin-left:0!important;width:100%!important;padding-bottom:80px!important;}
    .mobile-forced .mobile-nav{display:flex!important;}
    .desktop-forced .sidebar{display:flex!important;}
    .desktop-forced .main-content{margin-left:232px!important;width:calc(100% - 232px)!important;padding-bottom:0!important;}
    .desktop-forced .mobile-nav{display:none!important;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState  = React.useState;
var useEffect = React.useEffect;

/* ── CONFIG ── */
var SHEET_ID = "13cTQU5vA_go5gIwVe4CaxgtfZosxvIUH9RsptoxVC_8";
var API_URL  = "https://script.google.com/macros/s/AKfycbxf4MT0tUFvWw1cD_hvinFYQ0pZet1Hgfv5cNl44BsUSDGXnLUGfd9uPrrr-2qdT0VBtg/exec";
var NAVY="#1C1C2E";var PINK="#C2185B";var LPINK="#F48FB1";var GRAY="#6B7280";var LGRAY="#F4F6FB";

/* ── USERS ── */
var USERS = {
  "POSH.ICH":{pass:"POSH@123",role:"staff",  name:"Staff User"},
  "ADMIN.ICH":{pass:"ICH@123", role:"manager",name:"Hub Manager"},
  "RDM.ICH":  {pass:"RDM@123", role:"rdm",    name:"RDM"},
  "VIEW.ICH": {pass:"VIEW@123",role:"viewer", name:"Viewer"}
};

/* ── STATUS CONFIG ── */
var SC={
  "Pending":   {bg:"#FEF3C7",c:"#92400E"},
  "Planned":   {bg:"#DBEAFE",c:"#1E40AF"},
  "Submitted": {bg:"#F3E8FF",c:"#6B21A8"},
  "Validated": {bg:"#DCFCE7",c:"#166534"},
  "Completed": {bg:"#D1FAE5",c:"#065F46"},
  "Overdue":   {bg:"#FEE2E2",c:"#991B1B"},
  "Sent Back": {bg:"#FEF3C7",c:"#92400E"},
  "Active":    {bg:"#D1FAE5",c:"#065F46"},
  "Expiring Soon":{bg:"#FEF3C7",c:"#92400E"},
  "Expired":   {bg:"#FEE2E2",c:"#991B1B"},
  "Done":      {bg:"#D1FAE5",c:"#065F46"},
  "Pending Approval":{bg:"#F3E8FF",c:"#6B21A8"}
};

/* ── UTILS ── */
function parseGDate(v){
  if(!v)return null;
  var m=String(v).match(/Date\((\d+)\)/);
  if(m)return new Date(parseInt(m[1]));
  var d=new Date(v);return isNaN(d)?null:d;
}
function fmtDate(v){
  var d=parseGDate(v);
  if(!d)return v?String(v):"—";
  return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
}
function daysUntil(v){
  var d=parseGDate(v);if(!d)return null;
  return Math.round((d-Date.now())/86400000);
}
function todayLong(){return new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}
function todayShort(){return new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short"});}
function isDateKey(k){return /date|expiry|renewal|schedule|due|period|from|to|start|end/i.test(k);}
function isSkip(k){return /^_|^row$|^id$|^sno$|^s\.no/i.test(k);}
function fmtVal(k,v){
  if(!v&&v!==0)return"—";
  if(isDateKey(k))return fmtDate(v);
  if(typeof v==="number"&&k.toLowerCase().includes("amount"))return"₹"+Number(v).toLocaleString("en-IN");
  return String(v);
}

/* ── DATA FETCH ── */
function gvizUrl(sheet){
  return"https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:json&sheet="+encodeURIComponent(sheet);
}
async function fetchSheet(name){
  try{
    var r=await fetch(gvizUrl(name));
    var t=await r.text();
    var json=JSON.parse(t.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    var cols=json.table.cols.map(function(c){return c.label||c.id;});
    return (json.table.rows||[]).map(function(row,ri){
      var obj={_rowNum:ri+2};
      cols.forEach(function(col,i){
        var cell=row.c&&row.c[i];
        obj[col]=cell?(cell.f!==null&&cell.f!==undefined?cell.f:cell.v):null;
      });
      return obj;
    });
  }catch(e){console.error("fetchSheet",name,e);return[];}
}
async function postUpdate(payload){
  try{await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});return true;}
  catch(e){return false;}
}

/* ── BADGE ── */
function Badge(p){
  var s=SC[p.status]||{bg:"#E5E7EB",c:"#374151"};
  return React.createElement("span",{className:"pill",style:{background:s.bg,color:s.c}},p.status);
}

/* ── STATUS TIMELINE ── */
function Timeline(p){
  var steps=["Pending","Planned","Submitted","Validated","Completed"];
  var cur=steps.indexOf(p.status);if(cur<0)cur=p.status==="Sent Back"?0:0;
  return React.createElement("div",{style:{display:"flex",alignItems:"center",gap:0,margin:"10px 0",overflowX:"auto"}},
    steps.map(function(s,i){
      var done=i<=cur;
      return React.createElement("div",{key:s,style:{display:"flex",alignItems:"center",flex:i<steps.length-1?1:undefined}},
        React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:3}},
          React.createElement("div",{style:{width:22,height:22,borderRadius:"50%",background:done?"#C2185B":"#E5E7EB",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:done?"white":GRAY,fontWeight:700,flexShrink:0}},done?"✓":i+1),
          React.createElement("div",{style:{fontSize:8,color:done?"#C2185B":GRAY,fontWeight:done?700:400,textAlign:"center",whiteSpace:"nowrap"}},s)
        ),
        i<steps.length-1&&React.createElement("div",{style:{flex:1,height:2,background:i<cur?"#C2185B":"#E5E7EB",minWidth:10}})
      );
    })
  );
}

/* ── MODAL ── */
function Modal(p){
  useEffect(function(){
    document.body.style.overflow="hidden";
    return function(){document.body.style.overflow="";};
  },[]);
  return React.createElement("div",{className:"modal-ov",onClick:function(e){if(e.target===e.currentTarget)p.onClose();}},
    React.createElement("div",{className:"modal-box"},p.children)
  );
}

/* ── DYNAMIC ROW DATA ── */
function RowData(p){
  var row=p.row;
  var exclude=p.exclude||[];
  var fields=Object.keys(row).filter(function(k){
    return!isSkip(k)&&!exclude.includes(k)&&row[k]!==null&&row[k]!=="";
  });
  if(fields.length===0)return null;
  return React.createElement("div",{className:"data-grid"},
    fields.map(function(k,i){
      return React.createElement("div",{key:i,className:"data-cell"},
        React.createElement("div",{className:"label"},k),
        React.createElement("div",{className:"val"},fmtVal(k,row[k]))
      );
    })
  );
}

/* ── AMC CARD ── */
function AmcCard(p){
  var row=p.row;var role=p.role;var userName=p.userName;
  var [open,setOpen]=useState(false);
  var [showModal,setShowModal]=useState(false);
  var [action,setAction]=useState("");
  var [evidFile,setEvidFile]=useState(null);
  var [note,setNote]=useState("");
  var [busy,setBusy]=useState(false);

  var equip=row["Equipment Name"]||row["Activity"]||row["Item"]||row["Task"]||"Task";
  var vendor=row["Vendor"]||row["Vendor/Contractor"]||row["Contractor"]||row["Service Provider"]||"";
  var status=row["Status"]||"Pending";
  var dueDate=row["Next Maintenance Date"]||row["Due Date"]||row["Planned Date"]||row["Schedule Date"]||"";
  var days=daysUntil(dueDate);

  var isOverdue=(days!==null&&days<0)||status==="Overdue";
  var dayColor=isOverdue?"#991B1B":days!==null&&days<7?"#92400E":"#065F46";

  var canSubmit=role==="staff"&&(status==="Pending"||status==="Planned"||status==="Sent Back");
  var canValidate=role==="manager"&&status==="Submitted";
  var canSendBack=role==="manager"&&status==="Submitted";
  var canApprove=role==="rdm"&&status==="Validated";

  function doAction(){
    setBusy(true);
    var payload={
      action:"updateAMC",rowId:row._rowNum,currentStatus:status,
      nextAction:action,evidence:evidFile?evidFile.name:"",
      note:note,updatedBy:userName,timestamp:new Date().toISOString()
    };
    postUpdate(payload).then(function(){setBusy(false);setShowModal(false);p.onRefresh();});
  }

  return React.createElement("div",{className:"act-card"},
    /* HEADER */
    React.createElement("div",{className:"act-hdr",onClick:function(){setOpen(!open);}},
      React.createElement("div",{style:{width:36,height:36,borderRadius:8,background:"rgba(194,24,91,0.09)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}},"⚙"),
      React.createElement("div",{style:{flex:1,minWidth:0}},
        React.createElement("div",{style:{fontWeight:700,fontSize:13,color:NAVY,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},equip),
        React.createElement("div",{style:{fontSize:11,color:GRAY,marginTop:2}},vendor||"—")
      ),
      React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}},
        React.createElement(Badge,{status:status}),
        days!==null&&React.createElement("div",{style:{fontSize:10,fontWeight:700,color:dayColor}},
          isOverdue?"Overdue "+Math.abs(days)+"d":"Due in "+days+"d"
        )
      ),
      React.createElement("span",{style:{fontSize:12,marginLeft:8,color:open?PINK:GRAY,flexShrink:0}},open?"▲":"▼")
    ),
    /* BODY */
    open&&React.createElement("div",{className:"act-body"},
      React.createElement(Timeline,{status:status}),
      React.createElement(RowData,{row:row,exclude:["Equipment Name","Activity","Item","Task","Vendor","Vendor/Contractor","Contractor","Status","_rowNum"]}),
      /* REMARKS */
      (row["Remarks"]||row["Notes"]||row["Comments"])&&React.createElement("div",{style:{fontSize:11,color:GRAY,padding:"8px 10px",background:LGRAY,borderRadius:8,marginTop:8}},
        React.createElement("b",null,"Remarks: "),(row["Remarks"]||row["Notes"]||row["Comments"])
      ),
      /* ACTION BUTTONS */
      React.createElement("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginTop:12}},
        canSubmit&&React.createElement("button",{
          onClick:function(){setAction("submit");setShowModal(true);},
          style:{flex:1,padding:"10px 0",background:PINK,color:"white",border:"none",borderRadius:8,fontWeight:700,fontSize:13}
        },"📎 Submit Evidence"),
        canValidate&&React.createElement("button",{
          onClick:function(){setAction("validate");setShowModal(true);},
          style:{padding:"10px 16px",background:"#2563EB",color:"white",border:"none",borderRadius:8,fontWeight:700,fontSize:13}
        },"✓ Validate"),
        canSendBack&&React.createElement("button",{
          onClick:function(){setAction("sendback");setShowModal(true);},
          style:{padding:"10px 16px",background:"#F59E0B",color:"white",border:"none",borderRadius:8,fontWeight:700,fontSize:13}
        },"↩ Send Back"),
        canApprove&&React.createElement("button",{
          onClick:function(){setAction("approve");setShowModal(true);},
          style:{flex:1,padding:"10px 0",background:"#059669",color:"white",border:"none",borderRadius:8,fontWeight:700,fontSize:13}
        },"✅ RDM Sign Off")
      )
    ),
    /* MODAL */
    showModal&&React.createElement(Modal,{onClose:function(){setShowModal(false);}},
      React.createElement("div",{style:{padding:24}},
        React.createElement("div",{style:{fontWeight:800,fontSize:16,color:NAVY,marginBottom:4}},
          action==="submit"?"Submit Evidence":action==="validate"?"Validate Task":action==="sendback"?"Send Back":action==="approve"?"RDM Sign Off":"Action"
        ),
        React.createElement("div",{style:{fontSize:12,color:GRAY,marginBottom:16}},equip),
        action==="submit"&&React.createElement("div",null,
          React.createElement("label",{style:{fontSize:12,color:GRAY,fontWeight:600,display:"block",marginBottom:6}},"Upload Evidence"),
          React.createElement("input",{type:"file",onChange:function(e){setEvidFile(e.target.files[0]);},
            style:{display:"block",width:"100%",marginBottom:10,fontSize:13,padding:"8px",border:"1px solid #E5E7EB",borderRadius:8}}),
          evidFile&&React.createElement("div",{style:{fontSize:11,color:"#059669",padding:"6px 10px",background:"#D1FAE5",borderRadius:6,marginBottom:10}},"✓ "+evidFile.name),
          React.createElement("label",{style:{fontSize:12,color:GRAY,fontWeight:600,display:"block",marginBottom:6}},"Completion Note"),
          React.createElement("textarea",{value:note,onChange:function(e){setNote(e.target.value);},placeholder:"Optional note…",
            style:{width:"100%",border:"1px solid #E5E7EB",borderRadius:8,padding:10,fontSize:13,resize:"none",height:80}})
        ),
        (action==="validate"||action==="approve")&&React.createElement("div",null,
          React.createElement("p",{style:{fontSize:13,color:NAVY,marginBottom:12}},
            action==="validate"?"Confirm evidence is reviewed and valid.":"Final sign-off — task will be marked Completed."
          ),
          React.createElement("textarea",{value:note,onChange:function(e){setNote(e.target.value);},placeholder:"Optional note…",
            style:{width:"100%",border:"1px solid #E5E7EB",borderRadius:8,padding:10,fontSize:13,resize:"none",height:80}})
        ),
        action==="sendback"&&React.createElement("div",null,
          React.createElement("label",{style:{fontSize:12,color:GRAY,fontWeight:600,display:"block",marginBottom:6}},"Reason for Sending Back *"),
          React.createElement("textarea",{value:note,onChange:function(e){setNote(e.target.value);},placeholder:"Describe what needs to be fixed…",
            style:{width:"100%",border:"1px solid #E5E7EB",borderRadius:8,padding:10,fontSize:13,resize:"none",height:100}})
        ),
        React.createElement("div",{style:{display:"flex",gap:10,marginTop:16}},
          React.createElement("button",{onClick:function(){setShowModal(false);},
            style:{flex:1,padding:"10px 0",border:"1px solid #E5E7EB",borderRadius:8,background:"white",fontWeight:600,fontSize:13,color:GRAY}},"Cancel"),
          React.createElement("button",{
            onClick:doAction,
            disabled:busy||(action==="sendback"&&!note.trim()),
            style:{flex:2,padding:"10px 0",borderRadius:8,border:"none",fontWeight:700,fontSize:13,
              background:action==="sendback"?"#F59E0B":action==="validate"?"#2563EB":action==="approve"?"#059669":PINK,
              color:"white",opacity:busy?0.6:1}
          },busy?"Processing…":action==="submit"?"Submit":action==="validate"?"Validate":action==="sendback"?"Send Back":"Sign Off")
        )
      )
    )
  );
}

/* ── LICENSE CARD ── */
function LicCard(p){
  var row=p.row;
  var [open,setOpen]=useState(false);
  var name=row["License Name"]||row["Agreement"]||row["Name"]||"License";
  var auth=row["Issuing Authority"]||row["Company"]||row["Vendor"]||"";
  var expiry=row["Expiry Date"]||row["Renewal Date"]||row["Valid Till"]||"";
  var days=daysUntil(expiry);
  var sts=days===null?"—":days<0?"Expired":days<30?"Expiring Soon":"Active";

  return React.createElement("div",{className:"act-card"},
    React.createElement("div",{className:"act-hdr",onClick:function(){setOpen(!open);}},
      React.createElement("div",{style:{width:36,height:36,borderRadius:8,background:"rgba(37,99,235,0.09)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}},"📋"),
      React.createElement("div",{style:{flex:1,minWidth:0}},
        React.createElement("div",{style:{fontWeight:700,fontSize:13,color:NAVY,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},name),
        React.createElement("div",{style:{fontSize:11,color:GRAY,marginTop:2}},auth||"—")
      ),
      React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}},
        React.createElement(Badge,{status:sts}),
        days!==null&&React.createElement("div",{style:{fontSize:10,fontWeight:700,color:days<0?"#991B1B":days<30?"#92400E":"#065F46"}},
          days<0?"Expired "+Math.abs(days)+"d ago":"Expires in "+days+"d"
        )
      ),
      React.createElement("span",{style:{fontSize:12,marginLeft:8,color:open?PINK:GRAY,flexShrink:0}},open?"▲":"▼")
    ),
    open&&React.createElement("div",{className:"act-body"},
      React.createElement(RowData,{row:row,exclude:["License Name","Agreement","Name","Issuing Authority","Company","Vendor","Status","_rowNum"]})
    )
  );
}

/* ── QUALITY SECTION ── */
function QualSection(p){
  var data=p.data;
  function renderGroup(title,items,icon){
    return React.createElement("div",{style:{marginBottom:16}},
      React.createElement("div",{style:{fontWeight:700,fontSize:13,color:NAVY,marginBottom:8,display:"flex",alignItems:"center",gap:6}},icon," ",title),
      items.length===0?
        React.createElement("div",{style:{fontSize:12,color:GRAY,padding:12,textAlign:"center",background:LGRAY,borderRadius:8}},"No records"):
        items.slice(0,8).map(function(row,i){
          var title2=row["Activity"]||row["Training Topic"]||row["Item"]||row["Task"]||"—";
          var sts=row["Status"]||"Pending";
          var dt=row["Date"]||row["Due Date"]||row["Completed Date"]||"";
          return React.createElement("div",{key:i,style:{background:"white",borderRadius:10,padding:"10px 14px",marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",alignItems:"center",gap:10}},
            React.createElement("div",{style:{flex:1}},

      );
    })
  );
}

/* ─────────────────────────────────
   ROOT APP
───────────────────────────────── */
function App(){
  var [user,setUser]=useState(null);
  var [tab,setTab]=useState("amc");
  var [filter,setFilter]=useState("All");
  var [amc,setAmc]=useState([]);
  var [lic,setLic]=useState([]);
  var [qual,setQual]=useState({daily:[],fortnightly:[],training:[]});
  var [loading,setLoading]=useState(false);
  /* layout: null=auto, "mobile", "desktop" */
  var [forceLayout,setForceLayout]=useState(null);
  var [autoMobile,setAutoMobile]=useState(window.innerWidth<768);

  /* Auto-resize listener */
  useEffect(function(){
    function h(){setAutoMobile(window.innerWidth<768);}
    window.addEventListener("resize",h);return function(){window.removeEventListener("resize",h);};
  },[]);

  var isMobile=forceLayout==="mobile"?true:forceLayout==="desktop"?false:autoMobile;

  /* Load data */
  function loadData(){
    if(!user)return;
    setLoading(true);
    Promise.all([
      fetchSheet("AMC"),fetchSheet("Licenses"),
      fetchSheet("DailyChecks"),fetchSheet("FortnightlyHK"),fetchSheet("Training")
    ]).then(function(results){
      setAmc(results[0]||[]);setLic(results[1]||[]);
      setQual({daily:results[2]||[],fortnightly:results[3]||[],training:results[4]||[]});
      setLoading(false);
    }).catch(function(){setLoading(false);});
  }
  useEffect(function(){loadData();},[user]);

  /* Alerts */
  var alerts=[];
  amc.forEach(function(r){
    var d=daysUntil(r["Next Maintenance Date"]||r["Due Date"]||r["Planned Date"]);
    if(r.Status==="Overdue"||d<0)alerts.push({type:"critical",title:"Overdue: "+(r["Equipment Name"]||r["Activity"]||"Task"),message:"Maintenance was due "+Math.abs(d)+" days ago"});
    else if(d!==null&&d<7)alerts.push({type:"warning",title:"Due Soon: "+(r["Equipment Name"]||r["Activity"]||"Task"),message:"Service due in "+d+" days"});
  });
  lic.forEach(function(r){
    var d=daysUntil(r["Expiry Date"]||r["Renewal Date"]||r["Valid Till"]);
    if(d!==null&&d<0)alerts.push({type:"critical",title:"Expired: "+(r["License Name"]||r["Agreement"]||r["Name"]||"License"),message:"Expired "+Math.abs(d)+" days ago"});
    else if(d!==null&&d<30)alerts.push({type:"warning",title:"Expiring Soon: "+(r["License Name"]||r["Name"]||"License"),message:"Expires in "+d+" days"});
  });

  /* KPIs */
  var kpis=[
    {val:amc.length,lbl:"AMC Tasks",color:NAVY},
    {val:amc.filter(function(r){return r.Status==="Overdue";}).length,lbl:"Overdue",color:"#991B1B"},
    {val:amc.filter(function(r){return r.Status==="Submitted"||r.Status==="Validated";}).length,lbl:"Pending Approval",color:"#1E40AF"},
    {val:lic.length,lbl:"Licences",color:NAVY},
    {val:alerts.filter(function(a){return a.type==="critical";}).length,lbl:"Critical Alerts",color:"#991B1B"},
  ];

  var amcFilters=["All","Pending","Planned","Submitted","Validated","Overdue","Completed"];
  var licFilters=["All","Active","Expiring Soon","Expired"];

  var visAmc=amc.filter(function(r){return filter==="All"||(r.Status||"Pending")===filter;});
  var visLic=lic.filter(function(r){
    var d=daysUntil(r["Expiry Date"]||r["Renewal Date"]||r["Valid Till"]);
    var s=d===null?"—":d<0?"Expired":d<30?"Expiring Soon":"Active";
    return filter==="All"||s===filter;
  });

  /* Not logged in */
  if(!user)return React.createElement(LoginScreen,{onLogin:function(u){setUser(u);}});

  var tabLabel={amc:"AMC Activities",licenses:"Licences",quality:"Quality",alerts:"Alerts & Notifications"};
  var criticalCount=alerts.filter(function(a){return a.type==="critical";}).length;

  /* ── SIDEBAR CONTENT ── */
  function Sidebar(){
    var tabs=[
      {id:"amc",label:"AMC Activities",icon:"⚙"},
      {id:"licenses",label:"Licences",icon:"📋"},
      {id:"quality",label:"Quality",icon:"☑"},
      {id:"alerts",label:"Alerts",icon:"🔔",badge:criticalCount}
    ];
    return React.createElement("div",{className:"sidebar"},
      /* Logo area */
      React.createElement("div",{style:{padding:"20px 16px 14px"}},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:6}},
          React.createElement("div",{style:{width:34,height:34,borderRadius:9,background:"linear-gradient(135deg,#C2185B,#880E4F)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:18,color:"white",flexShrink:0}},"P"),
          React.createElement("div",null,
            React.createElement("div",{style:{color:"white",fontWeight:800,fontSize:12,letterSpacing:"0.04em"}},"POSH ENTERPRISES"),
            React.createElement("div",{style:{color:"rgba(255,255,255,0.4)",fontSize:9,fontWeight:600}})
          )
        ),
        React.createElement("div",{style:{color:"rgba(255,255,255,0.3)",fontSize:9,fontWeight:600,letterSpacing:"0.1em"}})
      ),
      React.createElement("div",{style:{height:1,background:"rgba(255,255,255,0.08)",margin:"0 14px"}}),
      /* Nav */
      React.createElement("div",{style:{padding:"12px 10px",flex:1}},
        tabs.map(function(t){
          var active=tab===t.id;
          return React.createElement("button",{
            key:t.id,className:"nav-btn"+(active?" active":""),
            onClick:function(){setTab(t.id);setFilter("All");}
          },
            React.createElement("span",{style:{fontSize:16,flexShrink:0}},t.icon),
            React.createElement("span",{style:{flex:1}},t.label),
            t.badge>0&&React.createElement("span",{style:{background:"#EF4444",color:"white",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:700}},t.badge)
          );
        })
      ),
      React.createElement("div",{style:{height:1,background:"rgba(255,255,255,0.08)",margin:"0 14px"}}),
      /* User + controls */
      React.createElement("div",{style:{padding:"14px 14px"}},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:12}},
          React.createElement("div",{style:{width:32,height:32,borderRadius:"50%",background:"rgba(244,143,177,0.15)",display:"flex",alignItems:"center",justifyContent:"center",color:LPINK,fontWeight:700,fontSize:13}},
            user.name.charAt(0)
          ),
          React.createElement("div",null,
            React.createElement("div",{style:{color:"white",fontSize:12,fontWeight:600}},user.name),
            React.createElement("div",{style:{color:"rgba(255,255,255,0.4)",fontSize:10,textTransform:"capitalize"}},user.role)
          )
        ),
        React.createElement("button",{onClick:loadData,style:{width:"100%",padding:"7px 0",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"rgba(255,255,255,0.7)",fontSize:12,fontWeight:600,marginBottom:6}},
          loading?"⟳ Loading…":"⟳ Refresh Data"
        ),
        React.createElement("button",{
          onClick:function(){setForceLayout(isMobile?"desktop":"mobile");},
          style:{width:"100%",padding:"7px 0",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,color:"rgba(255,255,255,0.45)",fontSize:11,fontWeight:500,marginBottom:6}
        },isMobile?"🖥️ Switch to Desktop":"📱 Switch to Mobile"),
        React.createElement("button",{onClick:function(){setUser(null);setAmc([]);setLic([]);},
          style:{width:"100%",padding:"7px 0",background:"transparent",border:"1px solid rgba(255,80,80,0.25)",borderRadius:8,color:"rgba(255,100,100,0.7)",fontSize:12,fontWeight:600}
        },"Sign Out")
      )
    );
  }

  /* ── MAIN CONTENT ── */
  function ContentArea(){
    return React.createElement("div",{className:"main-content"},
      /* Top bar */
      React.createElement("div",{style:{padding:"18px 24px 0",background:"white",borderBottom:"1px solid #F0F0F0",flexShrink:0}},
        React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
          React.createElement("div",null,
            React.createElement("h1",{style:{fontSize:19,fontWeight:800,color:NAVY}},tabLabel[tab]||tab),
            React.createElement("div",{style:{fontSize:12,color:GRAY,marginTop:2}},"ICH Indore · "+todayLong())
          ),
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
            loading&&React.createElement("div",{style:{fontSize:11,color:GRAY,display:"flex",alignItems:"center",gap:5}},
              "⟳ Loading"
            ),
            criticalCount>0&&React.createElement("div",{style:{background:"#EF4444",color:"white",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700}},
              "🔴 "+criticalCount+" Critical"
            )
          )
        ),
        /* KPI strip */
        React.createElement("div",{className:"kpi-strip"},
          kpis.map(function(k,i){
            return React.createElement("div",{key:i,className:"kpi-card"},
              React.createElement("div",{className:"kpi-val",style:{color:k.color}},k.val),
              React.createElement("div",{className:"kpi-lbl"},k.lbl)
            );
          })
        ),
        /* Filter bar */
        (tab==="amc"||tab==="licenses")&&React.createElement("div",{className:"filter-bar"},
          (tab==="amc"?amcFilters:licFilters).map(function(f){
            return React.createElement("button",{key:f,className:"filter-btn"+(filter===f?" active":""),onClick:function(){setFilter(f);}},f);
          })
        )
      ),
      /* Content */
      React.createElement("div",{style:{padding:"18px 24px",flex:1,overflowY:"auto"}},
        tab==="amc"&&(visAmc.length===0?
          React.createElement("div",{style:{textAlign:"center",padding:40,color:GRAY,fontSize:14}},loading?"Loading data…":"No records found"):
          visAmc.map(function(r,i){return React.createElement(AmcCard,{key:i,row:r,role:user.role,userName:user.name,onRefresh:loadData});})
        ),
        tab==="licenses"&&(visLic.length===0?
          React.createElement("div",{style:{textAlign:"center",padding:40,color:GRAY,fontSize:14}},loading?"Loading…":"No licenses found"):
          visLic.map(function(r,i){return React.createElement(LicCard,{key:i,row:r,role:user.role});})
        ),
        tab==="quality"&&React.createElement(QualSection,{data:qual,role:user.role}),
        tab==="alerts"&&React.createElement(AlertsList,{alerts:alerts})
      ),
      /* Footer */
      React.createElement("div",{style:{padding:"10px 24px",borderTop:"1px solid #F0F0F0",background:"white",display:"flex",justifyContent:"space-between",fontSize:11,color:GRAY,flexShrink:0}},
        React.createElement("span",null,"Posh Enterprises · Tirupati Logipark Group · ICH Indore"),
        React.createElement("span",null,todayShort())
      )
    );
  }

  /* ── MOBILE BOTTOM NAV ── */
  var mobTabs=[
    {id:"amc",label:"AMC",icon:"⚙"},
    {id:"licenses",label:"Licences",icon:"📋"},
    {id:"quality",label:"Quality",icon:"☑"},
    {id:"alerts",label:"Alerts",icon:"🔔"}
  ];

  return React.createElement("div",{style:{position:"relative"}},
    /* Layout toggle button (mobile topbar) — only in mobile mode */
    isMobile&&React.createElement("div",{style:{
      position:"fixed",top:0,left:0,right:0,zIndex:60,
      background:NAVY,padding:"10px 16px",
      display:"flex",alignItems:"center",justifyContent:"space-between"
    }},
      React.createElement("div",{style:{color:"white",fontWeight:800,fontSize:13}},tabLabel[tab]),
      React.createElement("div",{style:{display:"flex",gap:10,alignItems:"center"}},
        loading&&React.createElement("div",{style:{width:14,height:14,border:"2px solid rgba(255,255,255,0.2)",borderTop:"2px solid "+LPINK,borderRadius:"50%",animation:"spin 1s linear infinite"}}),
        criticalCount>0&&React.createElement("div",{style:{background:"#EF4444",color:"white",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}},criticalCount),
        React.createElement("button",{onClick:function(){setForceLayout(isMobile?"desktop":"mobile");},
          style:{background:"transparent",border:"none",color:"rgba(255,255,255,0.5)",fontSize:10,padding:"4px 6px",cursor:"pointer"}
        },"🖥️"),
        React.createElement("button",{onClick:loadData,
          style:{background:"transparent",border:"none",color:LPINK,fontSize:16,padding:"4px",cursor:"pointer"}},"⟳")
      )
    ),
    /* Main layout */
    !isMobile&&React.createElement(Sidebar,null),
    React.createElement("div",{style:isMobile?{paddingTop:44,paddingBottom:70}:{}},
      React.createElement(ContentArea,null)
    ),
    /* Mobile bottom nav */
    isMobile&&React.createElement("div",{className:"mobile-nav"},
      mobTabs.map(function(t){
        return React.createElement("button",{
          key:t.id,className:"mob-btn"+(tab===t.id?" active":""),
          onClick:function(){setTab(t.id);setFilter("All");}
        },
          React.createElement("div",{className:"mob-icon"},t.icon),
          React.createElement("div",null,t.label)
        );
      })
    )
  );
}

/* Spin animation */
var st=document.createElement("style");
st.textContent="@keyframes spin{to{transform:rotate(360deg)}}";
document.head.appendChild(st);

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
